<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OrzuMall ilovasini o‘rnatish</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --bg:#f6f8f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --brand:#2E8B57;
      --border:#e5e7eb;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .card{
      width:100%;
      max-width:420px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      text-align:center;
    }
    .logo{
      width:84px;
      height:84px;
      object-fit:contain;
      border-radius:22px;
      margin:0 auto 14px;
      display:block;
    }
    h1{margin:0 0 10px;font-size:24px}
    p{margin:0 0 18px;color:var(--muted);font-size:15px;line-height:1.55}
    .btn{
      display:block;
      width:100%;
      border:none;
      border-radius:14px;
      padding:15px 18px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      margin-top:10px;
    }
    .btn-primary{background:var(--brand);color:#fff}
    .btn-secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
    .hint{margin-top:14px;font-size:13px;color:var(--muted)}
    .steps{
      margin-top:16px;
      text-align:left;
      background:#fafafa;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      font-size:14px;
      color:#374151;
    }
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo.svg" alt="OrzuMall" class="logo">
    <h1>OrzuMall ilovasini o‘rnating</h1>
    <p id="desc">
      Telegram ichida ochilgansiz. Davom etish uchun avval tashqi brauzerda oching.
    </p>

    <button id="openExternal" class="btn btn-primary">Tashqi brauzerda ochish</button>
    <a id="goInstall" class="btn btn-primary hidden" href="/install">O‘rnatish</a>
    <button id="copyLink" class="btn btn-secondary">Linkni nusxalash</button>

    <div id="steps" class="steps">
      <div><b>1.</b> “Tashqi brauzerda ochish” ni bosing</div>
      <div><b>2.</b> Brauzerda ochilgach “O‘rnatish” tugmasini bosing</div>
      <div><b>3.</b> Ilova telefoningizga oddiy app kabi o‘rnatiladi</div>
    </div>

    <div class="hint" id="hint"></div>
  </div>

  <script>
    const ua = navigator.userAgent || "";
    const isTelegram = /Telegram/i.test(ua);
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const installUrl = location.origin + "/install";
    const openExternalBtn = document.getElementById("openExternal");
    const goInstall = document.getElementById("goInstall");
    const copyLink = document.getElementById("copyLink");
    const hint = document.getElementById("hint");
    const desc = document.getElementById("desc");

    if (!isTelegram) {
      openExternalBtn.classList.add("hidden");
      goInstall.classList.remove("hidden");
      desc.textContent = "Brauzerda ochilgansiz. Endi ilovani o‘rnatishingiz mumkin.";
    }

    openExternalBtn.addEventListener("click", () => {
      if (isAndroid) {
        const clean = installUrl.replace(/^https?:\/\//, "");
        const intentUrl = "intent://" + clean + "#Intent;scheme=https;package=com.android.chrome;end";
        location.href = intentUrl;

        setTimeout(() => {
          hint.textContent = "Agar avtomatik ochilmasa, Telegram menyusidan brauzerda oching yoki linkni nusxalang.";
        }, 900);
        return;
      }

      if (isIOS) {
        hint.textContent = "iPhone’da Telegram menyusidan Safari’da oching, keyin O‘rnatish tugmasini bosing.";
        return;
      }

      window.open(installUrl, "_blank", "noopener,noreferrer");
      setTimeout(() => {
        hint.textContent = "Agar yangi brauzer ochilmasa, linkni nusxalab tashqi brauzerga qo‘ying.";
      }, 700);
    });

    copyLink.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(installUrl);
        hint.textContent = "Install link nusxalandi.";
      } catch (e) {
        hint.textContent = installUrl;
      }
    });
  </script>
</body>
</html>
