<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OrzuMall · ombor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ecf2f9;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1e293b;
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #e2f0e8, #d3e4f0);
      padding: 0 0 30px 0;
    }

    /* glassmorphism asosiy */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 36px;
      box-shadow: 0 20px 40px -14px rgba(0,40,30,0.2), 0 4px 20px rgba(255,255,255,0.5) inset;
    }

    .neo-raise {
      background: #f0f7fd;
      box-shadow: 9px 9px 18px #c2d0de, -9px -9px 18px #ffffff;
      border-radius: 30px;
      border: none;
    }

    .wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 18px;
    }

    /* header */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 6px 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(12px);
      padding: 8px 18px 8px 14px;
      border-radius: 60px;
      border: 1px solid rgba(46,139,87,0.2);
    }

    .logo-area i {
      font-size: 1.5rem;
      color: #2e8b57;
    }

    .logo-area span {
      font-weight: 700;
      font-size: 1.1rem;
      color: #1d543a;
    }

    .role-tag {
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      background: white;
      border: 1px solid #b8d9cb;
      color: #1f6e43;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 30px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #2e8b57;
      box-shadow: 0 10px 20px -8px rgba(20,70,40,0.3);
      border: 1px solid rgba(255,255,255,0.8);
      transition: 0.15s;
    }

    .icon-btn:active {
      transform: scale(0.92);
      background: #e2f3e9;
    }

    /* qidiruv paneli */
    .search-panel {
      margin-bottom: 24px;
      padding: 16px 18px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrapper {
      flex: 2;
      min-width: 200px;
      display: flex;
      align-items: center;
      background: white;
      border-radius: 60px;
      padding: 4px 4px 4px 22px;
      border: 1px solid #c9e0d4;
      backdrop-filter: blur(4px);
    }

    .search-wrapper i {
      color: #468b6a;
      font-size: 1rem;
    }

    .search-wrapper input {
      width: 100%;
      border: none;
      background: transparent;
      padding: 16px 10px 16px 8px;
      font-size: 0.98rem;
      outline: none;
      font-weight: 500;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-gloss {
      border: none;
      background: white;
      border-radius: 60px;
      padding: 14px 22px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #1e4d36;
      box-shadow: 0 8px 16px -6px #abc0b4;
      border: 1px solid #e1f0e8;
      transition: 0.1s;
      white-space: nowrap;
    }

    .btn-gloss:active {
      transform: scale(0.95);
      background: #daf0e4;
    }

    .btn-primary-gloss {
      background: #1f6e43;
      color: white;
      border: none;
      box-shadow: 0 12px 24px -10px #0c452b;
    }

    .btn-primary-gloss:active {
      background: #155a35;
    }

    /* statistika */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 18px 14px;
      border: 1px solid rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-icon {
      width: 54px;
      height: 54px;
      border-radius: 30px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #2e8b57;
      box-shadow: 0 8px 14px -6px #9fb7ab;
    }

    .stat-content .label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #2d6045;
      letter-spacing: 0.3px;
    }

    .stat-content .value {
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1.2;
      color: #1d4e34;
    }

    /* banner */
    .info-banner {
      margin-bottom: 24px;
      padding: 24px;
      background: linear-gradient(145deg, rgba(46,139,87,0.1), rgba(120,180,140,0.2));
      border: 1px solid rgba(46,139,87,0.3);
    }

    .banner-title {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(145deg, #1a5c39, #2c8b56);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .banner-text {
      color: #286542;
      margin-bottom: 18px;
      font-size: 0.95rem;
    }

    .banner-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* mahsulotlar grid */
    .products-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .product-card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.8);
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 18px;
      transition: 0.15s;
    }

    .product-card:active {
      background: rgba(255,255,255,0.9);
    }

    .product-image {
      width: 100px;
      height: 100px;
      border-radius: 40px;
      background: #e5f2ea;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      box-shadow: 0 12px 22px -10px #386a50;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .product-name {
      font-weight: 800;
      font-size: 1.1rem;
      color: #1a4b32;
    }

    .product-id {
      font-family: monospace;
      font-size: 0.75rem;
      background: rgba(46,139,87,0.1);
      padding: 4px 10px;
      border-radius: 30px;
      display: inline-block;
      width: fit-content;
      border: 1px solid #b2d9c2;
    }

    .product-barcode {
      font-size: 0.8rem;
      color: #336f4e;
    }

    .product-prices {
      display: flex;
      gap: 14px;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.5);
      padding: 8px 12px;
      border-radius: 30px;
      margin: 4px 0;
    }

    .price-tag {
      font-weight: 700;
      color: #155f35;
    }

    .stock-pill {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.8rem;
      width: fit-content;
    }

    .stock-ok {
      background: #e1f7ea;
      color: #0b5e2e;
      border: 1px solid #a8e0bb;
    }

    .stock-warn {
      background: #fff3d6;
      color: #a6580b;
      border: 1px solid #fad39c;
    }

    .stock-bad {
      background: #ffe8e8;
      color: #b33434;
      border: 1px solid #fbbbbb;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .sold-count {
      font-size: 0.75rem;
      color: #4d705d;
    }

    .edit-btn {
      background: white;
      border: none;
      border-radius: 40px;
      padding: 10px 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1f6e43;
      box-shadow: 0 6px 14px -6px #9eb7ab;
    }

    .edit-btn:active {
      transform: scale(0.94);
      background: #e2f3e9;
    }

    /* modal */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,30,20,0.7);
      backdrop-filter: blur(14px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 1000;
    }

    .modal-modern {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(30px);
      width: min(560px, 100%);
      border-radius: 70px;
      border: 1px solid white;
      overflow: hidden;
      box-shadow: 0 40px 70px -10px #143525;
    }

    .modal-header {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #c4e0d2;
    }

    .modal-body {
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid #c4e0d2;
      display: flex;
      gap: 14px;
      justify-content: flex-end;
      background: rgba(255,255,255,0.3);
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #23643f;
      margin-bottom: 6px;
      margin-left: 8px;
    }

    .field input, .field textarea {
      width: 100%;
      padding: 16px 20px;
      border-radius: 60px;
      border: 1px solid #c9e0d4;
      outline: none;
      font-size: 0.95rem;
      background: white;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
      border-radius: 40px;
    }

    /* toast */
    .toast {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 30px;
      background: #1f3a2b;
      color: white;
      border-radius: 60px;
      padding: 18px 28px;
      box-shadow: 0 30px 50px -12px black;
      display: none;
      z-index: 1200;
      backdrop-filter: blur(14px);
      border: 1px solid #6fa386;
    }

    .toast .title {
      font-weight: 800;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #3e6e54;
      font-style: italic;
      background: rgba(255,255,255,0.4);
      border-radius: 60px;
    }

    @media (min-width: 560px) {
      .stats-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- header -->
    <div class="top-bar">
      <div class="logo-area">
        <i class="fa-solid fa-cubes"></i>
        <span>OrzuMall</span>
      </div>
      <div class="role-tag" id="roleBadge">—</div>
      <div class="header-actions">
        <a href="./kassa.html" class="icon-btn"><i class="fa-solid fa-cash-register"></i></a>
        <button class="icon-btn" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>

    <!-- qidiruv paneli -->
    <div class="glass-card search-panel">
      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="q" placeholder="Nom, ID, barcode..." />
      </div>
      <div class="action-buttons">
        <a href="./addproduct.html" class="btn-gloss btn-primary-gloss"><i class="fa-solid fa-plus"></i>Yangi</a>
      </div>
    </div>

    <!-- statistika -->
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-icon"><i class="fa-solid fa-box"></i></div>
        <div class="stat-content">
          <div class="label">Jami mahsulot</div>
          <div class="value" id="stTotal">0</div>
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-icon"><i class="fa-solid fa-layer-group"></i></div>
        <div class="stat-content">
          <div class="label">Jami qoldiq</div>
          <div class="value" id="stStock">0</div>
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-icon"><i class="fa-solid fa-coins"></i></div>
        <div class="stat-content">
          <div class="label">Tannarx</div>
          <div class="value" id="stCost">0 so‘m</div>
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-icon"><i class="fa-solid fa-chart-line"></i></div>
        <div class="stat-content">
          <div class="label">Potensial foyda</div>
          <div class="value" id="stProfit">0 so‘m</div>
        </div>
      </div>
    </div>

    <!-- banner -->
    <div class="glass-card info-banner">
      <div class="banner-title">📱 Tez qo‘shish</div>
      <div class="banner-text">Yangi mahsulot qo‘shish uchun alohida sahifa — mobil uchun qulay forma</div>
      <div class="banner-actions">
        <a href="./addproduct.html" class="btn-gloss btn-primary-gloss"><i class="fa-solid fa-camera"></i> Skaner bilan qo‘shish</a>
        <a href="./panel.html" class="btn-gloss"><i class="fa-solid fa-sliders"></i> Admin panel</a>
      </div>
    </div>

    <!-- mahsulotlar ro‘yxati -->
    <div class="products-grid" id="cards"></div>
  </div>

  <!-- tahrirlash modali -->
  <div class="backdrop" id="editBd">
    <div class="modal-modern">
      <div class="modal-header">
        <div>
          <div style="font-weight:800; font-size:1.2rem;" id="editTitle">Tahrirlash</div>
          <div class="role-tag" style="margin-top:6px;" id="editSub">ID</div>
        </div>
        <button class="icon-btn" id="editClose"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Nom</label>
          <input id="eName" placeholder="Mahsulot nomi" />
        </div>
        <div class="field">
          <label>Barcode</label>
          <input id="eBarcode" placeholder="0000000000000" />
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div class="field">
            <label>Narx</label>
            <input id="ePrice" type="number" min="0" step="1" />
          </div>
          <div class="field">
            <label>Tannarx</label>
            <input id="eCost" type="number" min="0" step="1" />
          </div>
        </div>
        <div class="field">
          <label>Qoldiq</label>
          <input id="eStock" type="number" min="0" step="1" />
        </div>
        <div class="field">
          <label>Izoh</label>
          <textarea id="eNote" placeholder="Qisqa eslatma..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-gloss" id="editCancel">Bekor qilish</button>
        <button class="btn-gloss btn-primary-gloss" id="editSave"><i class="fa-regular fa-floppy-disk"></i> Saqlash</button>
      </div>
    </div>
  </div>

  <!-- toast -->
  <div class="toast" id="toast">
    <div class="title" id="tTitle">—</div>
    <div class="desc" id="tDesc">—</div>
  </div>

  <script type="module">
    // Firebase konfiguratsiyasi (avvalgidek)
    const ADMIN_EMAILS = ["sohibjonmath@gmail.com"];
    let FIREBASE_CONFIG = null;
    try { if (window.firebaseConfig) FIREBASE_CONFIG = window.firebaseConfig; } catch (e) {}
    if (!FIREBASE_CONFIG) {
      FIREBASE_CONFIG = {
        apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
        authDomain: "xplusy-760fa.firebaseapp.com",
        databaseURL: "https://xplusy-760fa-default-rtdb.firebaseio.com",
        projectId: "xplusy-760fa",
        storageBucket: "xplusy-760fa.firebasestorage.app",
        messagingSenderId: "992512966017",
        appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80",
        measurementId: "G-459PLJ7P7L"
      };
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { collection, doc, getDoc, getFirestore, onSnapshot, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { GoogleAuthProvider, browserLocalPersistence, getAuth, onAuthStateChanged, setPersistence, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const app = initializeApp(FIREBASE_CONFIG), db = getFirestore(app), auth = getAuth(app), provider = new GoogleAuthProvider();
    const $ = s => document.querySelector(s);
    const toast = $('#toast'), tTitle = $('#tTitle'), tDesc = $('#tDesc');
    function showToast(title, desc, ms = 2600) { tTitle.innerText = title; tDesc.innerText = desc || ''; toast.style.display = 'block'; clearTimeout(window.toastTimer); window.toastTimer = setTimeout(() => toast.style.display = 'none', ms); }

    let me = null, isAdmin = false, products = [], editId = '';

    function getName(p) { return p?.name || p?.title || p?.nomi || 'Nomsiz'; }
    function getBarcode(p) { return String(p?.barcode || p?.barcodeText || '').trim(); }
    function getPrice(p) { return Number(p?.priceUZS ?? p?.price ?? p?.currentPriceUZS ?? p?.inventory?.unitPriceUZS ?? 0); }
    function getCost(p) { return Number(p?.costUZS ?? p?.inventory?.costUZS ?? 0); }
    function getStock(p) { return Number(p?.inventory?.stock ?? 0); }
    function getLow(p) { return Number(p?.inventory?.lowThreshold ?? 3); }
    function getNote(p) { return String(p?.inventory?.note ?? ''); }
    function getSold(p) { return Number(p?.inventory?.soldCount ?? 0); }
    function getImageUrl(p) { const s = v => typeof v === 'string' && v.trim() ? v.trim() : ''; return s(p?.imageUrl) || s(p?.image) || (Array.isArray(p?.images) && s(p.images[0])) || ''; }
    function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
    function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
    function fmt(n) { try { return new Intl.NumberFormat('uz-UZ').format(Number(n || 0)); } catch (e) { return String(n || 0); } }

    // auth
    async function ensureAuth() {
      await setPersistence(auth, browserLocalPersistence);
      return new Promise(resolve => {
        onAuthStateChanged(auth, async user => {
          if (!user) { resolve(null); return; }
          const email = (user.email || '').toLowerCase();
          isAdmin = ADMIN_EMAILS.includes(email);
          let role = isAdmin ? 'admin' : 'seller';
          if (!isAdmin) {
            try { const us = await getDoc(doc(db, 'users', user.uid)); if (us.exists() && us.data().role) role = String(us.data().role); } catch (e) { }
          }
          me = { uid: user.uid, email: user.email || '', displayName: user.displayName || 'Foydalanuvchi', role };
          isAdmin = isAdmin || role === 'admin';
          resolve(me);
        });
      });
    }
    async function requireLogin() {
      const u = await ensureAuth();
      if (u) return u;
      try { await signInWithPopup(auth, provider); return await ensureAuth(); } catch (e) { showToast('Kirish bekor qilindi', e?.message || 'Google login ishlamadi'); return null; }
    }
    $('#btnLogout').onclick = async () => { await signOut(auth); location.reload(); };

    // render
    function render() {
      const q = ($('#q').value || '').trim().toLowerCase();
      const view = products.filter(x => !q || x.id.toLowerCase().includes(q) || getName(x.data).toLowerCase().includes(q) || getBarcode(x.data).toLowerCase().includes(q));
      
      let total = view.length, sumStock = 0, sumCost = 0, sumProfit = 0;
      for (const x of view) {
        const p = x.data;
        const stock = getStock(p), price = getPrice(p), cost = getCost(p);
        sumStock += stock;
        sumCost += stock * cost;
        sumProfit += stock * Math.max(0, price - cost);
      }
      $('#stTotal').innerText = fmt(total);
      $('#stStock').innerText = fmt(sumStock);
      $('#stCost').innerText = fmt(sumCost) + ' so‘m';
      $('#stProfit').innerText = fmt(sumProfit) + ' so‘m';

      $('#cards').innerHTML = view.map(x => {
        const p = x.data, img = getImageUrl(p), stock = getStock(p), price = getPrice(p), cost = getCost(p);
        let stateClass = 'stock-ok', stateText = 'Yetarli';
        if (stock <= 0) { stateClass = 'stock-bad'; stateText = 'Tugagan'; }
        else if (stock <= getLow(p)) { stateClass = 'stock-warn'; stateText = 'Kam qoldi'; }
        
        return `<div class="product-card">
          <div class="product-image">${img ? `<img src="${escapeAttr(img)}" alt="${escapeAttr(getName(p))}">` : '<i class="fa-solid fa-image" style="font-size:32px; color:#86a697;"></i>'}</div>
          <div class="product-info">
            <div class="product-name">${escapeHtml(getName(p))}</div>
            <div><span class="product-id">${escapeHtml(x.id)}</span></div>
            <div class="product-barcode"><i class="fa-regular fa-qrcode"></i> ${escapeHtml(getBarcode(p) || '—')}</div>
            <div class="product-prices">
              <span class="price-tag"><i class="fa-regular fa-tag"></i> ${fmt(price)} so‘m</span>
              <span class="price-tag"><i class="fa-regular fa-coins"></i> ${fmt(cost)} so‘m</span>
            </div>
            <div><span class="stock-pill ${stateClass}">${fmt(stock)} dona • ${stateText}</span></div>
            <div class="product-footer">
              <span class="sold-count"><i class="fa-regular fa-clock"></i> sotilgan: ${fmt(getSold(p))}</span>
              <button class="edit-btn" data-edit="${escapeAttr(x.id)}"><i class="fa-regular fa-pen-to-square"></i> Tahrirlash</button>
            </div>
          </div>
        </div>`;
      }).join('') || '<div class="empty-state">Mahsulot topilmadi</div>';
    }

    $('#q').addEventListener('input', render);

    // realtime mahsulotlar
    onSnapshot(collection(db, 'products'), snap => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, data: d.data() || {} }));
      products = list;
      render();
    }, err => { console.error(err); showToast('Xato', 'Mahsulotlarni o‘qib bo‘lmadi'); });

    // modal
    const editBd = $('#editBd'), editClose = $('#editClose'), editCancel = $('#editCancel');
    function closeEdit() { editBd.style.display = 'none'; document.body.style.overflow = ''; editId = ''; }
    editClose.onclick = closeEdit; editCancel.onclick = closeEdit;
    editBd.addEventListener('click', e => { if (e.target === editBd) closeEdit(); });

    document.addEventListener('click', e => {
      const btn = e.target.closest('[data-edit]');
      if (!btn) return;
      const x = products.find(i => i.id === btn.dataset.edit);
      if (!x) return;
      const p = x.data;
      editId = x.id;
      $('#editTitle').innerText = 'Tahrirlash';
      $('#editSub').innerText = `ID: ${x.id}`;
      $('#eName').value = getName(p);
      $('#eBarcode').value = getBarcode(p);
      $('#ePrice').value = getPrice(p);
      $('#eCost').value = getCost(p);
      $('#eStock').value = getStock(p);
      $('#eNote').value = getNote(p);
      editBd.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    });

    $('#editSave').onclick = async () => {
      if (!editId) return;
      const snap = await getDoc(doc(db, 'products', editId));
      const p = snap.data() || {};
      try {
        await updateDoc(doc(db, 'products', editId), {
          name: $('#eName').value.trim(),
          title: $('#eName').value.trim(),
          barcode: $('#eBarcode').value.trim(),
          barcodeText: $('#eBarcode').value.trim(),
          priceUZS: Math.max(0, Math.floor(Number($('#ePrice').value || 0))),
          currentPriceUZS: Math.max(0, Math.floor(Number($('#ePrice').value || 0))),
          costUZS: Math.max(0, Math.floor(Number($('#eCost').value || 0))),
          inventory: {
            stock: Math.max(0, Math.floor(Number($('#eStock').value || 0))),
            lowThreshold: getLow(p),
            soldCount: getSold(p),
            soldSumUZS: Number(p?.inventory?.soldSumUZS ?? 0),
            unitPriceUZS: Math.max(0, Math.floor(Number($('#ePrice').value || 0))),
            costUZS: Math.max(0, Math.floor(Number($('#eCost').value || 0))),
            note: $('#eNote').value.trim().slice(0, 300)
          },
          updatedAt: serverTimestamp()
        });
        closeEdit();
        showToast('Saqlandi', 'Mahsulot yangilandi');
      } catch (err) { console.error(err); showToast('Xato', err?.message || 'Saqlab bo‘lmadi'); }
    };

    (async () => {
      const u = await requireLogin();
      if (!u) return;
      $('#roleBadge').innerText = isAdmin ? 'ADMIN' : 'SOTUVCHI';
      $('#roleBadge').style.background = isAdmin ? '#e2f0ff' : '#ffefd9';
      $('#roleBadge').style.color = isAdmin ? '#1d4ed8' : '#b45b0c';
    })();
  </script>
</body>
</html>
