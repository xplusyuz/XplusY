<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <title>OrzuMall — Kassa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg:#f6f8fc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e5e7eb;--primary:#2E8B57;--primary2:#1f7a49;--danger:#ef4444;--warn:#f59e0b;--ok:#10b981;--shadow:0 12px 30px rgba(2,6,23,.08);--r:18px}
    *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
    .wrap{max-width:1400px;margin:0 auto;padding:14px}
    .top{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px}
    .title{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.title h1{margin:0;font-size:1.25rem}.badge{padding:6px 10px;border-radius:999px;background:#eaf6ef;border:1px solid #d6efe1;color:var(--primary);font-weight:900;font-size:.8rem}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;cursor:pointer;border-radius:14px;padding:10px 12px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;color:inherit}
    .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary2)} .btn-ghost{background:#fff;border:1px solid var(--line)} .btn-danger{background:var(--danger);color:#fff}
    .grid{display:grid;gap:12px;grid-template-columns:1.1fr .9fr}
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
    .panel{padding:12px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .search{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);padding:10px 12px;border-radius:14px;flex:1;min-width:min(360px,100%)}
    .search input{border:none;outline:none;width:100%;font-size:1rem}
    .stats{display:grid;gap:10px;grid-template-columns:repeat(3,minmax(0,1fr));padding:12px}
    .stat{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}.stat .k{font-size:.8rem;color:var(--muted);font-weight:800}.stat .v{font-size:1.1rem;font-weight:1000;margin-top:4px}
    .list{padding:12px;display:grid;gap:10px;max-height:calc(100vh - 260px);overflow:auto}
    .p{display:grid;grid-template-columns:74px 1fr auto;gap:10px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:10px}
    .p img,.thumb{width:74px;height:74px;border-radius:14px;object-fit:cover;background:#f1f5f9;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center}
    .name{font-weight:1000}.meta{font-size:.82rem;color:var(--muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}.price{font-weight:1000;margin-top:6px}.small{font-size:.78rem;color:var(--muted)}
    .qty{display:flex;gap:8px;align-items:center}.qty input,.field input,.field textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;outline:none;font-weight:800;background:#fff}.qty input{width:74px}
    .cartHead{padding:12px;border-bottom:1px solid var(--line);display:grid;gap:10px}
    .cartList{padding:12px;display:grid;gap:10px;max-height:45vh;overflow:auto}
    .c{border:1px solid var(--line);border-radius:16px;padding:10px;display:grid;gap:8px}.cTop{display:flex;justify-content:space-between;gap:10px}.cName{font-weight:1000}.row{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.miniBtns{display:flex;gap:6px;align-items:center}.miniBtn{width:30px;height:30px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:1000;cursor:pointer}
    .totals{padding:12px;border-top:1px solid var(--line);display:grid;gap:10px;background:#fbfdff}.sum{display:flex;justify-content:space-between;gap:10px;font-weight:900}.sum.big{font-size:1.15rem}
    .field{display:grid;gap:6px}.field label{font-size:.8rem;color:var(--muted);font-weight:900}
    .pill{padding:6px 10px;border-radius:999px;font-size:.78rem;font-weight:900;border:1px solid var(--line);background:#fff}.ok{background:#ecfdf5;border-color:#c7f0df;color:#065f46}.warn{background:#fffbeb;border-color:#fde68a;color:#92400e}.bad{background:#fef2f2;border-color:#fecaca;color:#7f1d1d}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;width:min(560px,calc(100% - 24px));background:#111827;color:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 18px 60px rgba(0,0,0,.35);display:none;z-index:1000}.toast .t{font-weight:1000}.toast .d{opacity:.9;font-size:.9rem;margin-top:3px}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    .scanModal{position:fixed;inset:0;background:rgba(2,6,23,.65);display:none;align-items:center;justify-content:center;padding:14px;z-index:999}.scanCard{background:#fff;border-radius:22px;max-width:760px;width:100%;padding:14px}.scanCard video{width:100%;max-height:56vh;border-radius:18px;background:#000}
    @media (max-width: 980px){.grid{grid-template-columns:1fr}.list{max-height:none}.stats{grid-template-columns:1fr 1fr 1fr}}
    @media (max-width: 640px){.stats{grid-template-columns:1fr}.p{grid-template-columns:66px 1fr}.p > :last-child{grid-column:1/-1}.search{min-width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">
        <i class="fa-solid fa-cash-register" style="color:var(--primary);font-size:1.2rem"></i>
        <h1>OrzuMall Kassa</h1>
        <span class="badge" id="roleBadge">—</span>
        <a class="badge" href="./productstat.html" style="text-decoration:none"><i class="fa-solid fa-warehouse"></i> Ombor</a>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" id="btnScan"><i class="fa-solid fa-camera"></i> Barcode scan</button>
        <button class="btn btn-ghost" id="btnClearCart"><i class="fa-solid fa-trash"></i> Savatni tozalash</button>
        <button class="btn btn-danger" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i> Chiqish</button>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <div class="panel">
          <div class="search">
            <i class="fa-solid fa-magnifying-glass" style="color:var(--muted)"></i>
            <input id="q" placeholder="Mahsulot nomi, ID yoki barcode bo‘yicha qidiring" autocomplete="off" />
          </div>
          <div class="actions">
            <input id="barcodeInput" placeholder="Barcode kiriting" style="border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-weight:800;min-width:180px" />
            <button class="btn btn-primary" id="btnAddBarcode"><i class="fa-solid fa-plus"></i> Koddan qo‘shish</button>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="k">Ko‘rinayotgan mahsulot</div><div class="v" id="stProducts">0</div></div>
          <div class="stat"><div class="k">Savat dona</div><div class="v" id="stCartQty">0</div></div>
          <div class="stat"><div class="k">Savat summasi</div><div class="v" id="stCartSum">0</div></div>
        </div>
        <div class="list" id="productList"></div>
      </section>

      <section class="card">
        <div class="cartHead">
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap">
            <div style="font-weight:1000"><i class="fa-solid fa-basket-shopping" style="color:var(--primary)"></i> Savat</div>
            <span class="pill ok" id="cashierTag">—</span>
          </div>
          <div class="field">
            <label>Izoh / chek eslatmasi</label>
            <textarea id="saleNote" rows="2" placeholder="Masalan: Naqd to‘lov, do‘kon 1"></textarea>
          </div>
        </div>
        <div class="cartList" id="cartList"></div>
        <div class="totals">
          <div class="sum"><span>Jami dona</span><span id="cartQty">0</span></div>
          <div class="sum"><span>Tovar tannarxi</span><span id="cartCost">0 so‘m</span></div>
          <div class="sum"><span>Kutilgan foyda</span><span id="cartProfit">0 so‘m</span></div>
          <div class="sum big"><span>To‘lov summasi</span><span id="cartTotal">0 so‘m</span></div>
          <button class="btn btn-primary" id="btnCheckout"><i class="fa-solid fa-check"></i> Sotuvni yakunlash</button>
        </div>
      </section>
    </div>
  </div>

  <div class="scanModal" id="scanModal">
    <div class="scanCard">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px">
        <div style="font-weight:1000">Barcode scanner</div>
        <button class="btn btn-ghost" id="scanClose"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <video id="scanVideo" playsinline autoplay muted></video>
      <div class="small" style="margin-top:8px">Kamera kodni ko‘rsa mahsulot savatga qo‘shiladi.</div>
    </div>
  </div>

  <div class="toast" id="toast"><div class="t" id="tTitle">—</div><div class="d" id="tDesc">—</div></div>

  <script type="module">
    const ADMIN_EMAILS = ["sohibjonmath@gmail.com"];
    let FIREBASE_CONFIG = null;
    try { if (window.firebaseConfig) FIREBASE_CONFIG = window.firebaseConfig; } catch(e){}
    if (!FIREBASE_CONFIG) {
      FIREBASE_CONFIG = {
        apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
        authDomain: "xplusy-760fa.firebaseapp.com",
        databaseURL: "https://xplusy-760fa-default-rtdb.firebaseio.com",
        projectId: "xplusy-760fa",
        storageBucket: "xplusy-760fa.firebasestorage.app",
        messagingSenderId: "992512966017",
        appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80",
        measurementId: "G-459PLJ7P7L"
      };
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, getDoc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { GoogleAuthProvider, browserLocalPersistence, getAuth, onAuthStateChanged, setPersistence, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const PRODUCTS = "products";
    const EVENTS = "inventory_events";

    const $ = (s)=>document.querySelector(s);
    const qEl = $("#q");
    const barcodeInput = $("#barcodeInput");
    const productList = $("#productList");
    const cartList = $("#cartList");
    const saleNote = $("#saleNote");
    const btnAddBarcode = $("#btnAddBarcode");
    const btnClearCart = $("#btnClearCart");
    const btnCheckout = $("#btnCheckout");
    const btnScan = $("#btnScan");
    const btnLogout = $("#btnLogout");
    const scanModal = $("#scanModal");
    const scanVideo = $("#scanVideo");
    const scanClose = $("#scanClose");

    const toast = $("#toast"), tTitle = $("#tTitle"), tDesc = $("#tDesc");
    function fmt(n){ try{return new Intl.NumberFormat("uz-UZ").format(Number(n||0));}catch(e){return String(n||0);} }
    function showToast(title, desc, ms=2400){ tTitle.textContent=title; tDesc.textContent=desc||""; toast.style.display="block"; clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.style.display="none", ms); }

    let me=null, isAdmin=false, products=[];
    const cart = new Map();

    function getName(p){ return p?.name || p?.title || "Nomsiz"; }
    function getBarcode(p){ return String(p?.barcode || p?.barcodeValue || p?.ean13 || p?.sku || "").trim(); }
    function getCost(p){ return Number(p?.inventory?.costPriceUZS ?? p?.costPriceUZS ?? p?.cost ?? 0); }
    function getPrice(p){ return Number(p?.inventory?.unitPriceUZS ?? p?.priceUZS ?? p?.price ?? 0); }
    function inv(p){ const i=p?.inventory||{}; return { stock:Number(i.stock??0), lowThreshold:Number(i.lowThreshold??0), soldCount:Number(i.soldCount??0), soldSumUZS:Number(i.soldSumUZS??0), unitPriceUZS:Number(i.unitPriceUZS??0), costPriceUZS:Number(i.costPriceUZS??p?.costPriceUZS??0), note:String(i.note??"") }; }
    function img(p){ const a = Array.isArray(p?.images)&&p.images[0] ? p.images[0] : (p?.imageUrl||p?.image||""); return typeof a === 'string' ? a : (a?.url||a?.src||""); }
    function assigned(p){ return Array.isArray(p?.assignedSellerUids) ? p.assignedSellerUids : []; }
    function canSell(p){ return isAdmin || assigned(p).includes(me?.uid); }

    async function ensureAuth(){
      await setPersistence(auth, browserLocalPersistence);
      return new Promise((resolve)=>{
        onAuthStateChanged(auth, async(user)=>{
          if(!user){ resolve(null); return; }
          const email=(user.email||"").toLowerCase();
          let role="seller";
          isAdmin = ADMIN_EMAILS.map(x=>x.toLowerCase()).includes(email);
          me={uid:user.uid,email:user.email||"",displayName:user.displayName||"Foydalanuvchi",role};
          resolve(me);
        });
      });
    }
    async function requireLogin(){
      const user=await ensureAuth();
      if(user) return user;
      try{ await signInWithPopup(auth, provider); return await ensureAuth(); }
      catch(e){ showToast("Kirish bekor qilindi", e?.message||"Google login ishlamadi"); return null; }
    }

    function renderProducts(){
      const q=(qEl.value||"").trim().toLowerCase();
      const view = products.filter(x=>canSell(x.data||{})).filter(x=>{
        const p=x.data||{};
        return !q || x.id.toLowerCase().includes(q) || getName(p).toLowerCase().includes(q) || getBarcode(p).toLowerCase().includes(q);
      }).sort((a,b)=>getName(a.data).localeCompare(getName(b.data)));
      $("#stProducts").textContent = fmt(view.length);
      productList.innerHTML = view.length ? view.map(x=>{
        const p=x.data||{}, i=inv(p), barcode=getBarcode(p), price=Number(i.unitPriceUZS||0)||getPrice(p), cost=Number(i.costPriceUZS||0)||getCost(p), src=img(p);
        const stateClass = i.stock<=0 ? 'bad' : (i.stock<=i.lowThreshold ? 'warn':'ok');
        const stateText = i.stock<=0 ? 'Tugagan' : (i.stock<=i.lowThreshold ? 'Kam qoldi' : 'Yetarli');
        return `<div class="p">
          ${src ? `<img src="${src}" alt="${getName(p)}">` : `<div class="thumb"><i class="fa-solid fa-image" style="color:#94a3b8"></i></div>`}
          <div>
            <div class="name">${getName(p)}</div>
            <div class="meta"><span>ID: ${x.id}</span>${barcode?`<span>Kod: ${barcode}</span>`:''}<span class="pill ${stateClass}">${fmt(i.stock)} • ${stateText}</span></div>
            <div class="price">${fmt(price)} so‘m</div>
            <div class="small">Tannarx: ${fmt(cost)} so‘m • Foyda/dona: ${fmt(Math.max(0, price-cost))} so‘m</div>
          </div>
          <div class="qty">
            <input type="number" min="1" step="1" value="1" data-qty="${x.id}" />
            <button class="btn btn-primary" data-add="${x.id}"><i class="fa-solid fa-plus"></i></button>
          </div>
        </div>`;
      }).join("") : `<div class="empty">Mahsulot topilmadi</div>`;
    }

    function renderCart(){
      const items=[...cart.values()];
      let qty=0,total=0,cost=0;
      cartList.innerHTML = items.length ? items.map(item=>{
        qty += item.qty; total += item.qty*item.price; cost += item.qty*item.cost;
        return `<div class="c">
          <div class="cTop"><div><div class="cName">${item.name}</div><div class="small">${item.barcode||item.id}</div></div><button class="btn btn-ghost" data-remove="${item.id}"><i class="fa-solid fa-trash"></i></button></div>
          <div class="row"><span>Narx: ${fmt(item.price)} so‘m</span><span>Tannarx: ${fmt(item.cost)} so‘m</span></div>
          <div class="row"><span>Jami: ${fmt(item.qty*item.price)} so‘m</span><div class="miniBtns"><button class="miniBtn" data-dec="${item.id}">-</button><strong>${fmt(item.qty)}</strong><button class="miniBtn" data-inc="${item.id}">+</button></div></div>
        </div>`;
      }).join("") : `<div class="empty">Savat bo‘sh</div>`;
      $("#cartQty").textContent = fmt(qty);
      $("#cartTotal").textContent = fmt(total)+" so‘m";
      $("#cartCost").textContent = fmt(cost)+" so‘m";
      $("#cartProfit").textContent = fmt(Math.max(0,total-cost))+" so‘m";
      $("#stCartQty").textContent = fmt(qty);
      $("#stCartSum").textContent = fmt(total)+" so‘m";
    }

    function addToCartByProduct(x, qty=1){
      const p=x.data||{}, i=inv(p), price=Number(i.unitPriceUZS||0)||getPrice(p), cost=Number(i.costPriceUZS||0)||getCost(p);
      if(i.stock<=0){ showToast("Tugagan", `${getName(p)} omborda qolmagan`); return; }
      const ex=cart.get(x.id) || { id:x.id, name:getName(p), barcode:getBarcode(p), price, cost, qty:0 };
      if(ex.qty + qty > i.stock){ showToast("Yetarli emas", `Qoldiq: ${fmt(i.stock)}`); return; }
      ex.qty += qty; cart.set(x.id, ex); renderCart();
      showToast("Savatga qo‘shildi", `${getName(p)} × ${qty}`);
    }

    function addByBarcode(raw){
      const code=String(raw||"").trim();
      if(!code) return;
      const item = products.find(x=>canSell(x.data||{}) && getBarcode(x.data||{})===code);
      if(!item){ showToast("Topilmadi", "Bu barcode bilan mahsulot topilmadi"); return; }
      addToCartByProduct(item,1); barcodeInput.value="";
    }

    async function checkout(){
      const items=[...cart.values()];
      if(!items.length){ showToast("Savat bo‘sh","Avval mahsulot qo‘shing"); return; }
      const note=(saleNote.value||"").trim().slice(0,500);
      try{
        await runTransaction(db, async(tx)=>{
          const refs=[];
          for(const item of items){
            const ref=doc(db, PRODUCTS, item.id); const snap=await tx.get(ref);
            if(!snap.exists()) throw new Error(`Mahsulot topilmadi: ${item.id}`);
            const p=snap.data()||{};
            if(!canSell(p)) throw new Error(`${getName(p)} ni sotishga ruxsat yo‘q`);
            const i=inv(p); const unit=Number(i.unitPriceUZS||0)||getPrice(p); const cost=Number(i.costPriceUZS||0)||getCost(p);
            if(i.stock < item.qty) throw new Error(`${getName(p)} uchun qoldiq yetarli emas. Qoldiq: ${i.stock}`);
            tx.update(ref, {
              inventory:{ stock:i.stock-item.qty, lowThreshold:Number(i.lowThreshold||0), unitPriceUZS:Number(unit||0), costPriceUZS:Number(cost||0), soldCount:i.soldCount+item.qty, soldSumUZS:i.soldSumUZS + item.qty*unit, note:String(i.note||"") },
              updatedAt: serverTimestamp()
            });
            const evRef = doc(collection(db, EVENTS));
            tx.set(evRef, {
              type:'sold', source:'kassa', productId:item.id, productName:getName(p), barcode:getBarcode(p), qty:item.qty, unitPriceUZS:Number(unit||0), costPriceUZS:Number(cost||0), deltaStock:-item.qty, deltaSoldCount:+item.qty, deltaSoldSumUZS:+item.qty*unit, actorUid:me.uid, actorEmail:me.email, actorName:me.displayName, note, createdAt:serverTimestamp()
            });
          }
        });
        const total=[...cart.values()].reduce((s,x)=>s+x.qty*x.price,0);
        cart.clear(); saleNote.value=""; renderCart();
        showToast("Sotuv yakunlandi", `Umumiy summa: ${fmt(total)} so‘m`);
      }catch(err){ console.error(err); showToast("Xato", err?.message||"Sotuvni yakunlab bo‘lmadi", 4200); }
    }

    let scanStream=null, scanTimer=null;
    async function startScan(){
      if(!(window.BarcodeDetector && navigator.mediaDevices?.getUserMedia)){ showToast('Scanner yo‘q', 'Bu brauzer BarcodeDetector qo‘llamaydi'); return; }
      const formats = await BarcodeDetector.getSupportedFormats().catch(()=>[]);
      const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','upc_a','upc_e'].filter(x=>formats.includes(x)) });
      scanModal.style.display='flex';
      scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}});
      scanVideo.srcObject = scanStream;
      scanTimer = setInterval(async()=>{
        try{
          const out = await detector.detect(scanVideo);
          if(out?.length){ const code=out[0].rawValue||''; if(code){ addByBarcode(code); stopScan(); } }
        }catch(e){}
      }, 500);
    }
    function stopScan(){ if(scanTimer){ clearInterval(scanTimer); scanTimer=null; } if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; } scanVideo.srcObject=null; scanModal.style.display='none'; }

    document.addEventListener('click', (e)=>{
      const add=e.target.closest('[data-add]'); if(add){ const id=add.getAttribute('data-add'); const item=products.find(x=>x.id===id); const qty=Math.max(1, Math.floor(Number(document.querySelector(`[data-qty="${CSS.escape(id)}"]`)?.value||1))); if(item) addToCartByProduct(item,qty); return; }
      const inc=e.target.closest('[data-inc]'); if(inc){ const x=cart.get(inc.getAttribute('data-inc')); if(x){ addByBarcode(x.barcode || x.id); } return; }
      const dec=e.target.closest('[data-dec]'); if(dec){ const id=dec.getAttribute('data-dec'); const x=cart.get(id); if(x){ x.qty--; if(x.qty<=0) cart.delete(id); else cart.set(id,x); renderCart(); } return; }
      const rem=e.target.closest('[data-remove]'); if(rem){ cart.delete(rem.getAttribute('data-remove')); renderCart(); }
    });

    qEl.addEventListener('input', renderProducts);
    barcodeInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') addByBarcode(barcodeInput.value); });
    btnAddBarcode.onclick = ()=>addByBarcode(barcodeInput.value);
    btnClearCart.onclick = ()=>{ cart.clear(); renderCart(); };
    btnCheckout.onclick = checkout;
    btnScan.onclick = ()=>startScan().catch(err=>{ console.error(err); stopScan(); showToast('Kamera xato', err?.message||'Scanner ishlamadi'); });
    scanClose.onclick = stopScan;
    scanModal.addEventListener('click', (e)=>{ if(e.target===scanModal) stopScan(); });
    btnLogout.onclick = async()=>{ await signOut(auth); location.reload(); };

    async function boot(){
      const u=await requireLogin(); if(!u) return;
      isAdmin = ADMIN_EMAILS.map(x=>x.toLowerCase()).includes((u.email||'').toLowerCase());
      $("#roleBadge").textContent = isAdmin ? 'ADMIN' : 'SOTUVCHI';
      $("#cashierTag").textContent = `${u.displayName||'Foydalanuvchi'} • ${isAdmin?'admin':'seller'}`;
      onSnapshot(collection(db, PRODUCTS), (snap)=>{ const list=[]; snap.forEach(d=>list.push({id:d.id,data:d.data()||{}})); products=list; renderProducts(); renderCart(); }, (err)=>{ console.error(err); showToast('Xato','products o‘qilmadi'); });
      renderCart();
      showToast('Tayyor', 'Kassa ishga tushdi');
    }
    boot();
  </script>
</body>
</html>
