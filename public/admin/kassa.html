<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OrzuMall — Kassa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <style>
    :root{--bg:#f6f8fc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e5e7eb;--primary:#2E8B57;--primary2:#1f7a49;--danger:#ef4444;--shadow:0 14px 34px rgba(2,6,23,.08);--r:20px}
    *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f6f8fc,#edf7f1);color:var(--text)} a{text-decoration:none;color:inherit}
    .wrap{max-width:1480px;margin:0 auto;padding:12px}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;padding:8px 0 14px}.title{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.title h1{margin:0;font-size:1.18rem}.badge{padding:6px 10px;border-radius:999px;font-weight:900;font-size:.78rem;background:#eaf6ef;color:var(--primary);border:1px solid #d6efe1;white-space:nowrap}
    .btn{border:none;cursor:pointer;border-radius:16px;padding:11px 13px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.2s ease}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary2)}.btn-ghost{background:#fff;border:1px solid var(--line)}.btn-danger{background:var(--danger);color:#fff}.btn-sm{padding:8px 10px;border-radius:12px;font-size:.9rem}
    .toolCard,.cartCard,.browseCard{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
    .toolCard{padding:12px}.toolGrid{display:grid;gap:8px;grid-template-columns:1fr auto auto}.toolGrid input{width:100%;padding:12px 13px;border-radius:16px;border:1px solid var(--line);outline:none;font-weight:800;background:#fff}
    .mobileLayout{display:grid;gap:12px}.cartCard{overflow:hidden}.cartHead{padding:14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.cartTitle{font-weight:1000;font-size:1.02rem}.cartSub{font-size:.82rem;color:var(--muted);margin-top:2px}.noteBox{width:100%;padding:12px;border-radius:16px;border:1px solid var(--line);background:#fff;outline:none;font-weight:700;min-height:84px;resize:vertical}
    .cartItems{padding:12px;display:grid;gap:10px;max-height:45vh;overflow:auto}.cartItem{border:1px solid var(--line);border-radius:16px;padding:10px;display:grid;grid-template-columns:54px 1fr auto;gap:10px;align-items:center}.cartImg{width:54px;height:54px;border-radius:14px;background:#f1f5f9;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;overflow:hidden}.cartImg img{width:100%;height:100%;object-fit:cover}.cartName{font-weight:1000;line-height:1.25}.cartMeta{font-size:.78rem;color:var(--muted);margin-top:4px}.qtyCol{display:grid;gap:8px;justify-items:end}.qtyCtl{display:flex;align-items:center;gap:6px}.qtyBtn{width:32px;height:32px;border-radius:11px;border:1px solid var(--line);background:#fff;font-weight:1000;cursor:pointer}.qtyVal{min-width:26px;text-align:center;font-weight:1000}
    .sumBox{padding:12px;border-top:1px solid var(--line);background:#fbfdfb;display:grid;gap:10px}.sumRow{display:flex;justify-content:space-between;gap:10px;font-size:.96rem}.sumRow.total{font-size:1.08rem;font-weight:1000;padding-top:8px;border-top:1px dashed #cbd5e1}.empty{padding:26px 18px;text-align:center;color:var(--muted)}
    .stickyCheckout{position:sticky;bottom:10px;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:10px;display:grid;gap:10px;margin-top:12px}.quickStats{display:grid;gap:10px;grid-template-columns:repeat(2,minmax(0,1fr))}.stat{border:1px solid var(--line);border-radius:16px;padding:10px;background:#fff}.stat .k{font-size:.78rem;color:var(--muted);font-weight:900}.stat .v{font-size:1rem;font-weight:1000;margin-top:2px}
    .browseCard details{padding:0}.browseHead{padding:14px;border-bottom:1px solid var(--line);font-weight:1000;display:flex;justify-content:space-between;align-items:center;gap:10px}.search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);padding:10px 12px;border-radius:14px}.search input{border:none;outline:none;width:100%;font-size:.96rem}
    .browseList{padding:12px;display:grid;gap:10px}.browseItem{border:1px solid var(--line);border-radius:16px;padding:10px;display:grid;grid-template-columns:64px 1fr auto;gap:10px;align-items:center}.browseImg{width:64px;height:64px;border-radius:14px;background:#f1f5f9;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;overflow:hidden}.browseImg img{width:100%;height:100%;object-fit:cover}.browseName{font-weight:1000}.browseMeta{font-size:.78rem;color:var(--muted);margin-top:4px}.addBtn{width:44px;height:44px;border:none;border-radius:14px;background:var(--primary);color:#fff;font-size:1.05rem;font-weight:1000;cursor:pointer}
    .backdrop{position:fixed;inset:0;background:rgba(2,6,23,.58);display:none;align-items:center;justify-content:center;padding:12px;z-index:999}.modal{width:min(760px,100%);background:#fff;border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.25);overflow:hidden}.modalHeader{padding:14px;display:flex;justify-content:space-between;gap:10px;align-items:center;border-bottom:1px solid var(--line)}.modalBody{padding:14px} #scannerViewport{width:100%;min-height:320px;border-radius:18px;overflow:hidden;background:#000}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;width:min(560px,calc(100% - 24px));background:#111827;color:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 18px 60px rgba(0,0,0,.35);display:none;z-index:1000}.toast .t{font-weight:1000}.toast .d{opacity:.9;font-size:.9rem;margin-top:3px}
    @media(min-width:980px){.wrap{padding:18px}.mobileLayout{grid-template-columns:1.05fr .95fr}.quickStats{grid-template-columns:repeat(4,minmax(0,1fr))}.toolGrid{grid-template-columns:1fr 220px auto auto}.cartItems{max-height:52vh}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title"><i class="fa-solid fa-cash-register" style="color:var(--primary);font-size:1.2rem"></i><h1>OrzuMall Kassa</h1><span class="badge" id="roleBadge">—</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap"><a class="btn btn-ghost" href="./productstat.html"><i class="fa-solid fa-boxes-stacked"></i> Ombor</a><button class="btn btn-danger" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i> Chiqish</button></div>
    </div>

    <section class="toolCard">
      <div class="toolGrid">
        <div class="search"><i class="fa-solid fa-magnifying-glass" style="color:#64748b"></i><input id="searchInput" placeholder="Mahsulot nomi, ID yoki barcode bo‘yicha qidiring" autocomplete="off" /></div>
        <input id="barcodeInput" placeholder="Barcode kiriting" />
        <button class="btn btn-ghost" id="btnScan"><i class="fa-solid fa-camera"></i></button>
        <button class="btn btn-primary" id="btnAddBarcode"><i class="fa-solid fa-plus"></i> Qo‘shish</button>
      </div>
    </section>

    <section class="mobileLayout" style="margin-top:12px">
      <section class="cartCard">
        <div class="cartHead">
          <div><div class="cartTitle">Savat</div><div class="cartSub">Mobil uchun birinchi navbatda savat ko‘rinadi</div></div>
          <button class="btn btn-ghost btn-sm" id="btnClearCart"><i class="fa-solid fa-trash"></i> Tozalash</button>
          <textarea class="noteBox" id="saleNote" placeholder="Izoh / chek eslatmasi"></textarea>
        </div>
        <div class="cartItems" id="cartItems"></div>
        <div class="sumBox">
          <div class="sumRow"><span>Jami dona</span><b id="sumQty">0</b></div>
          <div class="sumRow"><span>Tovar tannarxi</span><b id="sumCost">0 so‘m</b></div>
          <div class="sumRow"><span>Kutilgan foyda</span><b id="sumProfit">0 so‘m</b></div>
          <div class="sumRow total"><span>To‘lov summasi</span><b id="sumRevenue">0 so‘m</b></div>
        </div>
        <div class="stickyCheckout">
          <div class="quickStats">
            <div class="stat"><div class="k">Savatdagi tur</div><div class="v" id="stKinds">0</div></div>
            <div class="stat"><div class="k">Jami dona</div><div class="v" id="stQty">0</div></div>
            <div class="stat"><div class="k">Umumiy summa</div><div class="v" id="stRevenue">0</div></div>
            <div class="stat"><div class="k">Foyda</div><div class="v" id="stProfit">0</div></div>
          </div>
          <button class="btn btn-primary" id="btnCheckout"><i class="fa-solid fa-check"></i> Sotuvni yakunlash</button>
        </div>
      </section>

      <section class="browseCard">
        <details open>
          <summary class="browseHead"><span>Mahsulotlar ro‘yxati</span><span style="font-size:.8rem;color:#64748b">Kerak bo‘lsa ochiladi</span></summary>
          <div class="browseList" id="browseList"></div>
        </details>
      </section>
    </section>
  </div>

  <div class="backdrop" id="scanBd"><div class="modal"><div class="modalHeader"><div><div style="font-weight:1000">Shtrix kod scanner</div><div style="font-size:.82rem;color:#64748b">Kod topilsa savatga qo‘shiladi</div></div><button class="btn btn-ghost" id="scanClose"><i class="fa-solid fa-xmark"></i></button></div><div class="modalBody"><div id="scannerViewport"></div></div></div></div>
  <div class="toast" id="toast"><div class="t" id="tTitle">—</div><div class="d" id="tDesc">—</div></div>

  <script type="module">
    const ADMIN_EMAILS=["sohibjonmath@gmail.com"];
    let FIREBASE_CONFIG=null; try{ if(window.firebaseConfig) FIREBASE_CONFIG=window.firebaseConfig; }catch(e){}
    if(!FIREBASE_CONFIG){ FIREBASE_CONFIG={ apiKey:"AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM", authDomain:"xplusy-760fa.firebaseapp.com", databaseURL:"https://xplusy-760fa-default-rtdb.firebaseio.com", projectId:"xplusy-760fa", storageBucket:"xplusy-760fa.firebasestorage.app", messagingSenderId:"992512966017", appId:"1:992512966017:web:5e919dbc9b8d8abcb43c80", measurementId:"G-459PLJ7P7L"}; }
    import { collection, doc, getDoc, getDocs, getFirestore, limit, query, runTransaction, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { GoogleAuthProvider, browserLocalPersistence, getAuth, onAuthStateChanged, setPersistence, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    const app=initializeApp(FIREBASE_CONFIG), db=getFirestore(app), auth=getAuth(app), provider=new GoogleAuthProvider();
    const $=s=>document.querySelector(s), fmt=n=>{ try{return new Intl.NumberFormat('uz-UZ').format(Number(n||0));}catch(e){return String(n||0)} };
    const toast=$('#toast'), tTitle=$('#tTitle'), tDesc=$('#tDesc'); function showToast(title,desc,ms=2600){ tTitle.textContent=title; tDesc.textContent=desc||''; toast.style.display='block'; clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.style.display='none',ms); }
    let me=null, isAdmin=false, products=[], cart=[], scanner=null;
    function getName(p){ return p?.name || p?.title || p?.nomi || 'Nomsiz'; }
    function getBarcode(p){ return String(p?.barcode || p?.barcodeText || '').trim(); }
    function getPrice(p){ return Number(p?.priceUZS ?? p?.price ?? p?.currentPriceUZS ?? p?.inventory?.unitPriceUZS ?? 0); }
    function getCost(p){ return Number(p?.costUZS ?? p?.inventory?.costUZS ?? 0); }
    function getStock(p){ return Number(p?.inventory?.stock ?? 0); }
    function getImageUrl(p){ const s=v=>typeof v==='string'&&v.trim()?v.trim():''; return s(p?.imageUrl)||s(p?.image)||(Array.isArray(p?.images)&&s(p.images[0]))||''; }
    function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
    function escapeAttr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }
    async function ensureAuth(){ await setPersistence(auth,browserLocalPersistence); return new Promise(resolve=>{ onAuthStateChanged(auth, async user=>{ if(!user){ resolve(null); return; } const email=(user.email||'').toLowerCase(); isAdmin=ADMIN_EMAILS.includes(email); let role=isAdmin?'admin':'seller'; if(!isAdmin){ try{ const us=await getDoc(doc(db,'users',user.uid)); if(us.exists() && us.data().role) role=String(us.data().role); }catch(e){} } me={uid:user.uid,email:user.email||'',displayName:user.displayName||'Foydalanuvchi',role}; isAdmin=isAdmin || role==='admin'; resolve(me); }); }); }
    async function requireLogin(){ const u=await ensureAuth(); if(u) return u; try{ await signInWithPopup(auth,provider); return await ensureAuth(); }catch(e){ showToast('Kirish bekor qilindi', e?.message||'Google login ishlamadi'); return null; } }
    $('#btnLogout').onclick=async()=>{ await signOut(auth); location.reload(); };
    async function loadProducts(){ const snap=await getDocs(collection(db,'products')); const list=[]; snap.forEach(d=>list.push({id:d.id,data:d.data()||{}})); products=list; renderBrowse(); }
    function filteredProducts(){ const q=($('#searchInput').value||'').trim().toLowerCase(); return products.filter(x=>!q || x.id.toLowerCase().includes(q) || getName(x.data).toLowerCase().includes(q) || getBarcode(x.data).toLowerCase().includes(q)); }
    function renderBrowse(){ const view=filteredProducts(); $('#browseList').innerHTML=view.map(x=>{ const p=x.data, img=getImageUrl(p), stock=getStock(p); return `<div class="browseItem"><div class="browseImg">${img?`<img src="${escapeAttr(img)}" alt="${escapeAttr(getName(p))}">`:'<i class="fa-solid fa-image" style="color:#94a3b8"></i>'}</div><div><div class="browseName">${escapeHtml(getName(p))}</div><div class="browseMeta">ID: ${escapeHtml(x.id)} • ${escapeHtml(getBarcode(p)||'—')}</div><div class="browseMeta">${fmt(getPrice(p))} so‘m • Qoldiq: ${fmt(stock)}</div></div><button class="addBtn" data-add="${escapeAttr(x.id)}">+</button></div>`; }).join('') || '<div class="empty">Mahsulot topilmadi</div>'; }
    function addItem(x, qty=1){ const p=x.data; const stock=getStock(p); if(stock<=0) return showToast('Tugagan', `${getName(p)} omborda qolmagan`); let row=cart.find(i=>i.id===x.id); if(row){ if(row.qty+qty>stock) return showToast('Yetarli emas', `Qoldiq: ${stock}`); row.qty+=qty; } else { row={ id:x.id, name:getName(p), barcode:getBarcode(p), price:getPrice(p), cost:getCost(p), stock, qty, imageUrl:getImageUrl(p) }; cart.unshift(row); } renderCart(); showToast('Qo‘shildi', getName(p)); }
    async function addByBarcode(code){ const c=String(code||'').trim(); if(!c) return; const found=products.find(x=>getBarcode(x.data)===c); if(found){ addItem(found,1); $('#barcodeInput').value=''; return; } try{ const snap=await getDocs(query(collection(db,'products'), where('barcode','==',c), limit(1))); if(snap.empty) return showToast('Topilmadi','Bu barcode bilan mahsulot yo‘q'); addItem({id:snap.docs[0].id,data:snap.docs[0].data()||{}},1); $('#barcodeInput').value=''; }catch(e){ console.error(e); showToast('Xato','Barcode bo‘yicha topib bo‘lmadi'); } }
    function renderCart(){ if(!cart.length){ $('#cartItems').innerHTML='<div class="empty">Savat bo‘sh</div>'; } else { $('#cartItems').innerHTML=cart.map((x,i)=>`<div class="cartItem"><div class="cartImg">${x.imageUrl?`<img src="${escapeAttr(x.imageUrl)}" alt="${escapeAttr(x.name)}">`:'<i class="fa-solid fa-image" style="color:#94a3b8"></i>'}</div><div><div class="cartName">${escapeHtml(x.name)}</div><div class="cartMeta">${escapeHtml(x.barcode||x.id)} • Narx: ${fmt(x.price)} so‘m</div><div class="cartMeta">Tannarx: ${fmt(x.cost)} • Qoldiq: ${fmt(x.stock)}</div></div><div class="qtyCol"><div class="qtyCtl"><button class="qtyBtn" data-act="minus" data-i="${i}">−</button><div class="qtyVal">${fmt(x.qty)}</div><button class="qtyBtn" data-act="plus" data-i="${i}">+</button></div><button class="btn btn-ghost btn-sm" data-act="remove" data-i="${i}"><i class="fa-solid fa-trash"></i></button></div></div>`).join(''); }
      const qty=cart.reduce((s,x)=>s+x.qty,0), revenue=cart.reduce((s,x)=>s+x.qty*x.price,0), cost=cart.reduce((s,x)=>s+x.qty*x.cost,0), profit=revenue-cost; $('#sumQty').textContent=fmt(qty); $('#sumRevenue').textContent=fmt(revenue)+' so‘m'; $('#sumCost').textContent=fmt(cost)+' so‘m'; $('#sumProfit').textContent=fmt(profit)+' so‘m'; $('#stKinds').textContent=fmt(cart.length); $('#stQty').textContent=fmt(qty); $('#stRevenue').textContent=fmt(revenue)+' so‘m'; $('#stProfit').textContent=fmt(profit)+' so‘m'; }
    document.addEventListener('click', e=>{ const add=e.target.closest('[data-add]'); if(add){ const x=products.find(p=>p.id===add.dataset.add); if(x) addItem(x,1); return; } const act=e.target.closest('[data-act]'); if(!act) return; const i=Number(act.dataset.i); if(!Number.isFinite(i) || !cart[i]) return; if(act.dataset.act==='remove'){ cart.splice(i,1); } if(act.dataset.act==='minus'){ cart[i].qty--; if(cart[i].qty<=0) cart.splice(i,1); } if(act.dataset.act==='plus'){ if(cart[i].qty+1>cart[i].stock) return showToast('Yetarli emas', `Qoldiq: ${cart[i].stock}`); cart[i].qty++; } renderCart(); });
    $('#searchInput').addEventListener('input', renderBrowse); $('#btnAddBarcode').onclick=()=>addByBarcode($('#barcodeInput').value); $('#barcodeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addByBarcode($('#barcodeInput').value); }); $('#btnClearCart').onclick=()=>{ cart=[]; renderCart(); };
    async function startScan(){ if(!(window.Html5Qrcode)) return showToast('Scanner yuklanmadi','Internetni tekshirib qayta urinib ko‘ring'); $('#scanBd').style.display='flex'; document.body.style.overflow='hidden'; try{ scanner=new Html5Qrcode('scannerViewport'); const cams=await Html5Qrcode.getCameras(); const cam=(cams||[]).find(c=>/back|rear|environment/i.test(c.label||'')) || (cams||[])[0]; if(!cam) throw new Error('Kamera topilmadi'); await scanner.start(cam.id, { fps:10, qrbox:{ width:260, height:120 }, aspectRatio:1.7778, experimentalFeatures:{ useBarCodeDetectorIfSupported:true } }, async(decodedText)=>{ $('#barcodeInput').value=String(decodedText||'').trim(); await stopScan(); addByBarcode($('#barcodeInput').value); }, ()=>{}); }catch(e){ console.error(e); await stopScan(); showToast('Kamera ochilmadi', e?.message||'Brauzer camera ruxsat bermadi'); } }
    async function stopScan(){ try{ if(scanner){ await scanner.stop().catch(()=>{}); await scanner.clear().catch(()=>{}); } }catch(e){} scanner=null; $('#scanBd').style.display='none'; document.body.style.overflow=''; document.querySelector('#scannerViewport').innerHTML=''; }
    $('#btnScan').onclick=startScan; $('#scanClose').onclick=stopScan; $('#scanBd').addEventListener('click', e=>{ if(e.target===$('#scanBd')) stopScan(); });
    $('#btnCheckout').onclick=async()=>{ if(!cart.length) return showToast('Savat bo‘sh','Avval mahsulot qo‘shing'); $('#btnCheckout').disabled=true; try{ const totalUZS=cart.reduce((s,x)=>s+x.qty*x.price,0), costTotalUZS=cart.reduce((s,x)=>s+x.qty*x.cost,0), profitUZS=totalUZS-costTotalUZS; await runTransaction(db, async tx=>{ const items=[]; for(const row of cart){ const ref=doc(db,'products',row.id), snap=await tx.get(ref); if(!snap.exists()) throw new Error(`${row.name}: mahsulot topilmadi`); const p=snap.data()||{}, inv=p.inventory||{}, stock=Number(inv.stock||0), soldCount=Number(inv.soldCount||0), soldSumUZS=Number(inv.soldSumUZS||0), unitPrice=Number(p.priceUZS ?? p.price ?? inv.unitPriceUZS ?? 0), costUZS=Number(p.costUZS ?? inv.costUZS ?? 0); if(stock<row.qty) throw new Error(`${row.name}: qoldiq yetarli emas (${stock})`); tx.update(ref,{ inventory:{ stock:stock-row.qty, lowThreshold:Number(inv.lowThreshold||3), soldCount:soldCount+row.qty, soldSumUZS:soldSumUZS+row.qty*unitPrice, unitPriceUZS:unitPrice, costUZS:costUZS, note:String(inv.note||'') }, updatedAt:serverTimestamp() }); items.push({ productId:row.id, name:getName(p), barcode:getBarcode(p), qty:row.qty, sellPriceUZS:unitPrice, costUZS, lineTotalUZS:row.qty*unitPrice, lineProfitUZS:row.qty*(unitPrice-costUZS) }); }
          tx.set(doc(collection(db,'sales')), { items, totalUZS, costTotalUZS, profitUZS, cashierUid:me.uid, cashierEmail:me.email, note:$('#saleNote').value.trim().slice(0,300), source:'kassa_mobile_first', createdAt:serverTimestamp() }); }); showToast('Savdo yakunlandi', `${fmt(totalUZS)} so‘mlik savdo yozildi`); cart=[]; $('#saleNote').value=''; renderCart(); loadProducts(); }catch(err){ console.error(err); showToast('Xato', err?.message||'Savdoni yakunlab bo‘lmadi'); } finally{ $('#btnCheckout').disabled=false; } };
    (async()=>{ const u=await requireLogin(); if(!u) return; $('#roleBadge').textContent=isAdmin?'ADMIN':'SOTUVCHI'; $('#roleBadge').style.background=isAdmin?'#e8f3ff':'#fff7ed'; $('#roleBadge').style.color=isAdmin?'#1d4ed8':'#9a3412'; await loadProducts(); renderCart(); })();
  </script>
</body>
</html>
