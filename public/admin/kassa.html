<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OrzuMall · kassa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f6;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1e293b;
      min-height: 100vh;
      background: radial-gradient(circle at 0% 40%, #e6f0ec, #dae6f0);
      padding: 0 0 20px 0;
    }

    /* glassmorphism asosiy */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 36px;
      box-shadow: 0 20px 40px -14px rgba(0,40,30,0.2), 0 4px 20px rgba(255,255,255,0.5) inset;
    }

    .neo-card {
      background: #f0f6fd;
      box-shadow: 9px 9px 18px #c2cfdd, -9px -9px 18px #ffffff;
      border-radius: 30px;
      border: none;
    }

    .wrap {
      max-width: 580px;
      margin: 0 auto;
      padding: 16px 18px;
    }

    /* header */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 8px 0;
    }

    .logo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(12px);
      padding: 8px 16px 8px 12px;
      border-radius: 60px;
      border: 1px solid rgba(46,139,87,0.2);
    }

    .logo-badge i {
      font-size: 1.5rem;
      color: #2e8b57;
    }

    .logo-badge span {
      font-weight: 700;
      font-size: 1.1rem;
      color: #1f4d37;
    }

    .role-tag {
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      background: white;
      border: 1px solid #b8d9cb;
      color: #1f6e43;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .icon-glossy {
      width: 48px;
      height: 48px;
      border-radius: 30px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #2e8b57;
      box-shadow: 0 10px 20px -8px rgba(20,70,40,0.3);
      border: 1px solid rgba(255,255,255,0.8);
      transition: 0.15s;
    }

    .icon-glossy:active {
      transform: scale(0.92);
      background: #e6f4ec;
    }

    /* qidiruv paneli */
    .search-panel {
      margin-bottom: 24px;
      padding: 16px 18px;
    }

    .search-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-field {
      flex: 2;
      min-width: 200px;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 4px 6px 4px 20px;
      border: 1px solid #c1dfd0;
    }

    .search-field i {
      color: #468b6a;
      font-size: 1rem;
    }

    .search-field input {
      width: 100%;
      border: none;
      background: transparent;
      padding: 14px 10px 14px 8px;
      font-size: 0.98rem;
      outline: none;
      font-weight: 500;
    }

    .barcode-wrapper {
      flex: 1;
      min-width: 140px;
      display: flex;
      background: white;
      border-radius: 60px;
      padding: 4px 4px 4px 20px;
      border: 1px solid #bcddce;
    }

    .barcode-wrapper input {
      width: 100%;
      border: none;
      background: transparent;
      padding: 14px 0;
      font-size: 0.95rem;
      outline: none;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-gloss {
      border: none;
      background: white;
      border-radius: 60px;
      padding: 14px 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e4d36;
      box-shadow: 0 8px 16px -6px #abc0b4;
      border: 1px solid #e1f0e8;
      transition: 0.1s;
    }

    .btn-gloss:active {
      transform: scale(0.95);
      background: #daf0e4;
    }

    .btn-primary-gloss {
      background: #1f6e43;
      color: white;
      border: none;
      box-shadow: 0 12px 24px -10px #0c452b;
    }

    .btn-primary-gloss:active {
      background: #155a35;
    }

    /* asosiy layout */
    .main-dashboard {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* savat */
    .cart-section {
      padding: 0;
      overflow: hidden;
    }

    .cart-header {
      padding: 22px 22px 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .cart-title h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(145deg, #1c5538, #287a4a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2px;
    }

    .cart-title p {
      font-size: 0.9rem;
      color: #3c6650;
    }

    .cart-note {
      padding: 0 22px;
    }

    .cart-note textarea {
      width: 100%;
      border: none;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      border-radius: 30px;
      padding: 16px 22px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 70px;
      border: 1px solid #bddace;
      outline: none;
      font-weight: 500;
    }

    .cart-items {
      padding: 8px 18px 12px;
      max-height: 40vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cart-item-row {
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 70px 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .cart-item-img {
      width: 70px;
      height: 70px;
      border-radius: 28px;
      background: #e5f0e9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid white;
    }

    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-item-info .name {
      font-weight: 800;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .cart-item-info .meta {
      font-size: 0.75rem;
      color: #3c6a51;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cart-item-qty {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 5px;
      background: white;
      border-radius: 30px;
      padding: 4px;
    }

    .qty-btn {
      width: 38px;
      height: 38px;
      border-radius: 30px;
      border: none;
      background: #f2faf5;
      font-weight: 800;
      font-size: 1.2rem;
      color: #2e8b57;
    }

    .qty-value {
      min-width: 30px;
      text-align: center;
      font-weight: 800;
    }

    .remove-btn {
      background: transparent;
      border: none;
      color: #b64a4a;
      font-size: 1.1rem;
    }

    /* summalar */
    .summary-box {
      padding: 18px 22px;
      background: rgba(255,255,255,0.3);
      border-top: 1px solid #d0e3d8;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      font-weight: 600;
    }

    .summary-row.total {
      font-size: 1.3rem;
      font-weight: 800;
      color: #1d5c3b;
      border-top: 2px dashed #a3c7b5;
      padding-top: 12px;
    }

    /* stats mini */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 22px 18px;
    }

    .stat-pill {
      background: white;
      border-radius: 40px;
      padding: 14px 12px;
      text-align: center;
      border: 1px solid #b8decb;
    }

    .stat-pill .label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #2b5f43;
    }

    .stat-pill .value {
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1.3;
    }

    /* produktlar ro‘yxati */
    .products-panel {
      padding: 16px 16px 20px;
    }

    details {
      width: 100%;
    }

    summary {
      font-weight: 700;
      font-size: 1.2rem;
      padding: 8px 8px 18px 8px;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #1c4b34;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .browse-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .browse-item {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 12px 18px 12px 12px;
      display: grid;
      grid-template-columns: 70px 1fr auto;
      gap: 14px;
      align-items: center;
      border: 1px solid white;
    }

    .browse-img {
      width: 70px;
      height: 70px;
      border-radius: 40px;
      background: #e2f0e8;
      overflow: hidden;
    }

    .browse-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .browse-info .prod-name {
      font-weight: 800;
      margin-bottom: 2px;
    }

    .browse-info .prod-meta {
      font-size: 0.72rem;
      color: #396f51;
    }

    .add-circle {
      width: 52px;
      height: 52px;
      border-radius: 40px;
      background: #1f6e43;
      border: none;
      color: white;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 22px -8px #154d30;
    }

    .add-circle:active {
      transform: scale(0.9);
      background: #145e36;
    }

    /* scanner modal */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,30,20,0.7);
      backdrop-filter: blur(14px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 1000;
    }

    .modal-modern {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(30px);
      width: min(560px, 100%);
      border-radius: 70px;
      border: 1px solid white;
      overflow: hidden;
      box-shadow: 0 40px 70px -10px #143525;
    }

    .modal-header {
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #b8decb;
    }

    #scannerViewport {
      width: 100%;
      min-height: 340px;
      background: #1e3829;
      border-radius: 0 0 50px 50px;
    }

    /* toast */
    .toast {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 30px;
      background: #1f3a2b;
      color: white;
      border-radius: 60px;
      padding: 18px 28px;
      box-shadow: 0 30px 50px -12px black;
      display: none;
      z-index: 1200;
      backdrop-filter: blur(14px);
      border: 1px solid #6fa386;
    }

    .toast .title {
      font-weight: 800;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #527a64;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- header premium -->
    <div class="top-bar">
      <div class="logo-badge">
        <i class="fa-solid fa-cube"></i>
        <span>OrzuMall</span>
      </div>
      <div class="role-tag" id="roleBadge">—</div>
      <div class="header-actions">
        <a href="./productstat.html" class="icon-glossy"><i class="fa-solid fa-warehouse"></i></a>
        <button class="icon-glossy" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>

    <!-- qidiruv + skaner paneli -->
    <div class="glass-panel search-panel">
      <div class="search-grid">
        <div class="search-field">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="searchInput" placeholder="Mahsulot nomi, ID" />
        </div>
        <div class="barcode-wrapper">
          <input id="barcodeInput" placeholder="Shtrix kod" />
        </div>
        <div class="action-buttons">
          <button class="btn-gloss" id="btnScan"><i class="fa-solid fa-camera"></i></button>
          <button class="btn-gloss btn-primary-gloss" id="btnAddBarcode"><i class="fa-solid fa-plus"></i>Qo‘shish</button>
        </div>
      </div>
    </div>

    <!-- asosiy qism: savat va mahsulotlar -->
    <div class="main-dashboard">
      <!-- savat block -->
      <div class="glass-panel cart-section">
        <div class="cart-header">
          <div class="cart-title">
            <h2>Savat</h2>
            <p><i class="fa-regular fa-clock"></i> mobil kassa</p>
          </div>
          <button class="btn-gloss" id="btnClearCart"><i class="fa-regular fa-trash-can"></i> tozalash</button>
        </div>

        <div class="cart-note">
          <textarea id="saleNote" placeholder="Chek uchun izoh ..."></textarea>
        </div>

        <div class="cart-items" id="cartItems"></div>

        <div class="summary-box">
          <div class="summary-row"><span>Jami dona:</span><span id="sumQty">0</span></div>
          <div class="summary-row"><span>Tannarx:</span><span id="sumCost">0 so‘m</span></div>
          <div class="summary-row"><span>Foyda:</span><span id="sumProfit">0 so‘m</span></div>
          <div class="summary-row total"><span>To‘lov:</span><span id="sumRevenue">0 so‘m</span></div>
        </div>

        <div class="stats-grid">
          <div class="stat-pill"><span class="label">turlar</span><div class="value" id="stKinds">0</div></div>
          <div class="stat-pill"><span class="label">dona</span><div class="value" id="stQty">0</div></div>
          <div class="stat-pill"><span class="label">summa</span><div class="value" id="stRevenue">0</div></div>
          <div class="stat-pill"><span class="label">foyda</span><div class="value" id="stProfit">0</div></div>
        </div>

        <div style="padding: 0 22px 26px;">
          <button class="btn-gloss btn-primary-gloss" id="btnCheckout" style="width:100%; padding:20px;"><i class="fa-regular fa-circle-check"></i> Sotuvni yakunlash</button>
        </div>
      </div>

      <!-- mahsulotlar ro‘yxati (accordion) -->
      <div class="glass-panel products-panel">
        <details open>
          <summary><span>📦 Mahsulotlar</span> <i class="fa-solid fa-chevron-down"></i></summary>
          <div class="browse-list" id="browseList"></div>
        </details>
      </div>
    </div>
  </div>

  <!-- scanner modal -->
  <div class="backdrop" id="scanBd">
    <div class="modal-modern">
      <div class="modal-header">
        <div><span style="font-weight:800;">Kamerani kodga tuting</span><p style="font-size:0.8rem; color:#366e4f;">avtomatik qo‘shiladi</p></div>
        <button class="icon-glossy" id="scanClose"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="scannerViewport"></div>
    </div>
  </div>

  <!-- toast -->
  <div class="toast" id="toast">
    <div class="title" id="tTitle">—</div>
    <div class="desc" id="tDesc">—</div>
  </div>

  <script type="module">
    // 🔥 Firebase konfiguratsiyasi (avvalgidek to‘liq)
    const ADMIN_EMAILS = ["sohibjonmath@gmail.com"];
    let FIREBASE_CONFIG = null;
    try { if (window.firebaseConfig) FIREBASE_CONFIG = window.firebaseConfig; } catch (e) {}
    if (!FIREBASE_CONFIG) {
      FIREBASE_CONFIG = {
        apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
        authDomain: "xplusy-760fa.firebaseapp.com",
        databaseURL: "https://xplusy-760fa-default-rtdb.firebaseio.com",
        projectId: "xplusy-760fa",
        storageBucket: "xplusy-760fa.firebasestorage.app",
        messagingSenderId: "992512966017",
        appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80",
        measurementId: "G-459PLJ7P7L"
      };
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { collection, doc, getDoc, getDocs, getFirestore, limit, query, runTransaction, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { GoogleAuthProvider, browserLocalPersistence, getAuth, onAuthStateChanged, setPersistence, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const app = initializeApp(FIREBASE_CONFIG), db = getFirestore(app), auth = getAuth(app), provider = new GoogleAuthProvider();
    const $ = s => document.querySelector(s);

    const toast = $('#toast'), tTitle = $('#tTitle'), tDesc = $('#tDesc');
    function showToast(title, desc, ms = 2600) { tTitle.innerText = title; tDesc.innerText = desc || ''; toast.style.display = 'block'; clearTimeout(window.toastTimer); window.toastTimer = setTimeout(() => toast.style.display = 'none', ms); }

    let me = null, isAdmin = false, products = [], cart = [], scanner = null;

    // yordamchi funksiyalar
    function getName(p) { return p?.name || p?.title || p?.nomi || 'Nomsiz'; }
    function getBarcode(p) { return String(p?.barcode || p?.barcodeText || '').trim(); }
    function getPrice(p) { return Number(p?.priceUZS ?? p?.price ?? p?.currentPriceUZS ?? p?.inventory?.unitPriceUZS ?? 0); }
    function getCost(p) { return Number(p?.costUZS ?? p?.inventory?.costUZS ?? 0); }
    function getStock(p) { return Number(p?.inventory?.stock ?? 0); }
    function getImageUrl(p) { const s = v => typeof v === 'string' && v.trim() ? v.trim() : ''; return s(p?.imageUrl) || s(p?.image) || (Array.isArray(p?.images) && s(p.images[0])) || ''; }
    function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }
    function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }
    function fmt(n) { try { return new Intl.NumberFormat('uz-UZ').format(Number(n || 0)); } catch (e) { return String(n || 0); } }

    // auth
    async function ensureAuth() {
      await setPersistence(auth, browserLocalPersistence);
      return new Promise(resolve => {
        onAuthStateChanged(auth, async user => {
          if (!user) { resolve(null); return; }
          const email = (user.email || '').toLowerCase();
          isAdmin = ADMIN_EMAILS.includes(email);
          let role = isAdmin ? 'admin' : 'seller';
          if (!isAdmin) {
            try { const us = await getDoc(doc(db, 'users', user.uid)); if (us.exists() && us.data().role) role = String(us.data().role); } catch (e) { }
          }
          me = { uid: user.uid, email: user.email || '', displayName: user.displayName || 'Foydalanuvchi', role };
          isAdmin = isAdmin || role === 'admin';
          resolve(me);
        });
      });
    }
    async function requireLogin() {
      const u = await ensureAuth();
      if (u) return u;
      try { await signInWithPopup(auth, provider); return await ensureAuth(); } catch (e) { showToast('Kirish bekor qilindi', e?.message || 'Google login ishlamadi'); return null; }
    }
    $('#btnLogout').onclick = async () => { await signOut(auth); location.reload(); };

    // mahsulotlarni yuklash
    async function loadProducts() {
      const snap = await getDocs(collection(db, 'products'));
      const list = [];
      snap.forEach(d => list.push({ id: d.id, data: d.data() || {} }));
      products = list;
      renderBrowse();
    }

    function filteredProducts() {
      const q = ($('#searchInput').value || '').trim().toLowerCase();
      return products.filter(x => !q || x.id.toLowerCase().includes(q) || getName(x.data).toLowerCase().includes(q) || getBarcode(x.data).toLowerCase().includes(q));
    }

    function renderBrowse() {
      const view = filteredProducts();
      $('#browseList').innerHTML = view.map(x => {
        const p = x.data, img = getImageUrl(p), stock = getStock(p);
        return `<div class="browse-item">
          <div class="browse-img">${img ? `<img src="${escapeAttr(img)}" alt="${escapeAttr(getName(p))}">` : '<i class="fa-solid fa-image" style="font-size:26px; color:#6d8f7d;"></i>'}</div>
          <div class="browse-info">
            <div class="prod-name">${escapeHtml(getName(p))}</div>
            <div class="prod-meta">${escapeHtml(getBarcode(p) || '—')} • ${fmt(getPrice(p))} so‘m</div>
            <div class="prod-meta">qoldiq: ${fmt(stock)}</div>
          </div>
          <button class="add-circle" data-add="${escapeAttr(x.id)}"><i class="fa-solid fa-plus"></i></button>
        </div>`;
      }).join('') || '<div class="empty-state">Mahsulot topilmadi</div>';
    }

    function addItem(x, qty = 1) {
      const p = x.data;
      const stock = getStock(p);
      if (stock <= 0) return showToast('Tugagan', `${getName(p)} omborda qolmagan`);
      let row = cart.find(i => i.id === x.id);
      if (row) {
        if (row.qty + qty > stock) return showToast('Yetarli emas', `Qoldiq: ${stock}`);
        row.qty += qty;
      } else {
        row = {
          id: x.id, name: getName(p), barcode: getBarcode(p), price: getPrice(p),
          cost: getCost(p), stock, qty, imageUrl: getImageUrl(p)
        };
        cart.unshift(row);
      }
      renderCart();
      showToast('Qo‘shildi', getName(p));
    }

    async function addByBarcode(code) {
      const c = String(code || '').trim();
      if (!c) return;
      const found = products.find(x => getBarcode(x.data) === c);
      if (found) { addItem(found, 1); $('#barcodeInput').value = ''; return; }
      try {
        const snap = await getDocs(query(collection(db, 'products'), where('barcode', '==', c), limit(1)));
        if (snap.empty) return showToast('Topilmadi', 'Bu barcode bilan mahsulot yo‘q');
        addItem({ id: snap.docs[0].id, data: snap.docs[0].data() || {} }, 1);
        $('#barcodeInput').value = '';
      } catch (e) { console.error(e); showToast('Xato', 'Barcode bo‘yicha topib bo‘lmadi'); }
    }

    function renderCart() {
      if (!cart.length) {
        $('#cartItems').innerHTML = '<div class="empty-state">Savat bo‘sh</div>';
      } else {
        $('#cartItems').innerHTML = cart.map((x, i) => `<div class="cart-item-row">
          <div class="cart-item-img">${x.imageUrl ? `<img src="${escapeAttr(x.imageUrl)}" alt="${escapeAttr(x.name)}">` : '<i class="fa-solid fa-image" style="font-size:28px; color:#729b87;"></i>'}</div>
          <div class="cart-item-info">
            <div class="name">${escapeHtml(x.name)}</div>
            <div class="meta"><span>${fmt(x.price)} so‘m</span> <span>✕${fmt(x.qty)}</span></div>
          </div>
          <div class="cart-item-qty">
            <div class="qty-control">
              <button class="qty-btn" data-act="minus" data-i="${i}">−</button>
              <span class="qty-value">${x.qty}</span>
              <button class="qty-btn" data-act="plus" data-i="${i}">+</button>
            </div>
            <button class="remove-btn" data-act="remove" data-i="${i}"><i class="fa-regular fa-trash-can"></i></button>
          </div>
        </div>`).join('');
      }
      const qty = cart.reduce((s, x) => s + x.qty, 0),
        revenue = cart.reduce((s, x) => s + x.qty * x.price, 0),
        cost = cart.reduce((s, x) => s + x.qty * x.cost, 0),
        profit = revenue - cost;
      $('#sumQty').innerText = fmt(qty);
      $('#sumRevenue').innerText = fmt(revenue) + ' so‘m';
      $('#sumCost').innerText = fmt(cost) + ' so‘m';
      $('#sumProfit').innerText = fmt(profit) + ' so‘m';
      $('#stKinds').innerText = fmt(cart.length);
      $('#stQty').innerText = fmt(qty);
      $('#stRevenue').innerText = fmt(revenue) + ' so‘m';
      $('#stProfit').innerText = fmt(profit) + ' so‘m';
    }

    // event listeners
    document.addEventListener('click', e => {
      const add = e.target.closest('[data-add]');
      if (add) {
        const x = products.find(p => p.id === add.dataset.add);
        if (x) addItem(x, 1);
        return;
      }
      const act = e.target.closest('[data-act]');
      if (!act) return;
      const i = Number(act.dataset.i);
      if (!Number.isFinite(i) || !cart[i]) return;
      if (act.dataset.act === 'remove') { cart.splice(i, 1); }
      if (act.dataset.act === 'minus') { cart[i].qty--; if (cart[i].qty <= 0) cart.splice(i, 1); }
      if (act.dataset.act === 'plus') {
        if (cart[i].qty + 1 > cart[i].stock) return showToast('Yetarli emas', `Qoldiq: ${cart[i].stock}`);
        cart[i].qty++;
      }
      renderCart();
    });

    $('#searchInput').addEventListener('input', renderBrowse);
    $('#btnAddBarcode').onclick = () => addByBarcode($('#barcodeInput').value);
    $('#barcodeInput').addEventListener('keydown', e => { if (e.key === 'Enter') addByBarcode($('#barcodeInput').value); });
    $('#btnClearCart').onclick = () => { cart = []; renderCart(); };

    // scanner
    async function startScan() {
      if (!window.Html5Qrcode) return showToast('Scanner yuklanmadi', 'Internetni tekshiring');
      $('#scanBd').style.display = 'flex'; document.body.style.overflow = 'hidden';
      try {
        scanner = new Html5Qrcode('scannerViewport');
        const cams = await Html5Qrcode.getCameras();
        const cam = (cams || []).find(c => /back|rear|environment/i.test(c.label || '')) || (cams || [])[0];
        if (!cam) throw new Error('Kamera topilmadi');
        await scanner.start(cam.id, { fps: 10, qrbox: { width: 260, height: 120 }, aspectRatio: 1.7778, experimentalFeatures: { useBarCodeDetectorIfSupported: true } },
          async (decodedText) => { $('#barcodeInput').value = String(decodedText || '').trim(); await stopScan(); addByBarcode($('#barcodeInput').value); },
          () => { });
      } catch (e) { console.error(e); await stopScan(); showToast('Kamera ochilmadi', e?.message || 'Ruxsat berilmagan'); }
    }
    async function stopScan() {
      try { if (scanner) { await scanner.stop().catch(() => { }); await scanner.clear().catch(() => { }); } } catch (e) { }
      scanner = null; $('#scanBd').style.display = 'none'; document.body.style.overflow = ''; $('#scannerViewport').innerHTML = '';
    }
    $('#btnScan').onclick = startScan; $('#scanClose').onclick = stopScan; $('#scanBd').addEventListener('click', e => { if (e.target === $('#scanBd')) stopScan(); });

    // checkout
    $('#btnCheckout').onclick = async () => {
      if (!cart.length) return showToast('Savat bo‘sh', 'Avval mahsulot qo‘shing');
      $('#btnCheckout').disabled = true;
      try {
        const totalUZS = cart.reduce((s, x) => s + x.qty * x.price, 0),
          costTotalUZS = cart.reduce((s, x) => s + x.qty * x.cost, 0),
          profitUZS = totalUZS - costTotalUZS;
        await runTransaction(db, async tx => {
          const items = [];
          for (const row of cart) {
            const ref = doc(db, 'products', row.id), snap = await tx.get(ref);
            if (!snap.exists()) throw new Error(`${row.name}: mahsulot topilmadi`);
            const p = snap.data() || {}, inv = p.inventory || {}, stock = Number(inv.stock || 0),
              soldCount = Number(inv.soldCount || 0), soldSumUZS = Number(inv.soldSumUZS || 0),
              unitPrice = Number(p.priceUZS ?? p.price ?? inv.unitPriceUZS ?? 0),
              costUZS = Number(p.costUZS ?? inv.costUZS ?? 0);
            if (stock < row.qty) throw new Error(`${row.name}: qoldiq yetarli emas (${stock})`);
            tx.update(ref, {
              inventory: {
                stock: stock - row.qty,
                lowThreshold: Number(inv.lowThreshold || 3),
                soldCount: soldCount + row.qty,
                soldSumUZS: soldSumUZS + row.qty * unitPrice,
                unitPriceUZS: unitPrice,
                costUZS: costUZS,
                note: String(inv.note || '')
              },
              updatedAt: serverTimestamp()
            });
            items.push({ productId: row.id, name: getName(p), barcode: getBarcode(p), qty: row.qty, sellPriceUZS: unitPrice, costUZS, lineTotalUZS: row.qty * unitPrice, lineProfitUZS: row.qty * (unitPrice - costUZS) });
          }
          tx.set(doc(collection(db, 'sales')), { items, totalUZS, costTotalUZS, profitUZS, cashierUid: me.uid, cashierEmail: me.email, note: $('#saleNote').value.trim().slice(0, 300), source: 'kassa_mobile_first', createdAt: serverTimestamp() });
        });
        showToast('Savdo yakunlandi', `${fmt(totalUZS)} so‘mlik savdo yozildi`);
        cart = []; $('#saleNote').value = ''; renderCart(); loadProducts();
      } catch (err) { console.error(err); showToast('Xato', err?.message || 'Savdoni yakunlab bo‘lmadi'); } finally { $('#btnCheckout').disabled = false; }
    };

    (async () => {
      const u = await requireLogin();
      if (!u) return;
      $('#roleBadge').innerText = isAdmin ? 'ADMIN' : 'SOTUVCHI';
      $('#roleBadge').style.background = isAdmin ? '#e2f0ff' : '#ffefd9';
      $('#roleBadge').style.color = isAdmin ? '#1d4ed8' : '#b45b0c';
      await loadProducts();
      renderCart();
    })();
  </script>
</body>
</html>
