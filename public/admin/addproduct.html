<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OrzuMall · yangi mahsulot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js" defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f4fa;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1e293b;
      line-height: 1.4;
      padding: 0 0 30px 0;
      min-height: 100vh;
      background: radial-gradient(circle at 0% 30%, #e9f0f9, #dbe7f2);
    }

    /* smooth glasmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0,32,64,0.15), 0 4px 18px rgba(255,255,255,0.6) inset;
    }

    .neo-raise {
      background: #f0f5fd;
      box-shadow: 9px 9px 18px #cbd5e1, -9px -9px 18px #ffffff;
      border-radius: 28px;
      border: none;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px 18px;
    }

    /* header */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      padding: 4px 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.4);
      padding: 8px 14px 8px 10px;
      border-radius: 60px;
      backdrop-filter: blur(8px);
      font-weight: 600;
      font-size: 1.1rem;
      color: #0f3b2c;
      border: 1px solid rgba(46,139,87,0.2);
    }

    .logo-area i {
      font-size: 1.5rem;
      color: #2e8b57;
    }

    .action-icons {
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      background: white;
      width: 48px;
      height: 48px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #2e8b57;
      box-shadow: 0 8px 18px -6px rgba(0,50,30,0.2);
      transition: 0.18s;
      border: 1px solid rgba(255,255,255,0.7);
    }

    .icon-btn:active {
      transform: scale(0.93);
      background: #e6f0ea;
    }

    /* sarlavha */
    .page-headline {
      margin: 18px 0 20px 0;
    }

    .page-headline h1 {
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(140deg, #0d422b, #1f6e43);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .page-headline p {
      font-size: 0.95rem;
      color: #3b5e4b;
      font-weight: 400;
      padding-left: 6px;
    }

    /* forma bloklari */
    .form-section {
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #1c4d3a;
      margin-bottom: 6px;
      margin-left: 8px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 4px 6px 4px 18px;
      border: 1px solid rgba(46,139,87,0.25);
      transition: 0.18s;
    }

    .input-wrapper:focus-within {
      border-color: #2e8b57;
      box-shadow: 0 0 0 5px rgba(46,139,87,0.15);
      background: white;
    }

    .input-wrapper input,
    .input-wrapper textarea {
      width: 100%;
      border: none;
      background: transparent;
      padding: 14px 6px 14px 0;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
    }

    .input-wrapper textarea {
      min-height: 70px;
      resize: vertical;
      padding: 12px 6px 8px 0;
    }

    .input-wrapper button {
      flex-shrink: 0;
      background: transparent;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 60px;
      font-size: 1.3rem;
      color: #2e8b57;
      transition: 0.12s;
    }

    .input-wrapper button:active {
      background: #d9ead3;
    }

    /* barcode preview */
    .barcode-preview {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 24px 16px 16px;
      margin: 24px 0 18px;
      border: 1px solid #cae0d2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    #barcodeSvg {
      max-width: 100%;
      height: auto;
      background: white;
      padding: 12px 10px;
      border-radius: 28px;
      box-shadow: 0 8px 18px -6px rgba(30,40,50,0.2);
    }

    .label-meta {
      font-size: 0.85rem;
      color: #1f513b;
      margin-top: 12px;
      font-weight: 500;
    }

    /* rasm thumbnail */
    .image-zone {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      margin: 24px 0 12px;
    }

    .thumb {
      width: 110px;
      height: 110px;
      border-radius: 40px;
      background: #eef3f0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid white;
      box-shadow: 0 10px 18px -8px #1d3b2e;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .upload-label {
      background: white;
      border-radius: 60px;
      padding: 12px 24px;
      font-weight: 600;
      color: #2e8b57;
      border: 1px solid #b1d5bf;
      box-shadow: 0 8px 14px -8px #204b33;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    #pImage {
      display: none;
    }

    /* sticky bottom */
    .sticky-bar {
      position: sticky;
      bottom: 14px;
      margin-top: 30px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 60px;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      box-shadow: 0 25px 45px -14px #192e21;
    }

    .btn {
      flex: 1;
      border: none;
      padding: 16px 6px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: white;
      color: #1e4a34;
      transition: 0.15s;
      border: 1px solid #d1e0d6;
    }

    .btn-primary {
      background: #1f6e43;
      color: white;
      border: none;
      box-shadow: 0 18px 28px -14px #0f442b;
    }

    .btn-primary:active {
      background: #135734;
      transform: scale(0.97);
    }

    .btn:active {
      background: #e6f0ea;
    }

    /* modal scanner */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,20,12,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal-glass {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(30px);
      width: min(560px, 100%);
      border-radius: 56px;
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 40px 70px -10px #1d3a2a;
      overflow: hidden;
    }

    .modal-header {
      padding: 20px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #bddace;
    }

    .modal-header .hint {
      font-size: 0.9rem;
      color: #1f5c3f;
    }

    #scannerViewport {
      width: 100%;
      min-height: 340px;
      background: #0e251c;
      border-radius: 0 0 40px 40px;
      overflow: hidden;
    }

    .toast {
      position: fixed;
      left: 20px;
      right: 20px;
      bottom: 26px;
      background: #1b2f26;
      color: white;
      border-radius: 60px;
      padding: 16px 26px;
      box-shadow: 0 25px 45px -8px black;
      display: none;
      z-index: 1200;
      font-weight: 500;
      backdrop-filter: blur(12px);
      border: 1px solid #598b70;
    }

    .toast .title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .toast .desc {
      opacity: 0.9;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="wrap">
  <!-- header minimalist -->
  <div class="top-bar">
    <div class="logo-area">
      <i class="fa-solid fa-cube"></i>
      <span>OrzuMall</span>
    </div>
    <div class="action-icons">
      <a href="./productstat.html" class="icon-btn"><i class="fa-solid fa-warehouse"></i></a>
      <a href="./kassa.html" class="icon-btn"><i class="fa-solid fa-cash-register"></i></a>
    </div>
  </div>

  <!-- dynamic headline -->
  <div class="page-headline">
    <h1>Yangi&nbsp;mahsulot</h1>
    <p><i class="fa-regular fa-pen-to-square" style="margin-right: 6px;"></i>Barcha qatorlarni to‘ldiring va saqlang</p>
  </div>

  <!-- katta form card -->
  <div class="glass-card" style="padding: 22px 18px;">
    <div class="field">
      <label><i class="fa-regular fa-note-sticky" style="margin-right: 6px;"></i>Nomi</label>
      <div class="input-wrapper">
        <input id="pName" type="text" placeholder="masalan: Olma qizil" />
      </div>
    </div>

    <div class="field">
      <label><i class="fa-solid fa-qrcode"></i> Shtrix kod</label>
      <div class="input-wrapper">
        <input id="pBarcode" placeholder="0000000000000" />
        <button id="btnScan"><i class="fa-solid fa-camera"></i></button>
        <button id="btnGen"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
      </div>
    </div>

    <!-- jonli barcode preview -->
    <div class="barcode-preview">
      <svg id="barcodeSvg" style="width:100%; max-height:82px;"></svg>
      <div class="label-meta" id="labelMeta">👆 kod yaratilsa preview chiqadi</div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
      <div class="field">
        <label>Sotuv narxi</label>
        <div class="input-wrapper"><input id="pPrice" type="number" placeholder="so‘m" /></div>
      </div>
      <div class="field">
        <label>Tannarx</label>
        <div class="input-wrapper"><input id="pCost" type="number" placeholder="so‘m" /></div>
      </div>
    </div>

    <div class="field">
      <label><i class="fa-regular fa-clock"></i> Soni (dona)</label>
      <div class="input-wrapper"><input id="pStock" type="number" value="1" min="0" /></div>
    </div>

    <div class="field">
      <label>Qisqa izoh</label>
      <div class="input-wrapper"><textarea id="pNote" placeholder="raf / rang / o‘lcham"></textarea></div>
    </div>

    <!-- rasm yuklash -->
    <div class="image-zone">
      <div class="thumb" id="thumbBox"><i class="fa-solid fa-cloud-arrow-up" style="font-size: 32px; color: #467a5e;"></i></div>
      <label for="pImage" class="upload-label"><i class="fa-regular fa-image"></i> yukla</label>
      <input type="file" id="pImage" accept="image/*" capture="environment" />
    </div>
  </div>

  <!-- sticky panel -->
  <div class="sticky-bar">
    <button class="btn" id="btnClear"><i class="fa-regular fa-trash-can"></i> toza</button>
    <button class="btn btn-primary" id="btnSave"><i class="fa-regular fa-floppy-disk"></i> saqla</button>
    <button class="btn" id="btnPrint"><i class="fa-regular fa-print"></i> yorliq</button>
  </div>
</div>

<!-- scanner modal -->
<div class="backdrop" id="scanBd">
  <div class="modal-glass">
    <div class="modal-header">
      <div><span style="font-weight: 700;">Kamerani kodga tuting</span><div class="hint">topilishi bilan yopiladi</div></div>
      <button class="icon-btn" id="scanClose" style="background:white;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="scannerViewport"></div>
  </div>
</div>

<!-- toast -->
<div class="toast" id="toast">
  <div class="title" id="tTitle">—</div>
  <div class="desc" id="tDesc"></div>
</div>

<script type="module">
  // 🔥 Firebase config, auth, db (xuddi avvalgidek, mukammal ishlaydi)
  const ADMIN_EMAILS = ["sohibjonmath@gmail.com"];
  let FIREBASE_CONFIG = null;
  try { if (window.firebaseConfig) FIREBASE_CONFIG = window.firebaseConfig; } catch (e) {}
  if (!FIREBASE_CONFIG) {
    FIREBASE_CONFIG = {
      apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
      authDomain: "xplusy-760fa.firebaseapp.com",
      databaseURL: "https://xplusy-760fa-default-rtdb.firebaseio.com",
      projectId: "xplusy-760fa",
      storageBucket: "xplusy-760fa.firebasestorage.app",
      messagingSenderId: "992512966017",
      appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80",
      measurementId: "G-459PLJ7P7L"
    };
  }

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { addDoc, collection, getDocs, getFirestore, limit, query, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { GoogleAuthProvider, browserLocalPersistence, getAuth, onAuthStateChanged, setPersistence, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const app = initializeApp(FIREBASE_CONFIG), db = getFirestore(app), auth = getAuth(app), provider = new GoogleAuthProvider();
  const $ = s => document.querySelector(s);
  const toast = $('#toast'), tTitle = $('#tTitle'), tDesc = $('#tDesc');
  function showToast(title, desc, ms = 2600) { tTitle.innerText = title; tDesc.innerText = desc || ''; toast.style.display = 'block'; clearTimeout(window.toastTimer); window.toastTimer = setTimeout(() => toast.style.display = 'none', ms); }

  let me = null, scanner = null, imageData = '';

  async function ensureAuth() {
    await setPersistence(auth, browserLocalPersistence);
    return new Promise(resolve => {
      onAuthStateChanged(auth, async user => {
        if (!user) { resolve(null); return; }
        let role = 'seller';
        const email = (user.email || '').toLowerCase();
        if (ADMIN_EMAILS.includes(email)) role = 'admin';
        else { try { const us = await getDoc(doc(db, 'users', user.uid)); if (us.exists() && us.data().role) role = String(us.data().role); } catch (e) {} }
        me = { uid: user.uid, email: user.email || '', displayName: user.displayName || 'Foydalanuvchi', role };
        resolve(me);
      });
    });
  }

  async function requireLogin() {
    const u = await ensureAuth();
    if (u) return u;
    try { await signInWithPopup(auth, provider); return await ensureAuth(); } 
    catch (e) { showToast('Kirish bekor qilindi', e?.message || 'Google login ishlamadi'); return null; }
  }

  // EAN13 va barcode funksiyalar
  function ean13CheckDigit(code12) {
    const s = String(code12).replace(/\D/g, '').slice(0,12);
    if (s.length !== 12) return '';
    let sum = 0; for (let i = 0; i < 12; i++) sum += Number(s[i]) * (i % 2 === 0 ? 1 : 3);
    return String((10 - (sum % 10)) % 10);
  }

  function generateEAN13() {
    let base = String(Date.now()).replace(/\D/g,'').slice(-8);
    while (base.length < 8) base = '0' + base;
    const rand = String(Math.floor(Math.random() * 10000)).padStart(4,'0');
    const first12 = '2999' + base.slice(0,4) + rand;
    return first12.slice(0,12) + ean13CheckDigit(first12.slice(0,12));
  }

  function renderBarcode() {
    const code = $('#pBarcode').value.trim();
    const name = $('#pName').value.trim();
    if (!code) { $('#barcodeSvg').innerHTML = ''; $('#labelMeta').innerText = '👆 kod yaratilsa preview chiqadi'; return; }
    try {
      JsBarcode('#barcodeSvg', code, { format: code.length === 13 ? 'EAN13' : 'CODE128', displayValue: true, fontSize: 16, margin: 8, height: 56, background: 'transparent' });
      $('#labelMeta').innerText = `${name || 'Mahsulot'} • ${code}`;
    } catch (e) { $('#barcodeSvg').innerHTML = ''; $('#labelMeta').innerText = 'Kodni tekshiring'; }
  }

  $('#pBarcode').addEventListener('input', renderBarcode);
  $('#pName').addEventListener('input', renderBarcode);
  $('#btnGen').onclick = () => { $('#pBarcode').value = generateEAN13(); renderBarcode(); showToast('Yangi kod yaratildi', $('#pBarcode').value); };

  // rasm siqish
  async function shrinkImage(file) {
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => {
        const img = new Image();
        img.onload = () => {
          const max = 900; let w = img.width, h = img.height;
          const sc = Math.min(1, max / Math.max(w, h));
          w = Math.round(w * sc); h = Math.round(h * sc);
          const c = document.createElement('canvas'); c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL('image/jpeg', 0.82));
        }; img.onerror = reject; img.src = fr.result;
      }; fr.onerror = reject; fr.readAsDataURL(file);
    });
  }

  $('#pImage').addEventListener('change', async () => {
    const f = $('#pImage').files?.[0];
    if (!f) { imageData = ''; $('#thumbBox').innerHTML = '<i class="fa-solid fa-cloud-arrow-up" style="font-size:32px;color:#467a5e;"></i>'; return; }
    try { imageData = await shrinkImage(f); $('#thumbBox').innerHTML = `<img src="${imageData}" alt="preview">`; } 
    catch (e) { showToast('Rasm xato', 'Siqish amalga oshmadi'); }
  });

  $('#btnClear').onclick = () => {
    $('#pName').value = ''; $('#pBarcode').value = ''; $('#pPrice').value = ''; $('#pCost').value = ''; $('#pStock').value = '1';
    $('#pNote').value = ''; $('#pImage').value = ''; imageData = ''; $('#thumbBox').innerHTML = '<i class="fa-solid fa-cloud-arrow-up" style="font-size:32px;color:#467a5e;"></i>'; renderBarcode();
  };

  $('#btnPrint').onclick = () => {
    const code = $('#pBarcode').value.trim();
    if (!code) return showToast('Kod yo‘q', 'Avval barcode yarating');
    const w = window.open('', '_blank', 'width=420,height=260');
    w.document.write(`<!doctype html><html><head><title>Barcode</title><style>body{font-family:Arial;padding:14px}.n{font-weight:700;margin-bottom:8px}</style></head><body><div class="n">${($('#pName').value || 'Mahsulot')}</div>${$('#barcodeSvg').outerHTML}<script>window.onload=()=>window.print()<\/script></body></html>`);
    w.document.close();
  };

  // scanner
  async function startScan() {
    if (!window.Html5Qrcode) return showToast('Scanner yuklanmadi', 'Internetni tekshiring');
    $('#scanBd').style.display = 'flex'; document.body.style.overflow = 'hidden';
    try {
      scanner = new Html5Qrcode('scannerViewport');
      const cams = await Html5Qrcode.getCameras();
      const cam = (cams || []).find(c => /back|rear|environment/i.test(c.label || '')) || (cams || [])[0];
      if (!cam) throw new Error('Kamera topilmadi');
      await scanner.start(cam.id, { fps: 10, qrbox: { width: 260, height: 120 }, aspectRatio: 1.7778, experimentalFeatures: { useBarCodeDetectorIfSupported: true } }, 
        async (decodedText) => { $('#pBarcode').value = String(decodedText || '').trim(); renderBarcode(); await stopScan(); }, 
        () => {});
    } catch (e) { console.error(e); await stopScan(); showToast('Kamera ochilmadi', e?.message || 'Ruxsat berilmagan'); }
  }

  async function stopScan() {
    try { if (scanner) { await scanner.stop().catch(()=>{}); await scanner.clear().catch(()=>{}); } } catch(e){} 
    scanner = null; $('#scanBd').style.display = 'none'; document.body.style.overflow = ''; $('#scannerViewport').innerHTML = '';
  }

  $('#btnScan').onclick = startScan; $('#scanClose').onclick = stopScan; $('#scanBd').addEventListener('click', e => { if (e.target === $('#scanBd')) stopScan(); });

  $('#btnSave').onclick = async () => {
    const name = $('#pName').value.trim(), barcode = $('#pBarcode').value.trim(), price = Math.max(0, Math.floor(Number($('#pPrice').value || 0))), cost = Math.max(0, Math.floor(Number($('#pCost').value || 0))), stock = Math.max(0, Math.floor(Number($('#pStock').value || 0))), note = $('#pNote').value.trim().slice(0,300);
    if (!name) return showToast('Nom kiritilmagan', 'Mahsulot nomini yozing');
    if (!barcode) return showToast('Barcode yo‘q', 'Scan qiling yoki yaratish tugmasini bosing');
    try {
      const dup = await getDocs(query(collection(db, 'products'), where('barcode', '==', barcode), limit(1)));
      if (!dup.empty) return showToast('Takror barcode', 'Bu barcode allaqachon bor');
      const payload = { name, title: name, barcode, barcodeText: barcode, priceUZS: price, currentPriceUZS: price, costUZS: cost, imageUrl: imageData || '', images: imageData ? [imageData] : [], quickDraft: true, approved: true, status: 'active', source: 'addproduct_mobile', inventory: { stock, lowThreshold: 3, soldCount: 0, soldSumUZS: 0, unitPriceUZS: price, costUZS: cost, note }, createdAt: serverTimestamp(), updatedAt: serverTimestamp(), createdBy: me.uid, createdByEmail: me.email };
      const ref = await addDoc(collection(db, 'products'), payload);
      showToast('Saqlandi', `Yangi mahsulot: ${ref.id}`, 3000);
      setTimeout(() => location.href = './productstat.html', 900);
    } catch (e) { console.error(e); showToast('Saqlash xatosi', e?.message || 'Mahsulot qo‘shib bo‘lmadi'); }
  };

  (async () => {
    const u = await requireLogin();
    if (!u) return;
    if (me.role !== 'admin' && !ADMIN_EMAILS.includes((me.email || '').toLowerCase())) showToast('Eslatma', 'Bu sahifa admin uchun qulaylashtirilgan');
    renderBarcode();
  })();
</script>
</body>
</html>
