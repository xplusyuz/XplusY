<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>OrzuMall — Add Product</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js" defer></script>
  <style>
    :root{--bg:#f6f8fc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e5e7eb;--primary:#2E8B57;--primary2:#1f7a49;--danger:#ef4444;--shadow:0 12px 30px rgba(2,6,23,.08);--r:22px}
    *{box-sizing:border-box} body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#f6f8fc,#eef6f1);color:var(--text)} a{text-decoration:none;color:inherit}
    .wrap{max-width:720px;margin:0 auto;padding:14px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;padding:8px 0 14px}.title{display:flex;align-items:center;gap:10px}.title h1{margin:0;font-size:1.2rem}.actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:none;cursor:pointer;border-radius:16px;padding:11px 13px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.2s ease}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary2)}.btn-ghost{background:#fff;border:1px solid var(--line)}.btn-danger{background:var(--danger);color:#fff}
    .card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}.cardHead{padding:16px;border-bottom:1px solid var(--line)}.cardTitle{font-weight:1000;font-size:1.05rem}.cardSub{font-size:.86rem;color:var(--muted);margin-top:4px;line-height:1.45}.cardBody{padding:16px}
    .field{margin-bottom:14px}.field label{display:block;font-size:.84rem;color:var(--muted);font-weight:900;margin-bottom:6px}.field input,.field textarea{width:100%;padding:12px 13px;border-radius:16px;border:1px solid var(--line);outline:none;font-weight:800;background:#fff}.field textarea{min-height:78px;resize:vertical}.field input:focus,.field textarea:focus{border-color:#b7e4cc;box-shadow:0 0 0 4px rgba(46,139,87,.12)}
    .inline{display:grid;grid-template-columns:1fr auto auto;gap:8px}.hint{font-size:.78rem;color:var(--muted);margin-top:6px}
    .preview{display:grid;gap:12px}.thumb{height:170px;border-radius:18px;border:1px solid #e2e8f0;background:#f8fafc;display:flex;align-items:center;justify-content:center;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover}.labelBox{border:1px dashed #cbd5e1;border-radius:18px;padding:10px;background:#fff}.labelBox svg{max-width:100%;height:74px}.labelMeta{font-size:.78rem;color:var(--muted)}
    .stickyBar{position:sticky;bottom:10px;margin-top:16px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px;padding:10px;display:flex;gap:10px;flex-wrap:wrap}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;width:min(560px,calc(100% - 24px));background:#111827;color:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 18px 60px rgba(0,0,0,.35);display:none;z-index:1000}.toast .t{font-weight:1000}.toast .d{opacity:.9;font-size:.9rem;margin-top:3px}
    .backdrop{position:fixed;inset:0;background:rgba(2,6,23,.58);display:none;align-items:center;justify-content:center;padding:12px;z-index:999}.modal{width:min(760px,100%);background:#fff;border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.25);overflow:hidden}.modalHeader{padding:14px;display:flex;justify-content:space-between;gap:10px;align-items:center;border-bottom:1px solid var(--line)}.modalBody{padding:14px} #scannerViewport{width:100%;min-height:320px;border-radius:18px;overflow:hidden;background:#000}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title"><i class="fa-solid fa-mobile-screen-button" style="color:var(--primary);font-size:1.2rem"></i><h1>Add Product</h1></div>
      <div class="actions"><a class="btn btn-ghost" href="./productstat.html"><i class="fa-solid fa-arrow-left"></i> Ombor</a><a class="btn btn-ghost" href="./kassa.html"><i class="fa-solid fa-cash-register"></i> Kassa</a></div>
    </div>

    <section class="card">
      <div class="cardHead"><div class="cardTitle">Telefon uchun tez forma</div><div class="cardSub">Bitta sahifada scan, barcode yaratish, rasm va narxlarni kiritib darrov saqlash mumkin.</div></div>
      <div class="cardBody">
        <div class="field"><label>Mahsulot nomi</label><input id="pName" placeholder="Masalan: AXIS-Y serum" /></div>
        <div class="field"><label>Barcode</label><div class="inline"><input id="pBarcode" placeholder="Scan qiling yoki yarating" /><button class="btn btn-ghost" id="btnScan"><i class="fa-solid fa-camera"></i></button><button class="btn btn-ghost" id="btnGen"><i class="fa-solid fa-wand-magic-sparkles"></i></button></div><div class="hint">Kamera scan ishlamasa “yaratish” tugmasi yangi EAN-13 beradi.</div></div>
        <div class="field"><label>Sotuv narxi (so‘m)</label><input id="pPrice" type="number" min="0" step="1" placeholder="180000" /></div>
        <div class="field"><label>Tannarx (so‘m)</label><input id="pCost" type="number" min="0" step="1" placeholder="120000" /></div>
        <div class="field"><label>Ombordagi soni</label><input id="pStock" type="number" min="0" step="1" value="1" /></div>
        <div class="field"><label>Qisqa izoh</label><textarea id="pNote" placeholder="Raf, hajm, rang yoki qisqa eslatma"></textarea></div>
        <div class="field"><label>Rasm</label><input id="pImage" type="file" accept="image/*" capture="environment" /></div>
        <div class="preview">
          <div class="thumb" id="thumbBox"><i class="fa-solid fa-image" style="color:#94a3b8"></i></div>
          <div class="labelBox"><svg id="barcodeSvg"></svg><div class="labelMeta" id="labelMeta">Barcode tayyor bo‘lsa shu yerda ko‘rinadi.</div></div>
        </div>
      </div>
    </section>

    <div class="stickyBar">
      <button class="btn btn-primary" id="btnSave" style="flex:1"><i class="fa-solid fa-floppy-disk"></i> Saqlash</button>
      <button class="btn btn-ghost" id="btnPrint"><i class="fa-solid fa-print"></i> Yorliq</button>
      <button class="btn btn-ghost" id="btnClear"><i class="fa-solid fa-eraser"></i> Tozalash</button>
    </div>
  </div>

  <div class="backdrop" id="scanBd"><div class="modal"><div class="modalHeader"><div><div style="font-weight:1000">Shtrix kod scanner</div><div class="hint">Kod topilsa forma to‘ladi</div></div><button class="btn btn-ghost" id="scanClose"><i class="fa-solid fa-xmark"></i></button></div><div class="modalBody"><div id="scannerViewport"></div></div></div></div>
  <div class="toast" id="toast"><div class="t" id="tTitle">—</div><div class="d" id="tDesc">—</div></div>

  <script type="module">
    const ADMIN_EMAILS=["sohibjonmath@gmail.com"];
    let FIREBASE_CONFIG=null; try{ if(window.firebaseConfig) FIREBASE_CONFIG=window.firebaseConfig; }catch(e){}
    if(!FIREBASE_CONFIG){ FIREBASE_CONFIG={ apiKey:"AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM", authDomain:"xplusy-760fa.firebaseapp.com", databaseURL:"https://xplusy-760fa-default-rtdb.firebaseio.com", projectId:"xplusy-760fa", storageBucket:"xplusy-760fa.firebasestorage.app", messagingSenderId:"992512966017", appId:"1:992512966017:web:5e919dbc9b8d8abcb43c80", measurementId:"G-459PLJ7P7L"}; }
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { addDoc, collection, doc, getDoc, getDocs, getFirestore, limit, query, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { GoogleAuthProvider, browserLocalPersistence, getAuth, onAuthStateChanged, setPersistence, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    const app=initializeApp(FIREBASE_CONFIG), db=getFirestore(app), auth=getAuth(app), provider=new GoogleAuthProvider();
    const $=s=>document.querySelector(s), fmt=n=>{ try{return new Intl.NumberFormat('uz-UZ').format(Number(n||0));}catch(e){return String(n||0)} };
    const toast=$('#toast'), tTitle=$('#tTitle'), tDesc=$('#tDesc'); function showToast(title,desc,ms=2600){ tTitle.textContent=title; tDesc.textContent=desc||''; toast.style.display='block'; clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.style.display='none',ms); }
    let me=null, scanner=null, imageData='';
    async function ensureAuth(){ await setPersistence(auth,browserLocalPersistence); return new Promise(resolve=>{ onAuthStateChanged(auth, async user=>{ if(!user){ resolve(null); return; } let role='seller'; const email=(user.email||'').toLowerCase(); if(ADMIN_EMAILS.includes(email)) role='admin'; else { try{ const us=await getDoc(doc(db,'users',user.uid)); if(us.exists() && us.data().role) role=String(us.data().role); }catch(e){} } me={uid:user.uid,email:user.email||'',displayName:user.displayName||'Foydalanuvchi',role}; resolve(me); }); }); }
    async function requireLogin(){ const u=await ensureAuth(); if(u) return u; try{ await signInWithPopup(auth,provider); return await ensureAuth(); }catch(e){ showToast('Kirish bekor qilindi', e?.message||'Google login ishlamadi'); return null; } }
    function ean13CheckDigit(code12){ const s=String(code12).replace(/\D/g,'').slice(0,12); if(s.length!==12) return ''; let sum=0; for(let i=0;i<12;i++) sum+=Number(s[i])*(i%2===0?1:3); return String((10-(sum%10))%10); }
    function generateEAN13(){ let base=String(Date.now()).replace(/\D/g,'').slice(-8); while(base.length<8) base='0'+base; const rand=String(Math.floor(Math.random()*10000)).padStart(4,'0'); const first12='2999'+base.slice(0,4)+rand; return first12.slice(0,12)+ean13CheckDigit(first12.slice(0,12)); }
    function renderBarcode(){ const code=$('#pBarcode').value.trim(); const name=$('#pName').value.trim(); if(!code){ $('#barcodeSvg').innerHTML=''; $('#labelMeta').textContent='Barcode tayyor bo‘lsa shu yerda ko‘rinadi.'; return; } try{ window.JsBarcode('#barcodeSvg', code, { format: code.length===13?'EAN13':'CODE128', displayValue:true, fontSize:16, margin:6, height:56 }); $('#labelMeta').textContent=`${name||'Mahsulot'} • ${code}`; }catch(e){ $('#barcodeSvg').innerHTML=''; $('#labelMeta').textContent='Barcode chizib bo‘lmadi'; } }
    $('#pBarcode').addEventListener('input', renderBarcode); $('#pName').addEventListener('input', renderBarcode); $('#btnGen').onclick=()=>{ $('#pBarcode').value=generateEAN13(); renderBarcode(); showToast('Barcode yaratildi', $('#pBarcode').value); };
    async function shrinkImage(file){ return new Promise((resolve,reject)=>{ const fr=new FileReader(); fr.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=900; let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc); const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); resolve(c.toDataURL('image/jpeg',0.82)); }; img.onerror=reject; img.src=fr.result; }; fr.onerror=reject; fr.readAsDataURL(file); }); }
    $('#pImage').addEventListener('change', async()=>{ const f=$('#pImage').files?.[0]; if(!f){ imageData=''; $('#thumbBox').innerHTML='<i class="fa-solid fa-image" style="color:#94a3b8"></i>'; return; } try{ imageData=await shrinkImage(f); $('#thumbBox').innerHTML=`<img src="${imageData}" alt="preview">`; }catch(e){ showToast('Rasm xato','Rasmni o‘qib bo‘lmadi'); } });
    $('#btnClear').onclick=()=>{ $('#pName').value=''; $('#pBarcode').value=''; $('#pPrice').value=''; $('#pCost').value=''; $('#pStock').value='1'; $('#pNote').value=''; $('#pImage').value=''; imageData=''; $('#thumbBox').innerHTML='<i class="fa-solid fa-image" style="color:#94a3b8"></i>'; renderBarcode(); };
    $('#btnPrint').onclick=()=>{ const code=$('#pBarcode').value.trim(); if(!code) return showToast('Kod yo‘q','Avval barcode tayyorlang'); const w=window.open('','_blank','width=420,height=260'); w.document.write(`<!doctype html><html><head><title>Barcode</title><style>body{font-family:Arial;padding:14px}.n{font-weight:700;margin-bottom:8px}</style></head><body><div class="n">${($('#pName').value||'Mahsulot')}</div>${document.querySelector('#barcodeSvg').outerHTML}<script>window.onload=()=>window.print()<\/script></body></html>`); w.document.close(); };
    async function startScan(){ if(!(window.Html5Qrcode)) return showToast('Scanner yuklanmadi','Internetni tekshirib qayta urinib ko‘ring'); $('#scanBd').style.display='flex'; document.body.style.overflow='hidden'; try{ scanner=new Html5Qrcode('scannerViewport'); const cams=await Html5Qrcode.getCameras(); const cam=(cams||[]).find(c=>/back|rear|environment/i.test(c.label||'')) || (cams||[])[0]; if(!cam) throw new Error('Kamera topilmadi'); await scanner.start(cam.id, { fps:10, qrbox:{ width:260, height:120 }, aspectRatio:1.7778, experimentalFeatures:{ useBarCodeDetectorIfSupported:true } }, async(decodedText)=>{ $('#pBarcode').value=String(decodedText||'').trim(); renderBarcode(); await stopScan(); }, ()=>{}); }catch(e){ console.error(e); await stopScan(); showToast('Kamera ochilmadi', e?.message||'Brauzer camera ruxsat bermadi'); } }
    async function stopScan(){ try{ if(scanner){ await scanner.stop().catch(()=>{}); await scanner.clear().catch(()=>{}); } }catch(e){} scanner=null; $('#scanBd').style.display='none'; document.body.style.overflow=''; document.querySelector('#scannerViewport').innerHTML=''; }
    $('#btnScan').onclick=startScan; $('#scanClose').onclick=stopScan; $('#scanBd').addEventListener('click', e=>{ if(e.target===$('#scanBd')) stopScan(); });
    $('#btnSave').onclick=async()=>{ const name=$('#pName').value.trim(), barcode=$('#pBarcode').value.trim(), price=Math.max(0,Math.floor(Number($('#pPrice').value||0))), cost=Math.max(0,Math.floor(Number($('#pCost').value||0))), stock=Math.max(0,Math.floor(Number($('#pStock').value||0))), note=$('#pNote').value.trim().slice(0,300); if(!name) return showToast('Nom kiritilmagan','Mahsulot nomini yozing'); if(!barcode) return showToast('Barcode yo‘q','Scan qiling yoki yaratish tugmasini bosing'); try{ const dup=await getDocs(query(collection(db,'products'), where('barcode','==',barcode), limit(1))); if(!dup.empty) return showToast('Takror barcode','Bu barcode allaqachon bor'); const payload={ name, title:name, barcode, barcodeText:barcode, priceUZS:price, currentPriceUZS:price, costUZS:cost, imageUrl:imageData||'', images:imageData?[imageData]:[], quickDraft:true, approved:true, status:'active', source:'addproduct_mobile', inventory:{ stock, lowThreshold:3, soldCount:0, soldSumUZS:0, unitPriceUZS:price, costUZS:cost, note }, createdAt:serverTimestamp(), updatedAt:serverTimestamp(), createdBy:me.uid, createdByEmail:me.email }; const ref=await addDoc(collection(db,'products'), payload); showToast('Saqlandi', `Yangi mahsulot: ${ref.id}`, 3000); setTimeout(()=>location.href='./productstat.html', 900); }catch(e){ console.error(e); showToast('Saqlash xatosi', e?.message||'Mahsulot qo‘shib bo‘lmadi'); } };
    (async()=>{ const u=await requireLogin(); if(!u) return; if(me.role!=='admin' && !ADMIN_EMAILS.includes((me.email||'').toLowerCase())) showToast('Eslatma','Bu sahifa admin uchun qulaylashtirilgan'); renderBarcode(); })();
  </script>
</body>
</html>
