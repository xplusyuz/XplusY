<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OrzuMall Boshqaruv paneli — Kirish</title>
  
  <style>
    :root{
      --om:#2E8B57;
      --om2:#256f46;
      --bg1: rgba(46,139,87,.16);
      --bg2: rgba(255,255,255,1);
      --card: rgba(255,255,255,.78);
      --border: rgba(0,0,0,.08);
      --text: #0f172a;
      --muted:#64748b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 10%, var(--bg1), transparent 60%),
        radial-gradient(900px 500px at 85% 20%, rgba(46,139,87,.10), transparent 55%),
        linear-gradient(180deg, #f8fafc, #ffffff);
    }
    .wrap{
      width:min(520px, 92vw);
      padding:22px;
      border-radius:22px;
      background:var(--card);
      border:1px solid var(--border);
      box-shadow: 0 24px 70px rgba(15,23,42,.16);
      backdrop-filter: blur(14px);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }
    .logo{
      width:46px;height:46px;border-radius:16px;
      background: linear-gradient(135deg, rgba(46,139,87,.22), rgba(46,139,87,.06));
      display:grid;place-items:center;
      border:1px solid rgba(46,139,87,.25);
    }
    .logo svg{width:26px;height:26px}
    h1{font-size:18px;margin:0}
    p{margin:6px 0 0 0;color:var(--muted);font-size:13px;line-height:1.45}
    .card{
      margin-top:16px;
      background:rgba(255,255,255,.86);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }
    label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px 2px;font-weight:700}
    input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.10);
      outline:none;
      font-size:14px;
      background:#fff;
    }
    input:focus{
      border-color: rgba(46,139,87,.55);
      box-shadow: 0 0 0 4px rgba(46,139,87,.14);
    }
    .row{display:grid;grid-template-columns:1fr;gap:12px}
    .btn{
      width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(46,139,87,.28);
      background: linear-gradient(135deg, var(--om), var(--om2));
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .err{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(244,63,94,.25);
      background:rgba(244,63,94,.08);
      color:#991b1b;
      font-size:13px;
      display:none;
    }
    .mini{
      margin-top:12px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
    }
  </style>

</head>

<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 11.5c0-3 2-5.5 5-5.5s5 2.5 5 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M6.2 12.8l-.8 6.2c-.1.9.6 1.7 1.6 1.7h10c1 0 1.7-.8 1.6-1.7l-.8-6.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 10h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>OrzuMall Boshqaruv paneli</h1>
        <p>Foydalanish yopiq. Faqat <b>admin</b> yoki <b>sotuvchi (vendor)</b> gmail ro‘yxatida bo‘lganlar kira oladi.</p>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="btn" class="btn">
          <span>Google orqali kirish</span>
        </button>
        <div id="err" class="err"></div>
        <div class="mini">Boshqa gmail tanlansa — avtomatik chiqib ketadi.</div>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, setPersistence, browserLocalPersistence,
    signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const DEFAULT_ADMIN_EMAILS = ["sohibjonmath@gmail.com"];

  // Firebase config (hardcoded) — panel bilan bir xil
  const cfg = {
    "apiKey": "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
    "authDomain": "xplusy-760fa.firebaseapp.com",
    "databaseURL": "https://xplusy-760fa-default-rtdb.firebaseio.com",
    "projectId": "xplusy-760fa",
    "storageBucket": "xplusy-760fa.firebasestorage.app",
    "messagingSenderId": "992512966017",
    "appId": "1:992512966017:web:5e919dbc9b8d8abcb43c80",
    "measurementId": "G-459PLJ7P7L"
  };

  const app = initializeApp(cfg);
  const auth = getAuth(app);
  const db = getFirestore(app);

  setPersistence(auth, browserLocalPersistence).catch(()=>{});

  const btn = document.getElementById("btn");
  const err = document.getElementById("err");

  function normEmail(e){ return String(e||"").toLowerCase().trim(); }
  function uniqEmails(arr){
    const out=[]; const seen=new Set();
    (arr||[]).forEach(x=>{
      const v=normEmail(x);
      if(v && !seen.has(v)){ seen.add(v); out.push(v); }
    });
    return out;
  }

  function showError(msg) {
    err.style.display = "block";
    err.textContent = msg;
  }

  async function loadAllowLists(){
    let admins = [...DEFAULT_ADMIN_EMAILS];
    let vendors = [];
    try{
      const aSnap = await getDoc(doc(db,"configs","admins"));
      if(aSnap.exists()) admins = uniqEmails([ ...admins, ...(aSnap.data().emails||[]) ]);
    }catch(e){ /* ignore */ }

    try{
      const vSnap = await getDoc(doc(db,"configs","vendors"));
      if(vSnap.exists()) vendors = uniqEmails(vSnap.data().emails||[]);
    }catch(e){ /* ignore */ }

    return { admins: uniqEmails(admins), vendors };
  }

  async function decideAndGo(user){
    const email = normEmail(user?.email);
    if(!email) return { ok:false, msg:"Email topilmadi. Google hisobingizni tekshiring." };

    const { admins, vendors } = await loadAllowLists();
    if(admins.includes(email) || vendors.includes(email)){
      return { ok:true };
    }
    return { ok:false, msg:"Ruxsat yo‘q. Gmail admin yoki sotuvchi ro‘yxatida topilmadi." };
  }

  onAuthStateChanged(auth, async (user)=>{
    if(!user) return;
    try{
      const r = await decideAndGo(user);
      if(r.ok){
        location.replace("./panel.html");
        return;
      }
      await signOut(auth);
      showError(r.msg);
    }catch(e){
      try{ await signOut(auth); }catch(_){}
      showError("Tekshiruvda xatolik: " + (e?.message || e));
    }
  });

  btn.addEventListener("click", async () => {
    err.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Kutilmoqda...";
    try {
      await setPersistence(auth, browserLocalPersistence);
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: "select_account" });
      const res = await signInWithPopup(auth, provider);

      const r = await decideAndGo(res.user);
      if(!r.ok){
        await signOut(auth);
        showError(r.msg);
        btn.disabled = false;
        btn.textContent = "Google orqali kirish";
        return;
      }

      location.replace("./panel.html");
    } catch (e) {
      console.error(e);
      showError("Kirishda xatolik: " + (e?.message || e));
      btn.disabled = false;
      btn.textContent = "Google orqali kirish";
    }
  });
</script>
</body>
</html>
