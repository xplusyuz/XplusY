<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OrzuMall ilovasini o‘rnatish</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#2E8B57" />
  <style>
    :root{
      --bg:#f6f8f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --brand:#2E8B57;
      --brand-dark:#256f46;
      --border:#e5e7eb;
      --shadow:0 14px 38px rgba(0,0,0,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      padding:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#f8faf9 0%, #f2f6f4 100%);
      color:var(--text);
    }
    .card{
      width:100%;
      max-width:420px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      text-align:center;
    }
    .logo{
      width:88px;
      height:88px;
      display:block;
      margin:0 auto 14px;
      object-fit:contain;
      border-radius:24px;
    }
    h1{
      margin:0 0 8px;
      font-size:26px;
      line-height:1.2;
    }
    p{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.55;
      font-size:15px;
    }
    .meta{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .chip{
      padding:8px 12px;
      border-radius:999px;
      background:#f3f6f4;
      border:1px solid var(--border);
      font-size:13px;
      font-weight:700;
      color:#374151;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:16px 18px;
      font-size:17px;
      font-weight:800;
      background:var(--brand);
      color:#fff;
      cursor:pointer;
      transition:transform .08s ease, opacity .18s ease;
    }
    .btn:active{transform:scale(.99)}
    .btn[disabled]{opacity:.7;cursor:default}
    .helper{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      min-height:20px;
    }
    .steps{
      margin-top:16px;
      text-align:left;
      background:#fafafa;
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      font-size:14px;
      color:#374151;
      line-height:1.55;
    }
    .steps div{margin:0 0 8px}
    .steps div:last-child{margin-bottom:0}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo.svg" alt="OrzuMall" class="logo">
    <h1>OrzuMall ilovasini o‘rnating</h1>
    <p>Ilovani telefoningizga o‘rnating va oddiy app kabi foydalaning.</p>

    <div class="meta">
      <div class="chip">Tez</div>
      <div class="chip">Yengil</div>
      <div class="chip">Qulay</div>
    </div>

    <button id="installBtn" class="btn">O‘rnatish</button>
    <div id="helper" class="helper"></div>

    <div id="steps" class="steps hidden">
      <div><b>1.</b> Telegram menyusini oching</div>
      <div><b>2.</b> <b>Browserda ochish</b> ni bosing</div>
      <div><b>3.</b> Brauzerda qayta ochilgach yana <b>O‘rnatish</b> ni bosing</div>
    </div>
  </div>

  <script>
    let deferredPrompt = null;
    const btn = document.getElementById("installBtn");
    const helper = document.getElementById("helper");
    const steps = document.getElementById("steps");

    const ua = navigator.userAgent || "";
    const isTelegram = /Telegram/i.test(ua);
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

    if (isStandalone) {
      location.replace("/");
    }

    function showFallback(){
      helper.textContent = isTelegram
        ? "Agar o‘rnatish oynasi chiqmasa, Telegram menyusidan brauzerda oching."
        : "Agar o‘rnatish oynasi chiqmasa, brauzer menyusidan Add to Home Screen ni tanlang.";
      steps.classList.remove("hidden");
    }

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      helper.textContent = "Ilovani o‘rnatish uchun tugmani bosing.";
      steps.classList.add("hidden");
    });

    btn.addEventListener("click", async () => {
      if (deferredPrompt) {
        btn.disabled = true;
        helper.textContent = "O‘rnatish oynasi ochilmoqda...";
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        if (choice && choice.outcome === "accepted") {
          helper.textContent = "O‘rnatilmoqda...";
        } else {
          btn.disabled = false;
          showFallback();
        }
        deferredPrompt = null;
      } else {
        showFallback();
      }
    });

    window.addEventListener("appinstalled", () => {
      btn.disabled = true;
      helper.textContent = "Tayyor. Bosh sahifaga o‘tilmoqda...";
      setTimeout(() => location.replace("/"), 700);
    });

    setTimeout(() => {
      if (!deferredPrompt && !isStandalone) {
        showFallback();
      }
    }, 900);
  </script>
</body>
</html>
