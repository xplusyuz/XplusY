<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrzuMall ilovasini o‘rnatish</title>

<style>
body{
font-family:system-ui;
background:#f5f7f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
max-width:360px;
}

.logo{
width:80px;
margin-bottom:10px;
}

h1{
font-size:22px;
margin-bottom:10px;
}

p{
color:#555;
font-size:14px;
}

button{
margin-top:20px;
background:#2E8B57;
border:none;
color:white;
font-size:16px;
padding:14px 26px;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:.9;
}
</style>
</head>

<body>

<div class="card">

<img src="/assets/logo.svg" class="logo">

<h1>OrzuMall ilovasini o‘rnating</h1>

<p>
Ilova telefoningizga o‘rnatiladi va oddiy app kabi ishlaydi.
</p>

<button id="installBtn">📲 O‘rnatish</button>

</div>

<script>

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
});

document.getElementById("installBtn").onclick = async () => {

if(deferredPrompt){

deferredPrompt.prompt();
await deferredPrompt.userChoice;

}else{

alert("Brauzer menyusidan 'Add to Home Screen' ni tanlang.");

}

};

window.addEventListener("appinstalled",()=>{
location.href="/";
});

</script>

</body>
</html>
