
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrzuMall ilovasini o‘rnatish</title>
<meta name="theme-color" content="#2E8B57">
<style>
body{
margin:0;
font-family:system-ui,Arial;
background:#f5f7f6;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
padding:16px;
}

.card{
background:white;
padding:28px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
max-width:380px;
width:100%;
}

.logo{
width:90px;
margin-bottom:10px;
}

h1{
font-size:24px;
margin:6px 0 8px 0;
}

p{
color:#555;
font-size:14px;
line-height:1.5;
}

.btn{
display:block;
width:100%;
margin-top:12px;
border:none;
border-radius:12px;
padding:15px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.install{
background:#2E8B57;
color:white;
}

.browser{
background:#2563eb;
color:white;
}

.copy{
background:#eee;
}

.note{
margin-top:12px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="card">

<img src="/assets/logo.svg" class="logo">

<h1>OrzuMall</h1>

<p>Ilovani telefoningizga o‘rnating va oddiy app kabi foydalaning.</p>

<button id="browserBtn" class="btn browser">🌐 Browserda ochish</button>

<button id="installBtn" class="btn install">📲 O‘rnatish</button>

<button id="copyBtn" class="btn copy">📋 Linkni nusxalash</button>

<div id="note" class="note"></div>

</div>

<script>

const installUrl = location.origin + "/install";
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt = e;
});

document.getElementById("installBtn").onclick = async ()=>{

if(deferredPrompt){

deferredPrompt.prompt();
await deferredPrompt.userChoice;

}else{

document.getElementById("note").innerText =
"Brauzer menyusidan 'Add to Home Screen' ni tanlang.";

}

};

document.getElementById("browserBtn").onclick = ()=>{

const ua = navigator.userAgent;

if(/Android/i.test(ua)){

const clean = installUrl.replace(/^https?:\/\//,'');
location.href = "intent://" + clean + "#Intent;scheme=https;package=com.android.chrome;end";

}else{

window.open(installUrl,"_blank");

}

};

document.getElementById("copyBtn").onclick = async ()=>{

try{

await navigator.clipboard.writeText(installUrl);
document.getElementById("note").innerText="Link nusxalandi";

}catch{

document.getElementById("note").innerText=installUrl;

}

};

window.addEventListener("appinstalled",()=>{

document.getElementById("note").innerText="Ilova o‘rnatildi";
setTimeout(()=>location.href="/",700);

});

</script>

</body>
</html>
