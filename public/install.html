<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OrzuMall o‘rnatish</title>
  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:#f6f8f7;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }
    .card{
      width:100%;
      max-width:400px;
      background:#fff;
      border-radius:18px;
      padding:24px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      border:1px solid #e5e7eb;
    }
    .logo{
      width:84px;height:84px;object-fit:contain;border-radius:22px;margin-bottom:14px;
    }
    h1{margin:0 0 8px;font-size:24px}
    p{margin:0 0 16px;color:#6b7280;line-height:1.5}
    button{
      width:100%;
      border:none;
      border-radius:14px;
      padding:15px 18px;
      font-size:16px;
      font-weight:700;
      background:#2E8B57;
      color:#fff;
      cursor:pointer;
    }
    .note{margin-top:14px;color:#6b7280;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo.svg" alt="OrzuMall" class="logo">
    <h1>OrzuMall</h1>
    <p>Ilova telefoningizga o‘rnatiladi va oddiy app kabi ishlaydi.</p>
    <button id="installBtn">O‘rnatish</button>
    <div class="note" id="note"></div>
  </div>

  <script>
    let deferredPrompt = null;
    const btn = document.getElementById("installBtn");
    const note = document.getElementById("note");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    btn.addEventListener("click", async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
      } else {
        note.textContent = "Brauzer menyusidan Add to Home Screen ni tanlang.";
      }
    });

    window.addEventListener("appinstalled", () => {
      location.replace("/");
    });

    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    if (isStandalone) {
      location.replace("/");
    }
  </script>
</body>
</html>
