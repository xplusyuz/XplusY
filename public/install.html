<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OrzuMall — o‘rnatish</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --bg:#f6f8f7; --card:#fff; --text:#111827; --muted:#6b7280; --brand:#2E8B57; --border:#e5e7eb;
      --shadow:0 14px 38px rgba(0,0,0,.08); --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; padding:18px; display:flex; align-items:center; justify-content:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#f8faf9 0%, #f2f6f4 100%); color:var(--text);
    }
    .card{
      width:100%; max-width:420px; background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; text-align:center;
    }
    .logo{width:88px; height:88px; display:block; margin:0 auto 14px; object-fit:contain; border-radius:24px}
    h1{margin:0 0 8px; font-size:25px}
    p{margin:0 0 16px; color:var(--muted); line-height:1.55}
    .meta{display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:16px}
    .chip{
      padding:8px 12px; border-radius:999px; background:#f3f6f4; border:1px solid var(--border);
      font-size:13px; font-weight:700; color:#374151;
    }
    button{
      width:100%; border:none; border-radius:16px; padding:15px 18px; font-size:16px; font-weight:800;
      background:var(--brand); color:#fff; cursor:pointer;
    }
    .note{margin-top:14px; color:var(--muted); font-size:13px; line-height:1.5; min-height:18px}
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/logo.svg" alt="OrzuMall" class="logo">
    <h1>OrzuMall</h1>
    <p>Ilovani telefoningizga o‘rnating va oddiy app kabi foydalaning.</p>
    <div class="meta">
      <div class="chip">Tez</div>
      <div class="chip">Yengil</div>
      <div class="chip">Qulay</div>
    </div>
    <button id="installBtn">O‘rnatish</button>
    <div class="note" id="note"></div>
  </div>

  <script>
    let deferredPrompt = null;
    const btn = document.getElementById("installBtn");
    const note = document.getElementById("note");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      note.textContent = "Ilovani o‘rnatish uchun tugmani bosing.";
    });

    btn.addEventListener("click", async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        if (choice && choice.outcome === "accepted") {
          note.textContent = "O‘rnatilmoqda...";
        }
      } else {
        note.textContent = "Brauzer menyusidan Add to Home Screen ni tanlang.";
      }
    });

    window.addEventListener("appinstalled", () => {
      note.textContent = "Tayyor. Bosh sahifaga o‘tilmoqda...";
      setTimeout(() => location.replace("/"), 700);
    });

    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
    if (isStandalone) location.replace("/");
  </script>
</body>
</html>
