    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px 14px 100px;
            color: #1a1a2e;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            max-width: 540px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header styles */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 24px 20px;
            margin-bottom: 20px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.15),
                0 4px 12px rgba(0,0,0,0.05),
                inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 56px;
            height: 56px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 
                0 12px 24px rgba(102, 126, 234, 0.3),
                inset 0 2px 4px rgba(255,255,255,0.3);
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-size: 0.75rem;
            opacity: 0.6;
            display: block;
            color: #1a1a2e;
            font-weight: 500;
        }

        .stats-badge {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            backdrop-filter: blur(10px);
        }

        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background: linear-gradient(135deg, #f8f9ff, #ffffff);
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-bottom: 6px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Quick Add Section */
        .quick-add-section {
            margin-bottom: 18px;
        }

        .quick-add-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .quick-add-btn:active {
            transform: scale(0.98);
        }

        /* Search */
        .search-box {
            margin-bottom: 18px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            font-size: 1rem;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            padding: 6px;
            border-radius: 40px;
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            border-radius: 34px;
            padding: 14px 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
            opacity: 0.7;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            opacity: 1;
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        /* Debt Cards */
        .debt-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .debt-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 22px 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .debt-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: gradientMove 3s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .debtor-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .debtor-avatar {
            width: 56px;
            height: 56px;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            text-transform: uppercase;
        }

        .debtor-details h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #1a1a2e;
        }

        .debtor-details p {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active {
            background: linear-gradient(135deg, #fbbf2415, #f59e0b15);
            color: #d97706;
        }

        .status-paid {
            background: linear-gradient(135deg, #10b98115, #05966915);
            color: #059669;
        }

        .status-overdue {
            background: linear-gradient(135deg, #ef444415, #dc262615);
            color: #dc2626;
            animation: pulseWarning 2s infinite;
        }

        @keyframes pulseWarning {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .debt-amount {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 14px;
        }

        .debt-amount small {
            font-size: 0.9rem;
            opacity: 0.5;
        }

        .debt-dates {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            font-size: 0.85rem;
        }

        .date-item {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
            background: rgba(102, 126, 234, 0.05);
            padding: 6px 14px;
            border-radius: 30px;
        }

        .products-preview {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .product-thumb {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            cursor: zoom-in;
            transition: transform 0.2s;
        }

        .product-thumb:hover {
            transform: scale(1.05);
        }

        .phones {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .phone-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f8f9ff, #ffffff);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .phone-item:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: scale(1.02);
        }

        .phone-item i {
            color: #667eea;
        }

        .phone-item:hover i {
            color: white;
        }

        .copy-feedback {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 3000;
            animation: slideUpFade 2s ease;
            pointer-events: none;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(102, 126, 234, 0.15);
        }

        .btn {
            flex: 1;
            padding: 14px 12px;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e5e7eb;
            color: #6b7280;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* FAB Buttons */
        .fab-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 100;
        }

        .fab {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .fab-small {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .fab:hover, .fab-small:hover {
            transform: scale(1.1);
        }

        .fab:active, .fab-small:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 16px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 28px 24px;
            max-width: 520px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .close-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: #f3f4f6;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a2e;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            font-size: 1rem;
            background: white;
        }

        .product-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }

        .image-preview {
            aspect-ratio: 1;
            border-radius: 18px;
            object-fit: cover;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            opacity: 0.8;
        }

        /* Image Viewer */
        .image-viewer-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-viewer-modal.active {
            display: flex;
        }

        .image-viewer-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .image-viewer-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
        }

        .close-viewer {
            position: absolute;
            top: -50px;
            right: 0;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* Detail Section */
        .detail-section {
            margin-bottom: 24px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9ff, #ffffff);
            border-radius: 24px;
        }

        .detail-title {
            font-weight: 800;
            margin-bottom: 16px;
            color: #1a1a2e;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .payment-history {
            max-height: 240px;
            overflow-y: auto;
        }

        .payment-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .product-list-item {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">✨</div>
                <div>
                    <h1>Nasiya Pro Max</h1>
                    <span>To'liq boshqaruv</span>
                </div>
            </div>
            <div class="stats-badge">
                <i class="fas fa-users"></i>
                <span id="activeDebtsCount">0</span>
                <span>faol</span>
            </div>
        </div>
        <div class="stats-summary">
            <div class="stat-box">
                <div class="stat-label">Jami nasiya</div>
                <div class="stat-number" id="totalDebt">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">To'langan</div>
                <div class="stat-number" id="totalPaid">0</div>
            </div>
        </div>
    </div>

    <!-- Quick Add Button -->
    <div class="quick-add-section">
        <button class="quick-add-btn" id="quickAddBtn">
            <i class="fas fa-user-plus"></i> Yangi mijoz qo'shish
        </button>
    </div>

    <!-- Search -->
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" class="search-input" id="searchInput" placeholder="Ism yoki telefon raqam...">
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-tab="active"><i class="fas fa-clock"></i> Faol</button>
        <button class="tab" data-tab="paid"><i class="fas fa-check-circle"></i> To'langan</button>
        <button class="tab" data-tab="all"><i class="fas fa-list"></i> Barchasi</button>
    </div>

    <!-- Debt List -->
    <div class="debt-list" id="debtList">
        <div class="empty-state">
            <i class="fas fa-box-open"></i>
            <p>Yuklanmoqda...</p>
        </div>
    </div>
</div>

<!-- FAB Buttons -->
<div class="fab-container">
    <button class="fab-small" id="quickAddFabBtn" title="Yangi mijoz qo'shish">
        <i class="fas fa-user-plus"></i>
    </button>
    <button class="fab" id="addDebtBtn" title="Yangi nasiya qo'shish">
        <i class="fas fa-plus"></i>
    </button>
</div>

<!-- Add/Edit Modal -->
<div class="modal" id="debtModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle"><i class="fas fa-plus-circle"></i> Yangi nasiya</h2>
            <button class="close-btn" id="closeModalBtn"><i class="fas fa-times"></i></button>
        </div>
        
        <form id="debtForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Ism Familiya *</label>
                <input type="text" class="form-control" id="fullName" placeholder="Ism Familiya" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> Telefon raqamlar *</label>
                <input type="tel" class="form-control" id="phone1" placeholder="Asosiy telefon" required style="margin-bottom: 8px;">
                <input type="tel" class="form-control" id="phone2" placeholder="Qo'shimcha telefon">
            </div>

            <div class="form-group">
                <label><i class="fas fa-money-bill-wave"></i> Nasiya summasi *</label>
                <input type="number" class="form-control" id="amount" placeholder="500000" min="1000" step="1000" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Olingan sana *</label>
                <input type="date" class="form-control" id="takenDate" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar-check"></i> Qaytarish muddati *</label>
                <input type="date" class="form-control" id="dueDate" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-shopping-cart"></i> Olgan mahsulotlari</label>
                <textarea class="form-control" id="products" placeholder="Non, yog', guruch..." rows="3"></textarea>
            </div>

            <div class="form-group">
                <label><i class="fas fa-camera"></i> Mahsulot rasmlari</label>
                <div class="product-images" id="imagePreviewContainer"></div>
                <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;">
                <button type="button" class="btn btn-outline" id="uploadImageBtn">
                    <i class="fas fa-cloud-upload-alt"></i> Rasm yuklash
                </button>
            </div>

            <div class="form-group">
                <label><i class="fas fa-sticky-note"></i> Izoh</label>
                <textarea class="form-control" id="note" placeholder="Qo'shimcha ma'lumot..." rows="2"></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-save"></i> Saqlash
            </button>
        </form>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-info-circle"></i> Tafsilotlar</h2>
            <button class="close-btn" id="closeDetailModalBtn"><i class="fas fa-times"></i></button>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<!-- Add More Modal -->
<div class="modal" id="addMoreModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-cart-plus"></i> Nasiyaga qo'shish</h2>
            <button class="close-btn" id="closeAddMoreModalBtn"><i class="fas fa-times"></i></button>
        </div>
        
        <form id="addMoreForm">
            <input type="hidden" id="addMoreDebtId">
            
            <div class="form-group">
                <label><i class="fas fa-money-bill-wave"></i> Qo'shimcha summa *</label>
                <input type="number" class="form-control" id="addMoreAmount" placeholder="100000" min="1000" step="1000" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-shopping-cart"></i> Qo'shimcha mahsulotlar</label>
                <textarea class="form-control" id="addMoreProducts" placeholder="Qo'shimcha mahsulotlar..." rows="3"></textarea>
            </div>

            <div class="form-group">
                <label><i class="fas fa-camera"></i> Yangi rasmlar</label>
                <div class="product-images" id="addMoreImagePreview"></div>
                <input type="file" id="addMoreImageUpload" accept="image/*" multiple style="display: none;">
                <button type="button" class="btn btn-outline" id="addMoreUploadBtn">
                    <i class="fas fa-cloud-upload-alt"></i> Rasm yuklash
                </button>
            </div>

            <button type="submit" class="btn btn-warning" style="width: 100%;">
                <i class="fas fa-plus-circle"></i> Nasiyaga qo'shish
            </button>
        </form>
    </div>
</div>

<!-- Image Viewer Modal -->
<div class="image-viewer-modal" id="imageViewerModal">
    <div class="image-viewer-content">
        <button class="close-viewer" id="closeViewerBtn"><i class="fas fa-times"></i></button>
        <img id="viewerImage" src="" alt="Kattalashtirilgan rasm">
    </div>
</div>

<script>
    (function() {
        if (!window.db) {
            setTimeout(arguments.callee, 100);
            return;
        }

        const db = window.db;
        const storage = window.storage;
        const addDoc = window.firestoreAddDoc;
        const collection = window.firestoreCollection;
        const onSnapshot = window.firestoreOnSnapshot;
        const deleteDoc = window.firestoreDeleteDoc;
        const doc = window.firestoreDoc;
        const query = window.firestoreQuery;
        const orderBy = window.firestoreOrderBy;
        const updateDoc = window.firestoreUpdateDoc;
        const storageRef = window.storageRef;
        const uploadBytes = window.storageUploadBytes;
        const getDownloadURL = window.storageGetDownloadURL;

        let currentTab = 'active';
        let currentDebtId = null;
        let allDebts = [];

        const today = new Date().toISOString().split('T')[0];
        const nextMonth = new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0];
        document.getElementById('takenDate').value = today;
        document.getElementById('dueDate').value = nextMonth;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                filterAndRender();
            });
        });

        document.getElementById('searchInput').addEventListener('input', filterAndRender);
        document.getElementById('uploadImageBtn').addEventListener('click', () => document.getElementById('imageUpload').click());
        document.getElementById('addMoreUploadBtn').addEventListener('click', () => document.getElementById('addMoreImageUpload').click());

        // Quick add buttons
        document.getElementById('quickAddBtn').addEventListener('click', openQuickAdd);
        document.getElementById('quickAddFabBtn').addEventListener('click', openQuickAdd);

        function openQuickAdd() {
            resetForm();
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Yangi mijoz qo\'shish';
            document.getElementById('debtModal').classList.add('active');
        }

        // Image preview
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            previewImages(e.target.files, 'imagePreviewContainer');
        });

        document.getElementById('addMoreImageUpload').addEventListener('change', function(e) {
            previewImages(e.target.files, 'addMoreImagePreview');
        });

        function previewImages(files, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            Array.from(files).slice(0, 5).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'image-preview';
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        // Copy phone number function
        window.copyPhone = function(event, phoneNumber) {
            event.stopPropagation();
            navigator.clipboard.writeText(phoneNumber).then(() => {
                showCopyFeedback('📋 Telefon raqam nusxalandi: ' + phoneNumber);
            });
        };

        function showCopyFeedback(message) {
            const feedback = document.createElement('div');
            feedback.className = 'copy-feedback';
            feedback.textContent = message;
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 2000);
        }

        // Close modals
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('closeDetailModalBtn').addEventListener('click', closeDetailModal);
        document.getElementById('closeAddMoreModalBtn').addEventListener('click', closeAddMoreModal);
        document.getElementById('closeViewerBtn').addEventListener('click', () => {
            document.getElementById('imageViewerModal').classList.remove('active');
        });

        // Load debts
        const debtsRef = collection(db, 'debts');
        const q = query(debtsRef, orderBy('createdAt', 'desc'));

        onSnapshot(q, (snapshot) => {
            allDebts = [];
            snapshot.forEach(doc => {
                allDebts.push({ id: doc.id, ...doc.data() });
            });
            filterAndRender();
            updateStats();
        }, (error) => {
            console.error('Xatolik:', error);
            document.getElementById('debtList').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Ulanishda xatolik</p></div>';
        });

        function filterAndRender() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allDebts.filter(debt => {
                const matchesSearch = debt.fullName?.toLowerCase().includes(searchTerm) ||
                                    debt.phone1?.includes(searchTerm) ||
                                    debt.phone2?.includes(searchTerm);
                
                if (currentTab === 'active') return matchesSearch && debt.status === 'active';
                if (currentTab === 'paid') return matchesSearch && debt.status === 'paid';
                return matchesSearch;
            });

            renderDebtList(filtered);
        }

        function renderDebtList(debts) {
            const container = document.getElementById('debtList');
            
            if (debts.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>Nasiya topilmadi</p></div>';
                return;
            }

            container.innerHTML = debts.map(debt => {
                const isOverdue = debt.status === 'active' && new Date(debt.dueDate) < new Date();
                const statusClass = debt.status === 'paid' ? 'status-paid' : (isOverdue ? 'status-overdue' : 'status-active');
                const statusText = debt.status === 'paid' ? '✅ To\'langan' : (isOverdue ? '⚠️ Muddat o\'tgan' : '🔄 Faol');
                
                const initials = debt.fullName?.split(' ').map(n => n[0]).join('').slice(0, 2) || '?';
                const paidAmount = debt.payments?.reduce((sum, p) => sum + p.amount, 0) || 0;
                const remaining = debt.amount - paidAmount;

                return `
                    <div class="debt-card" data-id="${debt.id}">
                        <div class="card-header">
                            <div class="debtor-info">
                                <div class="debtor-avatar">${initials}</div>
                                <div class="debtor-details">
                                    <h3>${debt.fullName || 'Noma\'lum'}</h3>
                                    <p><i class="fas fa-shopping-bag"></i> ${debt.products?.slice(0, 30) || '...'}</p>
                                </div>
                            </div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        
                        <div class="phones">
                            ${debt.phone1 ? `<span class="phone-item" onclick="copyPhone(event, '${debt.phone1}')"><i class="fas fa-phone"></i> ${debt.phone1} <i class="fas fa-copy" style="margin-left:6px; font-size:0.8rem;"></i></span>` : ''}
                            ${debt.phone2 ? `<span class="phone-item" onclick="copyPhone(event, '${debt.phone2}')"><i class="fas fa-mobile-alt"></i> ${debt.phone2} <i class="fas fa-copy" style="margin-left:6px; font-size:0.8rem;"></i></span>` : ''}
                        </div>
                        
                        <div class="debt-amount">
                            ${formatMoney(remaining)} <small>so'm</small>
                            ${paidAmount > 0 ? `<small>/ ${formatMoney(debt.amount)}</small>` : ''}
                        </div>
                        
                        <div class="debt-dates">
                            <span class="date-item"><i class="far fa-calendar-alt"></i> ${formatDate(debt.takenDate)}</span>
                            <span class="date-item"><i class="far fa-clock"></i> ${formatDate(debt.dueDate)}</span>
                        </div>
                        
                        ${debt.images?.length ? `
                            <div class="products-preview">
                                ${debt.images.map(img => `<img src="${img}" class="product-thumb" onclick="viewImage(event, '${img}')">`).join('')}
                            </div>
                        ` : ''}
                        
                        <div class="card-actions">
                            ${debt.status === 'active' ? `
                                <button class="btn btn-success" data-action="payment" data-id="${debt.id}"><i class="fas fa-hand-holding-usd"></i> To'lov</button>
                                <button class="btn btn-warning" data-action="addMore" data-id="${debt.id}"><i class="fas fa-cart-plus"></i> Qo'shish</button>
                                <button class="btn btn-primary" data-action="edit" data-id="${debt.id}"><i class="fas fa-edit"></i> Tahrir</button>
                            ` : ''}
                            <button class="btn btn-danger" data-action="delete" data-id="${debt.id}"><i class="fas fa-trash"></i> O'chirish</button>
                        </div>
                    </div>
                `;
            }).join('');

            attachCardEvents(container);
        }

        function attachCardEvents(container) {
            container.querySelectorAll('.debt-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('button') && !e.target.closest('img') && !e.target.closest('.phone-item')) {
                        showDetail(card.dataset.id);
                    }
                });
            });

            container.querySelectorAll('[data-action="payment"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    addPayment(btn.dataset.id);
                });
            });

            container.querySelectorAll('[data-action="addMore"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showAddMoreModal(btn.dataset.id);
                });
            });

            container.querySelectorAll('[data-action="edit"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    editDebt(btn.dataset.id);
                });
            });

            container.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteDebt(btn.dataset.id);
                });
            });
        }

        window.viewImage = function(event, imageUrl) {
            event.stopPropagation();
            document.getElementById('viewerImage').src = imageUrl;
            document.getElementById('imageViewerModal').classList.add('active');
        };

        function updateStats() {
            const active = allDebts.filter(d => d.status === 'active');
            const paid = allDebts.filter(d => d.status === 'paid');
            const totalDebt = active.reduce((sum, d) => sum + (d.amount - (d.payments?.reduce((s, p) => s + p.amount, 0) || 0)), 0);
            const totalPaid = paid.reduce((sum, d) => sum + d.amount, 0);
            
            document.getElementById('activeDebtsCount').textContent = active.length;
            document.getElementById('totalDebt').textContent = formatMoney(totalDebt);
            document.getElementById('totalPaid').textContent = formatMoney(totalPaid);
        }

        function showAddMoreModal(id) {
            document.getElementById('addMoreDebtId').value = id;
            document.getElementById('addMoreModal').classList.add('active');
        }

        document.getElementById('addMoreForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const debtId = document.getElementById('addMoreDebtId').value;
            const debt = allDebts.find(d => d.id === debtId);
            if (!debt) return;

            const additionalAmount = parseFloat(document.getElementById('addMoreAmount').value);
            const additionalProducts = document.getElementById('addMoreProducts').value;
            
            const newAmount = debt.amount + additionalAmount;
            
            let newProducts = debt.products || '';
            if (additionalProducts) {
                newProducts = newProducts ? `${newProducts}; ${additionalProducts}` : additionalProducts;
            }

            const imageFiles = document.getElementById('addMoreImageUpload').files;
            let newImages = debt.images || [];
            
            if (imageFiles.length > 0) {
                const uploadedUrls = await uploadImages(Array.from(imageFiles));
                newImages = [...newImages, ...uploadedUrls];
            }

            try {
                await updateDoc(doc(db, 'debts', debtId), {
                    amount: newAmount,
                    products: newProducts,
                    images: newImages,
                    updatedAt: Date.now()
                });
                
                closeAddMoreModal();
                showCopyFeedback('✅ Nasiyaga muvaffaqiyatli qo\'shildi!');
            } catch (error) {
                alert('Xatolik: ' + error.message);
            }
        });

        document.getElementById('debtForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                fullName: document.getElementById('fullName').value,
                phone1: document.getElementById('phone1').value,
                phone2: document.getElementById('phone2').value,
                amount: parseFloat(document.getElementById('amount').value),
                takenDate: document.getElementById('takenDate').value,
                dueDate: document.getElementById('dueDate').value,
                products: document.getElementById('products').value,
                note: document.getElementById('note').value,
                status: 'active',
                payments: currentDebtId ? (allDebts.find(d => d.id === currentDebtId)?.payments || []) : [],
                updatedAt: Date.now()
            };

            const imageFiles = document.getElementById('imageUpload').files;
            if (imageFiles.length > 0) {
                formData.images = await uploadImages(Array.from(imageFiles));
            }

            try {
                if (currentDebtId) {
                    await updateDoc(doc(db, 'debts', currentDebtId), formData);
                } else {
                    formData.createdAt = Date.now();
                    await addDoc(debtsRef, formData);
                }
                closeModal();
                resetForm();
                showCopyFeedback('✅ Nasiya muvaffaqiyatli saqlandi!');
            } catch (error) {
                alert('Xatolik: ' + error.message);
            }
        });

        async function uploadImages(files) {
            const urls = [];
            for (const file of files) {
                const imageRef = storageRef(storage, `debts/${Date.now()}_${file.name}`);
                await uploadBytes(imageRef, file);
                const url = await getDownloadURL(imageRef);
                urls.push(url);
            }
            return urls;
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('uz-UZ').format(amount || 0);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('uz-UZ', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function closeModal() {
            document.getElementById('debtModal').classList.remove('active');
            resetForm();
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function closeAddMoreModal() {
            document.getElementById('addMoreModal').classList.remove('active');
            document.getElementById('addMoreForm').reset();
            document.getElementById('addMoreImagePreview').innerHTML = '';
        }

        function resetForm() {
            document.getElementById('debtForm').reset();
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> Yangi nasiya';
            document.getElementById('takenDate').value = today;
            document.getElementById('dueDate').value = nextMonth;
            currentDebtId = null;
        }

        function showDetail(id) {
            const debt = allDebts.find(d => d.id === id);
            if (!debt) return;
            
            const paidAmount = debt.payments?.reduce((sum, p) => sum + p.amount, 0) || 0;
            const remaining = debt.amount - paidAmount;
            
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-section">
                    <h3 style="margin-bottom:16px; font-size:1.3rem;"><i class="fas fa-user-circle"></i> ${debt.fullName}</h3>
                    <p onclick="copyPhone(event, '${debt.phone1}')" style="cursor:pointer;">
                        <i class="fas fa-phone"></i> ${debt.phone1} <i class="fas fa-copy" style="margin-left:8px; opacity:0.6;"></i>
                    </p>
                    ${debt.phone2 ? `<p onclick="copyPhone(event, '${debt.phone2}')" style="cursor:pointer;"><i class="fas fa-mobile-alt"></i> ${debt.phone2} <i class="fas fa-copy" style="margin-left:8px; opacity:0.6;"></i></p>` : ''}
                    <p><i class="fas fa-money-bill-wave"></i> Jami: ${formatMoney(debt.amount)} so'm</p>
                    <p><i class="fas fa-check-circle" style="color:#10b981;"></i> To'langan: ${formatMoney(paidAmount)} so'm</p>
                    <p><i class="fas fa-hourglass-half"></i> Qoldiq: ${formatMoney(remaining)} so'm</p>
                    <p><i class="far fa-calendar-alt"></i> Olingan: ${formatDate(debt.takenDate)}</p>
                    <p><i class="far fa-calendar-check"></i> Muddat: ${formatDate(debt.dueDate)}</p>
                    ${debt.products ? `<div class="product-list"><strong><i class="fas fa-shopping-cart"></i> Mahsulotlar:</strong><br>${debt.products.split(';').map(p => `<div class="product-list-item">• ${p.trim()}</div>`).join('')}</div>` : ''}
                    ${debt.note ? `<p><i class="fas fa-sticky-note"></i> ${debt.note}</p>` : ''}
                </div>
                
                ${debt.images?.length ? `
                    <div class="detail-section">
                        <div class="detail-title"><i class="fas fa-images"></i> Mahsulot rasmlari</div>
                        <div class="products-preview">
                            ${debt.images.map(img => `<img src="${img}" class="product-thumb" onclick="viewImage(event, '${img}')" style="cursor: zoom-in;">`).join('')}
                        </div>
                        <p style="font-size:0.8rem; margin-top:8px; opacity:0.7;"><i class="fas fa-search-plus"></i> Rasm ustiga bosing kattalashtirish uchun</p>
                    </div>
                ` : ''}
                
                ${debt.payments?.length ? `
                    <div class="detail-section">
                        <div class="detail-title"><i class="fas fa-history"></i> To'lovlar tarixi</div>
                        <div class="payment-history">
                            ${debt.payments.map(p => `
                                <div class="payment-item">
                                    <span><i class="far fa-calendar"></i> ${formatDate(p.date)}</span>
                                    <span><strong>${formatMoney(p.amount)} so'm</strong></span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
            `;
            
            document.getElementById('detailModal').classList.add('active');
        }

        async function addPayment(id) {
            const amount = prompt('To\'lov summasini kiriting (so\'m):');
            if (!amount) return;
            
            const paymentAmount = parseFloat(amount);
            if (isNaN(paymentAmount) || paymentAmount <= 0) {
                alert('Noto\'g\'ri summa');
                return;
            }
            
            const debt = allDebts.find(d => d.id === id);
            const payments = debt.payments || [];
            payments.push({
                amount: paymentAmount,
                date: new Date().toISOString().split('T')[0],
                timestamp: Date.now()
            });
            
            const totalPaid = payments.reduce((sum, p) => sum + p.amount, 0);
            const status = totalPaid >= debt.amount ? 'paid' : 'active';
            
            await updateDoc(doc(db, 'debts', id), { payments, status });
            showCopyFeedback('✅ To\'lov qabul qilindi!');
        }

        function editDebt(id) {
            const debt = allDebts.find(d => d.id === id);
            if (!debt) return;
            
            currentDebtId = id;
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Nasiyani tahrirlash';
            document.getElementById('fullName').value = debt.fullName || '';
            document.getElementById('phone1').value = debt.phone1 || '';
            document.getElementById('phone2').value = debt.phone2 || '';
            document.getElementById('amount').value = debt.amount || '';
            document.getElementById('takenDate').value = debt.takenDate || '';
            document.getElementById('dueDate').value = debt.dueDate || '';
            document.getElementById('products').value = debt.products || '';
            document.getElementById('note').value = debt.note || '';
            
            document.getElementById('debtModal').classList.add('active');
        }

        async function deleteDebt(id) {
            if (!confirm('Nasiyani o\'chirishni tasdiqlaysizmi?')) return;
            await deleteDoc(doc(db, 'debts', id));
            showCopyFeedback('🗑️ Nasiya o\'chirildi');
        }

        document.getElementById('addDebtBtn').addEventListener('click', () => {
            resetForm();
            document.getElementById('debtModal').classList.add('active');
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        document.getElementById('imageViewerModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('imageViewerModal')) {
                document.getElementById('imageViewerModal').classList.remove('active');
            }
        });

        console.log('✅ Nasiya Pro Max ishga tushdi!');
    })();
</script>
</body>
</html>
