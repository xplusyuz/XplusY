<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✨ Nasiya Pro Max | Mukammal Boshqaruv</title>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            deleteDoc, 
            doc, 
            query, 
            orderBy,
            updateDoc,
            arrayUnion 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { 
            getStorage, 
            ref, 
            uploadBytes, 
            getDownloadURL 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
            authDomain: "xplusy-760fa.firebaseapp.com",
            projectId: "xplusy-760fa",
            storageBucket: "xplusy-760fa.firebasestorage.app",
            messagingSenderId: "992512966017",
            appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        window.db = db;
        window.storage = storage;
        window.firestoreAddDoc = addDoc;
        window.firestoreCollection = collection;
        window.firestoreOnSnapshot = onSnapshot;
        window.firestoreDeleteDoc = deleteDoc;
        window.firestoreDoc = doc;
        window.firestoreQuery = query;
        window.firestoreOrderBy = orderBy;
        window.firestoreUpdateDoc = updateDoc;
        window.firestoreArrayUnion = arrayUnion;
        window.storageRef = ref;
        window.storageUploadBytes = uploadBytes;
        window.storageGetDownloadURL = getDownloadURL;
        
        console.log("✅ Firebase Pro Max ulandi!");
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px 10px 90px;
            color: #1a1a2e;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header - Ixcham */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 44px;
            height: 44px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .logo h1 {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1a1a2e;
        }

        .logo span {
            font-size: 0.65rem;
            opacity: 0.6;
            display: block;
        }

        .stats-badge {
            background: #f0f0ff;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .stat-box {
            background: linear-gradient(135deg, #f8f9ff, #ffffff);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        .stat-number {
            font-size: 1.4rem;
            font-weight: 800;
            color: #667eea;
        }

        /* Quick Add */
        .quick-add-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 18px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.25);
        }

        /* Search */
        .search-box {
            margin-bottom: 12px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 14px 14px 46px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            font-size: 0.95rem;
            box-shadow: 0 6px 16px rgba(0,0,0,0.08);
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        /* Tabs - Ixcham */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            padding: 5px;
            border-radius: 30px;
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            border-radius: 26px;
            padding: 11px 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
            opacity: 0.7;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            opacity: 1;
        }

        /* Debt Cards - Ixchamroq */
        .debt-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .debt-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .debt-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .debtor-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .debtor-avatar {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
        }

        .debtor-details h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .debtor-details p {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .status-active {
            background: #fbbf2415;
            color: #d97706;
        }

        .status-paid {
            background: #10b98115;
            color: #059669;
        }

        .status-overdue {
            background: #ef444415;
            color: #dc2626;
        }

        .phones {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .phone-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f0f0ff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .debt-amount {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .debt-amount small {
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .debt-dates {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.75rem;
        }

        .date-item {
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.7;
            background: rgba(102, 126, 234, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* Rasm ko'rish tugmasi */
        .view-images-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            border: none;
        }

        .products-preview {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding: 2px 0;
            -webkit-overflow-scrolling: touch;
        }

        .product-thumb {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(102, 126, 234, 0.15);
        }

        .btn {
            flex: 1;
            padding: 10px 6px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        /* FAB */
        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .fab {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.4);
        }

        .fab-small {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, #10b981, #059669);
            font-size: 20px;
        }

        /* Modal - Tuzatilgan scroll */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            padding: 12px;
            overflow: hidden;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            padding: 20px 16px;
            max-width: 460px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            overscroll-behavior: contain;
        }

        /* Modal header sticky */
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            padding-bottom: 10px;
            z-index: 5;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: #f3f4f6;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #1a1a2e;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 16px;
            font-size: 0.9rem;
            background: white;
        }

        textarea.form-control {
            resize: vertical;
        }

        .image-preview {
            width: 70px;
            height: 70px;
            border-radius: 14px;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Image preview container */
        .image-preview-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
            min-height: 80px;
        }

        .image-preview-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .remove-image-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background: #ef4444;
            color: white;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        /* History Timeline */
        .history-timeline {
            margin-top: 16px;
            padding: 14px;
            background: #f8f9ff;
            border-radius: 18px;
            max-height: 300px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .history-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .history-content {
            flex: 1;
        }

        .history-title {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .history-desc {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        .history-amount {
            font-weight: 700;
            color: #667eea;
        }

        .copy-feedback {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 3000;
            animation: slideUpFade 2s ease;
            pointer-events: none;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            opacity: 0.8;
        }

        .image-viewer-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .image-viewer-modal.active {
            display: flex;
        }

        .image-viewer-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .image-viewer-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        .close-viewer {
            position: absolute;
            top: -44px;
            right: 0;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Detail content scroll */
        .detail-scroll {
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
        }

        /* To'lovlar ro'yxati */
        .payments-list {
            max-height: 200px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .payment-item-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">✨</div>
                <div>
                    <h1>Nasiya Pro</h1>
                    <span>Mukammal boshqaruv</span>
                </div>
            </div>
            <div class="stats-badge">
                <span id="activeDebtsCount">0</span> faol
            </div>
        </div>
        <div class="stats-summary">
            <div class="stat-box">
                <div class="stat-label">Jami nasiya</div>
                <div class="stat-number" id="totalDebt">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">To'langan</div>
                <div class="stat-number" id="totalPaid">0</div>
            </div>
        </div>
    </div>

    <!-- Quick Add -->
    <button class="quick-add-btn" id="quickAddBtn">
        ➕ Yangi mijoz qo'shish
    </button>

    <!-- Search -->
    <div class="search-box">
        <i>🔍</i>
        <input type="text" class="search-input" id="searchInput" placeholder="Ism yoki telefon...">
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-tab="active">🔄 Faol</button>
        <button class="tab" data-tab="paid">✅ To'langan</button>
        <button class="tab" data-tab="all">📋 Barchasi</button>
    </div>

    <!-- Debt List -->
    <div class="debt-list" id="debtList">
        <div class="empty-state">
            <p>⏳ Yuklanmoqda...</p>
        </div>
    </div>
</div>

<!-- FAB -->
<div class="fab-container">
    <button class="fab fab-small" id="quickAddFabBtn" title="Yangi mijoz">👤➕</button>
    <button class="fab" id="addDebtBtn" title="Yangi nasiya">➕</button>
</div>

<!-- Debt Modal -->
<div class="modal" id="debtModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">➕ Yangi nasiya</h2>
            <button class="close-btn" id="closeModalBtn">✕</button>
        </div>
        
        <form id="debtForm">
            <div class="form-group">
                <label>👤 Ism Familiya *</label>
                <input type="text" class="form-control" id="fullName" placeholder="Ism Familiya" required>
            </div>

            <div class="form-group">
                <label>📞 Telefonlar *</label>
                <input type="tel" class="form-control" id="phone1" placeholder="Asosiy" required style="margin-bottom: 6px;">
                <input type="tel" class="form-control" id="phone2" placeholder="Qo'shimcha">
            </div>

            <div class="form-group">
                <label>💰 Summa *</label>
                <input type="number" class="form-control" id="amount" placeholder="500000" min="1000" required>
            </div>

            <div class="form-group">
                <label>📅 Olingan sana *</label>
                <input type="date" class="form-control" id="takenDate" required>
            </div>

            <div class="form-group">
                <label>⏰ Muddat *</label>
                <input type="date" class="form-control" id="dueDate" required>
            </div>

            <div class="form-group">
                <label>🛒 Mahsulotlar</label>
                <textarea class="form-control" id="products" placeholder="Non, yog'..." rows="2"></textarea>
            </div>

            <div class="form-group">
                <label>📸 Rasmlar</label>
                <div class="image-preview-container" id="imagePreviewContainer"></div>
                <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;">
                <button type="button" class="view-images-btn" id="uploadImageBtn">
                    📷 Rasm yuklash
                </button>
            </div>

            <div class="form-group">
                <label>📝 Izoh</label>
                <textarea class="form-control" id="note" placeholder="Izoh..." rows="2"></textarea>
            </div>

            <button type="submit" class="view-images-btn" style="width: 100%; justify-content: center;">
                💾 Saqlash
            </button>
        </form>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📋 Tafsilotlar</h2>
            <button class="close-btn" id="closeDetailModalBtn">✕</button>
        </div>
        <div class="detail-scroll" id="detailContent"></div>
    </div>
</div>

<!-- Add More Modal -->
<div class="modal" id="addMoreModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>➕ Nasiyaga qo'shish</h2>
            <button class="close-btn" id="closeAddMoreModalBtn">✕</button>
        </div>
        
        <form id="addMoreForm">
            <input type="hidden" id="addMoreDebtId">
            
            <div class="form-group">
                <label>💰 Qo'shimcha summa *</label>
                <input type="number" class="form-control" id="addMoreAmount" placeholder="100000" min="1000" required>
            </div>

            <div class="form-group">
                <label>🛒 Qo'shimcha mahsulotlar</label>
                <textarea class="form-control" id="addMoreProducts" placeholder="Mahsulotlar..." rows="2"></textarea>
            </div>

            <div class="form-group">
                <label>📸 Yangi rasmlar</label>
                <div class="image-preview-container" id="addMoreImagePreview"></div>
                <input type="file" id="addMoreImageUpload" accept="image/*" multiple style="display: none;">
                <button type="button" class="view-images-btn" id="addMoreUploadBtn">
                    📷 Rasm yuklash
                </button>
            </div>

            <button type="submit" class="view-images-btn" style="width: 100%; justify-content: center; background: #f59e0b;">
                ➕ Nasiyaga qo'shish
            </button>
        </form>
    </div>
</div>

<!-- Image Viewer -->
<div class="image-viewer-modal" id="imageViewerModal">
    <div class="image-viewer-content">
        <button class="close-viewer" id="closeViewerBtn">✕</button>
        <img id="viewerImage" src="" alt="Rasm">
    </div>
</div>

<script>
    (function() {
        if (!window.db) {
            setTimeout(arguments.callee, 100);
            return;
        }

        const db = window.db;
        const storage = window.storage;
        const addDoc = window.firestoreAddDoc;
        const collection = window.firestoreCollection;
        const onSnapshot = window.firestoreOnSnapshot;
        const deleteDoc = window.firestoreDeleteDoc;
        const doc = window.firestoreDoc;
        const query = window.firestoreQuery;
        const orderBy = window.firestoreOrderBy;
        const updateDoc = window.firestoreUpdateDoc;
        const arrayUnion = window.firestoreArrayUnion;
        const storageRef = window.storageRef;
        const uploadBytes = window.storageUploadBytes;
        const getDownloadURL = window.storageGetDownloadURL;

        let currentTab = 'active';
        let currentDebtId = null;
        let allDebts = [];
        let selectedImages = [];
        let addMoreSelectedImages = [];

        const today = new Date().toISOString().split('T')[0];
        const nextMonth = new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0];
        document.getElementById('takenDate').value = today;
        document.getElementById('dueDate').value = nextMonth;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                filterAndRender();
            });
        });

        document.getElementById('searchInput').addEventListener('input', filterAndRender);
        
        // Rasm yuklash tugmalari
        document.getElementById('uploadImageBtn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('imageUpload').click();
        });
        
        document.getElementById('addMoreUploadBtn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('addMoreImageUpload').click();
        });

        document.getElementById('quickAddBtn').addEventListener('click', openQuickAdd);
        document.getElementById('quickAddFabBtn').addEventListener('click', openQuickAdd);

        function openQuickAdd() {
            resetForm();
            document.getElementById('modalTitle').textContent = '👤 Yangi mijoz';
            document.getElementById('debtModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Rasm preview - tuzatilgan
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            handleImageSelect(e.target.files, 'imagePreviewContainer', 'selectedImages');
        });

        document.getElementById('addMoreImageUpload').addEventListener('change', function(e) {
            handleImageSelect(e.target.files, 'addMoreImagePreview', 'addMoreSelectedImages');
        });

        function handleImageSelect(files, containerId, storageKey) {
            const container = document.getElementById(containerId);
            const filesArray = Array.from(files).slice(0, 5);
            
            filesArray.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'image-preview-wrapper';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'image-preview';
                    
                    const removeBtn = document.createElement('span');
                    removeBtn.className = 'remove-image-btn';
                    removeBtn.innerHTML = '✕';
                    removeBtn.onclick = (event) => {
                        event.stopPropagation();
                        wrapper.remove();
                        // Tanlangan rasmlar ro'yxatidan o'chirish
                        if (storageKey === 'selectedImages') {
                            selectedImages = selectedImages.filter((_, i) => i !== index);
                        } else {
                            addMoreSelectedImages = addMoreSelectedImages.filter((_, i) => i !== index);
                        }
                    };
                    
                    wrapper.appendChild(img);
                    wrapper.appendChild(removeBtn);
                    container.appendChild(wrapper);
                };
                reader.readAsDataURL(file);
            });
            
            // Saqlash uchun fayllarni saqlash
            if (storageKey === 'selectedImages') {
                selectedImages = [...selectedImages, ...filesArray];
            } else {
                addMoreSelectedImages = [...addMoreSelectedImages, ...filesArray];
            }
            
            // Inputni tozalash (qayta tanlash imkoniyati uchun)
            e.target.value = '';
            
            // Modal scroll refresh
            setTimeout(() => {
                const modal = container.closest('.modal-content');
                if (modal) {
                    modal.scrollTop = modal.scrollHeight;
                }
            }, 100);
        }

        window.copyPhone = function(event, phoneNumber) {
            event.stopPropagation();
            navigator.clipboard.writeText(phoneNumber).then(() => {
                showCopyFeedback('📋 Nusxalandi: ' + phoneNumber);
            });
        };

        function showCopyFeedback(message) {
            const feedback = document.createElement('div');
            feedback.className = 'copy-feedback';
            feedback.textContent = message;
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 2000);
        }

        // Close modals
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('closeDetailModalBtn').addEventListener('click', closeDetailModal);
        document.getElementById('closeAddMoreModalBtn').addEventListener('click', closeAddMoreModal);
        document.getElementById('closeViewerBtn').addEventListener('click', () => {
            document.getElementById('imageViewerModal').classList.remove('active');
            document.body.style.overflow = '';
        });

        // Load debts
        const debtsRef = collection(db, 'debts');
        const q = query(debtsRef, orderBy('createdAt', 'desc'));

        onSnapshot(q, (snapshot) => {
            allDebts = [];
            snapshot.forEach(doc => {
                allDebts.push({ id: doc.id, ...doc.data() });
            });
            filterAndRender();
            updateStats();
        }, (error) => {
            document.getElementById('debtList').innerHTML = '<div class="empty-state"><p>❌ Xatolik</p></div>';
        });

        function filterAndRender() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allDebts.filter(debt => {
                const matchesSearch = debt.fullName?.toLowerCase().includes(searchTerm) ||
                                    debt.phone1?.includes(searchTerm) ||
                                    debt.phone2?.includes(searchTerm);
                
                if (currentTab === 'active') return matchesSearch && debt.status === 'active';
                if (currentTab === 'paid') return matchesSearch && debt.status === 'paid';
                return matchesSearch;
            });

            renderDebtList(filtered);
        }

        function renderDebtList(debts) {
            const container = document.getElementById('debtList');
            
            if (debts.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>📭 Nasiya topilmadi</p></div>';
                return;
            }

            container.innerHTML = debts.map(debt => {
                const isOverdue = debt.status === 'active' && new Date(debt.dueDate) < new Date();
                const statusClass = debt.status === 'paid' ? 'status-paid' : (isOverdue ? 'status-overdue' : 'status-active');
                const statusText = debt.status === 'paid' ? '✅ To\'langan' : (isOverdue ? '⚠️ Muddat o\'tgan' : '🔄 Faol');
                
                const initials = debt.fullName?.split(' ').map(n => n[0]).join('').slice(0, 2) || '?';
                const paidAmount = debt.payments?.reduce((sum, p) => sum + p.amount, 0) || 0;
                const remaining = debt.amount - paidAmount;
                
                const additionalCount = debt.history?.filter(h => h.type === 'addition').length || 0;

                return `
                    <div class="debt-card" data-id="${debt.id}">
                        <div class="card-header">
                            <div class="debtor-info">
                                <div class="debtor-avatar">${initials}</div>
                                <div class="debtor-details">
                                    <h3>${debt.fullName || 'Noma\'lum'}</h3>
                                    <p>${additionalCount > 0 ? `📦 ${additionalCount} ta qo'shimcha` : '🆕 Yangi'}</p>
                                </div>
                            </div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        
                        <div class="phones">
                            ${debt.phone1 ? `<span class="phone-item" onclick="copyPhone(event, '${debt.phone1}')">📞 ${debt.phone1}</span>` : ''}
                            ${debt.phone2 ? `<span class="phone-item" onclick="copyPhone(event, '${debt.phone2}')">📱 ${debt.phone2}</span>` : ''}
                        </div>
                        
                        <div class="debt-amount">
                            ${formatMoney(remaining)} <small>so'm</small>
                            ${paidAmount > 0 ? `<small>/ ${formatMoney(debt.amount)}</small>` : ''}
                        </div>
                        
                        <div class="debt-dates">
                            <span class="date-item">📅 ${formatDate(debt.takenDate)}</span>
                            <span class="date-item">⏰ ${formatDate(debt.dueDate)}</span>
                        </div>
                        
                        ${debt.images?.length ? `
                            <button class="view-images-btn" onclick="viewAllImages(event, '${debt.id}')">
                                🖼️ Rasmlarni ko'rish (${debt.images.length})
                            </button>
                        ` : ''}
                        
                        <div class="card-actions">
                            ${debt.status === 'active' ? `
                                <button class="btn btn-success" data-action="payment" data-id="${debt.id}">💵 To'lov</button>
                                <button class="btn btn-warning" data-action="addMore" data-id="${debt.id}">➕ Qo'shish</button>
                                <button class="btn btn-primary" data-action="edit" data-id="${debt.id}">✏️ Tahrir</button>
                            ` : ''}
                            <button class="btn btn-danger" data-action="delete" data-id="${debt.id}">🗑️ O'chirish</button>
                        </div>
                    </div>
                `;
            }).join('');

            attachCardEvents(container);
        }

        window.viewAllImages = function(event, debtId) {
            event.stopPropagation();
            const debt = allDebts.find(d => d.id === debtId);
            if (!debt?.images?.length) return;
            
            document.getElementById('viewerImage').src = debt.images[0];
            document.getElementById('imageViewerModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            let currentIndex = 0;
            const viewerImg = document.getElementById('viewerImage');
            
            viewerImg.onclick = () => {
                currentIndex = (currentIndex + 1) % debt.images.length;
                viewerImg.src = debt.images[currentIndex];
            };
        };

        function attachCardEvents(container) {
            container.querySelectorAll('.debt-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('button') && !e.target.closest('.phone-item')) {
                        showDetail(card.dataset.id);
                    }
                });
            });

            container.querySelectorAll('[data-action="payment"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    addPayment(btn.dataset.id);
                });
            });

            container.querySelectorAll('[data-action="addMore"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showAddMoreModal(btn.dataset.id);
                });
            });

            container.querySelectorAll('[data-action="edit"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    editDebt(btn.dataset.id);
                });
            });

            container.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteDebt(btn.dataset.id);
                });
            });
        }

        function updateStats() {
            const active = allDebts.filter(d => d.status === 'active');
            const paid = allDebts.filter(d => d.status === 'paid');
            const totalDebt = active.reduce((sum, d) => sum + (d.amount - (d.payments?.reduce((s, p) => s + p.amount, 0) || 0)), 0);
            const totalPaid = paid.reduce((sum, d) => sum + d.amount, 0);
            
            document.getElementById('activeDebtsCount').textContent = active.length;
            document.getElementById('totalDebt').textContent = formatMoney(totalDebt);
            document.getElementById('totalPaid').textContent = formatMoney(totalPaid);
        }

        function showAddMoreModal(id) {
            document.getElementById('addMoreDebtId').value = id;
            document.getElementById('addMoreModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('addMoreForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const debtId = document.getElementById('addMoreDebtId').value;
            const debt = allDebts.find(d => d.id === debtId);
            if (!debt) return;

            const additionalAmount = parseFloat(document.getElementById('addMoreAmount').value);
            const additionalProducts = document.getElementById('addMoreProducts').value;
            
            const newAmount = debt.amount + additionalAmount;
            
            let newProducts = debt.products || '';
            if (additionalProducts) {
                newProducts = newProducts ? `${newProducts}; ${additionalProducts}` : additionalProducts;
            }

            let newImages = debt.images || [];
            
            if (addMoreSelectedImages.length > 0) {
                const uploadedUrls = await uploadImages(addMoreSelectedImages);
                newImages = [...newImages, ...uploadedUrls];
            }

            const historyEntry = {
                type: 'addition',
                amount: additionalAmount,
                products: additionalProducts,
                date: new Date().toISOString(),
                timestamp: Date.now()
            };

            try {
                await updateDoc(doc(db, 'debts', debtId), {
                    amount: newAmount,
                    products: newProducts,
                    images: newImages,
                    history: arrayUnion(historyEntry),
                    updatedAt: Date.now()
                });
                
                closeAddMoreModal();
                showCopyFeedback('✅ Nasiyaga qo\'shildi!');
            } catch (error) {
                alert('Xatolik: ' + error.message);
            }
        });

        document.getElementById('debtForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                fullName: document.getElementById('fullName').value,
                phone1: document.getElementById('phone1').value,
                phone2: document.getElementById('phone2').value,
                amount: parseFloat(document.getElementById('amount').value),
                takenDate: document.getElementById('takenDate').value,
                dueDate: document.getElementById('dueDate').value,
                products: document.getElementById('products').value,
                note: document.getElementById('note').value,
                status: 'active',
                payments: currentDebtId ? (allDebts.find(d => d.id === currentDebtId)?.payments || []) : [],
                history: currentDebtId ? (allDebts.find(d => d.id === currentDebtId)?.history || []) : [],
                updatedAt: Date.now()
            };

            if (selectedImages.length > 0) {
                formData.images = await uploadImages(selectedImages);
            } else if (currentDebtId) {
                formData.images = allDebts.find(d => d.id === currentDebtId)?.images || [];
            }

            try {
                if (currentDebtId) {
                    await updateDoc(doc(db, 'debts', currentDebtId), formData);
                } else {
                    formData.createdAt = Date.now();
                    formData.history = [{
                        type: 'created',
                        amount: formData.amount,
                        date: new Date().toISOString(),
                        timestamp: Date.now()
                    }];
                    await addDoc(debtsRef, formData);
                }
                closeModal();
                resetForm();
                showCopyFeedback('✅ Saqlandi!');
            } catch (error) {
                alert('Xatolik: ' + error.message);
            }
        });

        async function uploadImages(files) {
            const urls = [];
            for (const file of files) {
                const imageRef = storageRef(storage, `debts/${Date.now()}_${file.name}`);
                await uploadBytes(imageRef, file);
                const url = await getDownloadURL(imageRef);
                urls.push(url);
            }
            return urls;
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('uz-UZ').format(amount || 0);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('uz-UZ', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function formatDateTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleString('uz-UZ', { 
                day: '2-digit', 
                month: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function closeModal() {
            document.getElementById('debtModal').classList.remove('active');
            document.body.style.overflow = '';
            resetForm();
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeAddMoreModal() {
            document.getElementById('addMoreModal').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('addMoreForm').reset();
            document.getElementById('addMoreImagePreview').innerHTML = '';
            addMoreSelectedImages = [];
        }

        function resetForm() {
            document.getElementById('debtForm').reset();
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('modalTitle').textContent = '➕ Yangi nasiya';
            document.getElementById('takenDate').value = today;
            document.getElementById('dueDate').value = nextMonth;
            currentDebtId = null;
            selectedImages = [];
        }

        function showDetail(id) {
            const debt = allDebts.find(d => d.id === id);
            if (!debt) return;
            
            const paidAmount = debt.payments?.reduce((sum, p) => sum + p.amount, 0) || 0;
            const remaining = debt.amount - paidAmount;
            
            const history = debt.history || [];
            const historyHtml = history.length ? `
                <div class="history-timeline">
                    <h4 style="margin-bottom:12px;">📜 Nasiya tarixi</h4>
                    ${history.sort((a,b) => b.timestamp - a.timestamp).map(h => `
                        <div class="history-item">
                            <div class="history-icon">
                                ${h.type === 'created' ? '🆕' : '➕'}
                            </div>
                            <div class="history-content">
                                <div class="history-title">
                                    ${h.type === 'created' ? 'Nasiya ochildi' : 'Qo\'shimcha nasiya'}
                                </div>
                                <div class="history-desc">
                                    ${h.products ? h.products.slice(0, 50) + '...' : ''}
                                </div>
                                <div style="display:flex; justify-content:space-between; margin-top:4px;">
                                    <span class="history-amount">${formatMoney(h.amount)} so'm</span>
                                    <span style="font-size:0.7rem; opacity:0.6;">${formatDateTime(h.timestamp)}</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            ` : '';
            
            document.getElementById('detailContent').innerHTML = `
                <div style="margin-bottom:16px;">
                    <h3 style="margin-bottom:12px;">👤 ${debt.fullName}</h3>
                    <p onclick="copyPhone(event, '${debt.phone1}')" style="cursor:pointer; margin-bottom:6px;">
                        📞 ${debt.phone1}
                    </p>
                    ${debt.phone2 ? `<p onclick="copyPhone(event, '${debt.phone2}')" style="cursor:pointer; margin-bottom:6px;">📱 ${debt.phone2}</p>` : ''}
                    <p>💰 Jami: ${formatMoney(debt.amount)} so'm</p>
                    <p>✅ To'langan: ${formatMoney(paidAmount)} so'm</p>
                    <p>⏳ Qoldiq: ${formatMoney(remaining)} so'm</p>
                    <p>📅 Olingan: ${formatDate(debt.takenDate)}</p>
                    <p>⏰ Muddat: ${formatDate(debt.dueDate)}</p>
                    ${debt.products ? `<p>🛒 ${debt.products}</p>` : ''}
                    ${debt.note ? `<p>📝 ${debt.note}</p>` : ''}
                </div>
                
                ${debt.images?.length ? `
                    <div style="margin-bottom:16px;">
                        <button class="view-images-btn" onclick="viewAllImages(event, '${debt.id}')">
                            🖼️ Rasmlarni ko'rish (${debt.images.length})
                        </button>
                    </div>
                ` : ''}
                
                ${debt.payments?.length ? `
                    <div style="margin-bottom:16px;">
                        <h4 style="margin-bottom:10px;">💵 To'lovlar tarixi</h4>
                        <div class="payments-list">
                            ${debt.payments.map(p => `
                                <div class="payment-item-detail">
                                    <span>📅 ${formatDate(p.date)}</span>
                                    <span><strong>${formatMoney(p.amount)} so'm</strong></span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                
                ${historyHtml}
            `;
            
            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function addPayment(id) {
            const amount = prompt('To\'lov summasini kiriting (so\'m):');
            if (!amount) return;
            
            const paymentAmount = parseFloat(amount);
            if (isNaN(paymentAmount) || paymentAmount <= 0) {
                alert('Noto\'g\'ri summa');
                return;
            }
            
            const debt = allDebts.find(d => d.id === id);
            const payments = debt.payments || [];
            payments.push({
                amount: paymentAmount,
                date: new Date().toISOString().split('T')[0],
                timestamp: Date.now()
            });
            
            const totalPaid = payments.reduce((sum, p) => sum + p.amount, 0);
            const status = totalPaid >= debt.amount ? 'paid' : 'active';
            
            await updateDoc(doc(db, 'debts', id), { payments, status });
            showCopyFeedback('✅ To\'lov qabul qilindi!');
        }

        function editDebt(id) {
            const debt = allDebts.find(d => d.id === id);
            if (!debt) return;
            
            currentDebtId = id;
            document.getElementById('modalTitle').textContent = '✏️ Tahrirlash';
            document.getElementById('fullName').value = debt.fullName || '';
            document.getElementById('phone1').value = debt.phone1 || '';
            document.getElementById('phone2').value = debt.phone2 || '';
            document.getElementById('amount').value = debt.amount || '';
            document.getElementById('takenDate').value = debt.takenDate || '';
            document.getElementById('dueDate').value = debt.dueDate || '';
            document.getElementById('products').value = debt.products || '';
            document.getElementById('note').value = debt.note || '';
            
            // Mavjud rasmlarni ko'rsatish
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = '';
            if (debt.images) {
                debt.images.forEach((url, index) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'image-preview-wrapper';
                    
                    const img = document.createElement('img');
                    img.src = url;
                    img.className = 'image-preview';
                    
                    const removeBtn = document.createElement('span');
                    removeBtn.className = 'remove-image-btn';
                    removeBtn.innerHTML = '✕';
                    removeBtn.onclick = (event) => {
                        event.stopPropagation();
                        wrapper.remove();
                    };
                    
                    wrapper.appendChild(img);
                    wrapper.appendChild(removeBtn);
                    container.appendChild(wrapper);
                });
            }
            
            document.getElementById('debtModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function deleteDebt(id) {
            if (!confirm('O\'chirishni tasdiqlaysizmi?')) return;
            await deleteDoc(doc(db, 'debts', id));
            showCopyFeedback('🗑️ O\'chirildi');
        }

        document.getElementById('addDebtBtn').addEventListener('click', () => {
            resetForm();
            document.getElementById('debtModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        // Modal tashqarisiga bosganda yopish
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    document.body.style.overflow = '';
                    if (modal.id === 'debtModal') resetForm();
                    if (modal.id === 'addMoreModal') {
                        addMoreSelectedImages = [];
                        document.getElementById('addMoreImagePreview').innerHTML = '';
                    }
                }
            });
        });

        document.getElementById('imageViewerModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('imageViewerModal')) {
                document.getElementById('imageViewerModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // iOS scroll muammosini tuzatish
        document.addEventListener('touchmove', function(e) {
            if (e.target.closest('.modal-content')) {
                e.stopPropagation();
            }
        }, { passive: false });

        console.log('✅ Nasiya Pro Max ishga tushdi!');
    })();
</script>
</body>
</html>
