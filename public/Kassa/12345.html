<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hamkorlar Hisobi Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #0f172a; /* Premium qora/ko'k */
            --primary-light: #334155;
            --accent: #3b82f6; /* Moviy urg'u */
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px 80px 16px;
            position: relative;
        }

        /* Navigatsiya (Tablar) */
        .tabs {
            display: flex;
            background: #e2e8f0;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--card-bg);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Balans Karta */
        .balance-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            position: relative;
        }

        .category-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            line-height: 1;
        }

        .balance-status {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* To'lash Tugmasi */
        .settle-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: none; /* Faqat qarz bo'lsa chiqadi */
            transition: opacity 0.2s;
        }
        .settle-btn:active { opacity: 0.8; }

        /* Forma */
        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .input-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background-color: var(--bg-color);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:active { background: var(--primary-light); }

        /* Tarix */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .transaction-item {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .tx-info h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .tx-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .tx-amount { font-size: 15px; font-weight: 700; }
        .tx-sohibjon { color: var(--accent); }
        .tx-ilhomjon { color: var(--text-main); }
        .tx-settlement { color: var(--success); font-size: 13px; }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="investment">Do'konga Sarmoya</button>
            <button class="tab-btn" data-tab="product">Maxsulot Olish</button>
            <button class="tab-btn" data-tab="cash">Naqd Pul Olish</button>
        </div>

        <div class="balance-card">
            <span class="category-label" id="cat-label">Sarmoya Holati</span>
            <div class="balance-amount" id="debt-amount">0</div>
            <div class="balance-status" id="debt-status">Hisoblar teng</div>
            <button class="settle-btn" id="settle-btn">Qarzni To'lash</button>
        </div>

        <div class="form-card">
            <form id="transaction-form">
                <div class="input-group">
                    <label id="payer-label">Kim pul tikdi?</label>
                    <select id="payer" required>
                        <option value="Sohibjon">Sohibjon</option>
                        <option value="Ilhomjon">Ilhomjon</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Summa (UZS)</label>
                    <input type="number" id="amount" placeholder="Masalan: 100000" required>
                </div>
                <div class="input-group">
                    <label id="desc-label">Nima uchun / Izoh</label>
                    <input type="text" id="description" placeholder="Izoh kiriting" required>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Saqlash</button>
            </form>
        </div>

        <h3 class="section-title">So'nggi harakatlar</h3>
        <div class="transaction-list" id="transaction-list">
            </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
            authDomain: "xplusy-760fa.firebaseapp.com",
            projectId: "xplusy-760fa",
            storageBucket: "xplusy-760fa.firebasestorage.app",
            messagingSenderId: "992512966017",
            appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let currentTab = 'investment';
        let allTransactions = [];
        let currentNetDebt = 0; 
        let currentDebtor = ''; 
        let currentCreditor = '';

        // UI Elements
        const form = document.getElementById('transaction-form');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const catLabel = document.getElementById('cat-label');
        const payerLabel = document.getElementById('payer-label');
        const descLabel = document.getElementById('desc-label');
        const debtAmountEl = document.getElementById('debt-amount');
        const debtStatusEl = document.getElementById('debt-status');
        const settleBtn = document.getElementById('settle-btn');
        const listEl = document.getElementById('transaction-list');
        const submitBtn = document.getElementById('submit-btn');

        // Tab o'zgarishi
        tabBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                tabBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentTab = e.target.dataset.tab;
                updateUIForTab();
                renderData();
            });
        });

        function updateUIForTab() {
            if(currentTab === 'investment') {
                catLabel.textContent = "Sarmoya Holati";
                payerLabel.textContent = "Kim do'konga pul tikdi?";
                descLabel.textContent = "Nima uchun?";
            } else if(currentTab === 'product') {
                catLabel.textContent = "Maxsulot Olish Holati";
                payerLabel.textContent = "Kim do'kondan maxsulot oldi?";
                descLabel.textContent = "Qanday maxsulot?";
            } else {
                catLabel.textContent = "Kassa Holati";
                payerLabel.textContent = "Kim kassadan pul oldi?";
                descLabel.textContent = "Izoh / Maqsad";
            }
        }

        // Ma'lumot qoshish
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.textContent = 'Kutilmoqda...';
            submitBtn.disabled = true;

            try {
                await addDoc(collection(db, "transactions"), {
                    payer: document.getElementById('payer').value,
                    amount: parseFloat(document.getElementById('amount').value),
                    description: document.getElementById('description').value,
                    category: currentTab,
                    type: 'expense',
                    timestamp: serverTimestamp()
                });
                form.reset();
            } catch (error) {
                alert("Xatolik! " + error.message);
            } finally {
                submitBtn.textContent = 'Saqlash';
                submitBtn.disabled = false;
            }
        });

        // To'lash funksiyasi
        settleBtn.addEventListener('click', async () => {
            if(!currentDebtor || currentNetDebt <= 0) return;

            const confirmMsg = `${currentDebtor} rostdan ham ${currentCreditor}ga qarzdorlikni to'ladimi?`;
            if(confirm(confirmMsg)) {
                settleBtn.textContent = 'To`lanmoqda...';
                settleBtn.disabled = true;
                try {
                    await addDoc(collection(db, "transactions"), {
                        payer: currentDebtor, // Pulni to'layotgan odam
                        amount: currentNetDebt,
                        description: 'Qarzdorlik uzildi ✅',
                        category: currentTab,
                        type: 'settlement',
                        timestamp: serverTimestamp()
                    });
                } catch (error) {
                    alert("Xatolik: " + error.message);
                } finally {
                    settleBtn.textContent = 'Qarzni To\'lash';
                    settleBtn.disabled = false;
                }
            }
        });

        // Ma'lumotlarni o'qish
        const q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allTransactions = [];
            snapshot.forEach(doc => allTransactions.push({ id: doc.id, ...doc.data() }));
            renderData();
        });

        function renderData() {
            // Faqat tanlangan tab ma'lumotlari
            const tabData = allTransactions.filter(t => t.category === currentTab);
            
            // Matematika: Sohibjonning Ilhomjondan haqdorligi (netBalance)
            // Agar musbat bo'lsa Sohibjon haqdor, manfiy bo'lsa Ilhomjon haqdor
            let netBalance = 0; 

            listEl.innerHTML = '';

            tabData.forEach(data => {
                // UI chizish
                const formatSum = new Intl.NumberFormat('uz-UZ').format(data.amount);
                let html = '';

                if(data.type === 'settlement') {
                    html = `
                        <div class="transaction-item" style="background:#ecfdf5; border-color:#a7f3d0">
                            <div class="tx-info">
                                <h4 style="color:#059669">${data.description}</h4>
                                <p>${data.payer} to'ladi</p>
                            </div>
                            <div class="tx-amount tx-settlement">${formatSum}</div>
                        </div>
                    `;
                } else {
                    const colorClass = data.payer === 'Sohibjon' ? 'tx-sohibjon' : 'tx-ilhomjon';
                    html = `
                        <div class="transaction-item">
                            <div class="tx-info">
                                <h4>${data.description}</h4>
                                <p>${data.payer} kiritdi</p>
                            </div>
                            <div class="tx-amount ${colorClass}">+ ${formatSum}</div>
                        </div>
                    `;
                }
                listEl.innerHTML += html;

                // Hisob-kitob Mantiqlari
                const amountHalf = data.amount / 2;

                if (data.type === 'expense') {
                    if (currentTab === 'investment') {
                        // Sarmoya: Ko'p tikkan odam haqdor
                        if (data.payer === 'Sohibjon') netBalance += amountHalf;
                        if (data.payer === 'Ilhomjon') netBalance -= amountHalf;
                    } else {
                        // Maxsulot/Kassa: Ko'p olgan odam qarzdor
                        if (data.payer === 'Sohibjon') netBalance -= amountHalf;
                        if (data.payer === 'Ilhomjon') netBalance += amountHalf;
                    }
                } else if (data.type === 'settlement') {
                    // Qarz uzilganda balanceni to'g'irlash
                    if (data.payer === 'Sohibjon') netBalance += data.amount;
                    if (data.payer === 'Ilhomjon') netBalance -= data.amount;
                }
            });

            // Xulosa UI ga chiqarish
            const formatDebt = new Intl.NumberFormat('uz-UZ').format(Math.abs(netBalance));
            currentNetDebt = Math.abs(netBalance);

            if (netBalance > 0) {
                // Sohibjon haqdor
                debtAmountEl.textContent = `${formatDebt} UZS`;
                debtStatusEl.textContent = 'Ilhomjon Sohibjonga berishi kerak';
                debtStatusEl.style.color = 'var(--danger)';
                currentDebtor = 'Ilhomjon';
                currentCreditor = 'Sohibjon';
                settleBtn.style.display = 'block';
                settleBtn.textContent = `Ilhomjon to'lash: ${formatDebt}`;
            } else if (netBalance < 0) {
                // Ilhomjon haqdor
                debtAmountEl.textContent = `${formatDebt} UZS`;
                debtStatusEl.textContent = 'Sohibjon Ilhomjonga berishi kerak';
                debtStatusEl.style.color = 'var(--danger)';
                currentDebtor = 'Sohibjon';
                currentCreditor = 'Ilhomjon';
                settleBtn.style.display = 'block';
                settleBtn.textContent = `Sohibjon to'lash: ${formatDebt}`;
            } else {
                // Teng
                debtAmountEl.textContent = `0 UZS`;
                debtStatusEl.textContent = 'Hisob-kitoblar teng';
                debtStatusEl.style.color = 'var(--success)';
                currentDebtor = '';
                settleBtn.style.display = 'none';
            }
        }

        // Dastlabki UI holati
        updateUIForTab();
    </script>
</body>
</html>
