<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⚖️ Sohibjon & Ilhomjon | Biznes Tarozi Pro</title>
    <!-- Firestore versiyasi -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
            authDomain: "xplusy-760fa.firebaseapp.com",
            projectId: "xplusy-760fa",
            storageBucket: "xplusy-760fa.firebasestorage.app",
            messagingSenderId: "992512966017",
            appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80",
            measurementId: "G-459PLJ7P7L"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.db = db;
        window.firestoreAddDoc = addDoc;
        window.firestoreCollection = collection;
        window.firestoreOnSnapshot = onSnapshot;
        window.firestoreDeleteDoc = deleteDoc;
        window.firestoreDoc = doc;
        window.firestoreQuery = query;
        window.firestoreOrderBy = orderBy;
        window.firestoreWriteBatch = writeBatch;
        
        console.log("✅ Firestore muvaffaqiyatli ulandi!");
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px 16px 90px;
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            width: 48px;
            height: 48px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 10px 20px -5px rgba(59,130,246,0.4);
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #e2e8f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text span {
            font-size: 0.75rem;
            opacity: 0.7;
            font-weight: 500;
        }

        .status-badge {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Kartalar */
        .balance-duo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 20px 16px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }

        .glass-card:active {
            transform: scale(0.98);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .sohib-avatar {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            box-shadow: 0 8px 14px -6px #2563eb80;
        }

        .ilhom-avatar {
            background: linear-gradient(135deg, #16a34a, #15803d);
            box-shadow: 0 8px 14px -6px #16a34a80;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .balance-amount {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .balance-label {
            font-size: 0.75rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Summary Box - Hero */
        .verdict-hero {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            border-radius: 34px;
            padding: 24px 22px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05), 0 20px 30px -10px black;
        }

        .verdict-label {
            display: flex;
            justify-content: space-between;
            opacity: 0.7;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .verdict-main {
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 18px;
            line-height: 1.3;
            background: linear-gradient(to right, #f0f9ff, #bae6fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        /* Action Panel */
        .action-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid #334155;
            border-radius: 34px;
            padding: 24px 20px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .person-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
        }

        .person-btn {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid #334155;
            border-radius: 60px;
            padding: 14px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 1rem;
        }

        .person-btn.active {
            background: #2563eb;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 8px 18px -6px #2563eb;
        }

        .person-btn:last-child.active {
            background: #16a34a;
            border-color: #22c55e;
            box-shadow: 0 8px 18px -6px #16a34a;
        }

        .input-field {
            margin-bottom: 18px;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.8;
        }

        .input-wrapper {
            background: #0f172a;
            border: 1.5px solid #334155;
            border-radius: 24px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            transition: 0.15s;
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .input-wrapper i {
            color: #64748b;
            font-size: 1.1rem;
            margin-right: 10px;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            background: transparent;
            border: none;
            padding: 16px 0;
            font-size: 1rem;
            color: white;
            outline: none;
            font-family: inherit;
        }

        .input-wrapper select option {
            background: #1e293b;
            color: white;
        }

        .primary-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 60px;
            padding: 18px 24px;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            box-shadow: 0 15px 25px -8px #1e3a8a;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .primary-btn:active {
            transform: scale(0.97);
            box-shadow: 0 6px 14px -6px #1e3a8a;
        }

        /* History */
        .history-section {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 20px 16px;
            border: 1px solid #334155;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 6px;
        }

        .history-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2d3748;
            backdrop-filter: blur(4px);
        }

        .history-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-badge {
            display: inline-block;
            background: #1e293b;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #94a3b8;
            width: fit-content;
        }

        .history-person {
            font-weight: 600;
        }

        .history-amount {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .delete-history {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.2rem;
            padding: 8px 6px;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.1s;
        }

        .delete-history:active {
            background: #450a0a;
            color: #f87171;
        }

        .footer-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
        }

        .text-btn {
            background: transparent;
            border: 1px solid #475569;
            padding: 10px 20px;
            border-radius: 40px;
            color: #cbd5e1;
            font-weight: 500;
            cursor: pointer;
        }

        .text-btn:active {
            background: #1e293b;
        }

        /* scroll */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .empty-state {
            text-align: center;
            padding: 30px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="app-header">
        <div class="logo">
            <div class="logo-icon">⚖️</div>
            <div class="logo-text">
                <h1>S&I Tarozi</h1>
                <span>sheriklik hisobi</span>
            </div>
        </div>
        <div class="status-badge">
            <span class="status-dot"></span> <span>online</span>
        </div>
    </div>

    <!-- Balans kartalari -->
    <div class="balance-duo">
        <div class="glass-card">
            <div class="card-header">
                <div class="avatar sohib-avatar">S</div>
                <div class="card-title">Sohibjon</div>
            </div>
            <div class="balance-amount" id="sohib-balance">0</div>
            <div class="balance-label">joriy balans</div>
        </div>
        <div class="glass-card">
            <div class="card-header">
                <div class="avatar ilhom-avatar">I</div>
                <div class="card-title">Ilhomjon</div>
            </div>
            <div class="balance-amount" id="ilhom-balance">0</div>
            <div class="balance-label">joriy balans</div>
        </div>
    </div>

    <!-- Xulosa Qarzdorlik -->
    <div class="verdict-hero">
        <div class="verdict-label">
            <span><i class="far fa-clock" style="margin-right: 6px;"></i>Umumiy tahlil</span>
            <span id="last-updated">--:--</span>
        </div>
        <div class="verdict-main" id="verdictText">Hisoblanmoqda...</div>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">Sohibjon qo'shgan</span>
                <span class="stat-value" id="sohib-contrib">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Ilhomjon qo'shgan</span>
                <span class="stat-value" id="ilhom-contrib">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Sohibjon olgan</span>
                <span class="stat-value" id="sohib-taken">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Ilhomjon olgan</span>
                <span class="stat-value" id="ilhom-taken">0</span>
            </div>
        </div>
    </div>

    <!-- Yozuv qo'shish -->
    <div class="action-panel">
        <div class="section-title"><i class="fas fa-plus-circle" style="color: #3b82f6;"></i>Yangi yozuv</div>
        
        <div class="person-selector" id="personSelector">
            <div class="person-btn active" data-person="sohibjon"><i class="fas fa-user"></i> Sohibjon</div>
            <div class="person-btn" data-person="ilhomjon"><i class="fas fa-user"></i> Ilhomjon</div>
        </div>
        <input type="hidden" id="selectedPerson" value="sohibjon">

        <div class="input-field">
            <label>Amal turi</label>
            <div class="input-wrapper">
                <i class="fas fa-tag"></i>
                <select id="transactionType">
                    <option value="contribution">💰 Mahsulotga qo'shgan pul</option>
                    <option value="goodsTaken">🛒 Olgan mahsuloti</option>
                    <option value="cashTaken">💵 Kassadan olgan naqd</option>
                </select>
            </div>
        </div>

        <div class="input-field">
            <label>Miqdor (so'm)</label>
            <div class="input-wrapper">
                <i class="fas fa-money-bill-wave"></i>
                <input type="number" id="amountInput" placeholder="50000" min="1000" step="1000" value="">
            </div>
        </div>

        <div class="input-field">
            <label>Izoh</label>
            <div class="input-wrapper">
                <i class="fas fa-pen"></i>
                <input type="text" id="noteInput" placeholder="non, go'sht ...">
            </div>
        </div>

        <button class="primary-btn" id="addBtn"><i class="fas fa-save"></i> Saqlash</button>
    </div>

    <!-- Tarix -->
    <div class="history-section">
        <div class="history-header">
            <span style="font-weight: 600;"><i class="far fa-list-alt"></i> So'nggi amallar</span>
            <span><i class="fas fa-chevron-down"></i></span>
        </div>
        <ul class="history-list" id="historyList">
            <li class="empty-state">Yuklanmoqda...</li>
        </ul>
        <div class="footer-actions">
            <button class="text-btn" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Barchasini tozalash</button>
        </div>
    </div>
</div>

<script>
    (function waitForFirestore() {
        if (window.db && window.firestoreAddDoc) {
            initApp();
        } else {
            setTimeout(waitForFirestore, 100);
        }
    })();

    function initApp() {
        const db = window.db;
        const addDoc = window.firestoreAddDoc;
        const collection = window.firestoreCollection;
        const onSnapshot = window.firestoreOnSnapshot;
        const deleteDoc = window.firestoreDeleteDoc;
        const doc = window.firestoreDoc;
        const query = window.firestoreQuery;
        const orderBy = window.firestoreOrderBy;
        const writeBatch = window.firestoreWriteBatch;

        // DOM elementlar
        const sohibBal = document.getElementById('sohib-balance');
        const ilhomBal = document.getElementById('ilhom-balance');
        const sohibContrib = document.getElementById('sohib-contrib');
        const ilhomContrib = document.getElementById('ilhom-contrib');
        const sohibTaken = document.getElementById('sohib-taken');
        const ilhomTaken = document.getElementById('ilhom-taken');
        const verdictText = document.getElementById('verdictText');
        const historyList = document.getElementById('historyList');
        const lastUpdated = document.getElementById('last-updated');

        const addBtn = document.getElementById('addBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const amountInput = document.getElementById('amountInput');
        const noteInput = document.getElementById('noteInput');
        const typeSelect = document.getElementById('transactionType');

        // Person selector
        const personBtns = document.querySelectorAll('.person-btn');
        const selectedPersonInput = document.getElementById('selectedPerson');
        
        personBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                personBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPersonInput.value = btn.dataset.person;
            });
        });

        const transactionsRef = collection(db, 'transactions');
        const q = query(transactionsRef, orderBy('timestamp', 'desc'));

        function formatMoney(v) { 
            return new Intl.NumberFormat('uz-UZ').format(v || 0); 
        }

        // Firestore qoidalari: barchaga ochiq bo'lishi kerak
        // Firestore console'da: Rules -> quyidagini qo'ying:
        /*
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /transactions/{document} {
              allow read, write: if true;
            }
          }
        }
        */

        function updateUI(transactions) {
            let sC = 0, iC = 0, sG = 0, iG = 0, sCash = 0, iCash = 0;
            
            transactions.forEach(doc => {
                const t = doc.data();
                const amt = Number(t.amount) || 0;
                if (t.person === 'sohibjon') {
                    if (t.type === 'contribution') sC += amt;
                    else if (t.type === 'goodsTaken') sG += amt;
                    else if (t.type === 'cashTaken') sCash += amt;
                } else {
                    if (t.type === 'contribution') iC += amt;
                    else if (t.type === 'goodsTaken') iG += amt;
                    else if (t.type === 'cashTaken') iCash += amt;
                }
            });
            
            const sBal = sC - (sG + sCash);
            const iBal = iC - (iG + iCash);
            
            sohibBal.textContent = formatMoney(sBal);
            ilhomBal.textContent = formatMoney(iBal);
            sohibContrib.textContent = formatMoney(sC);
            ilhomContrib.textContent = formatMoney(iC);
            sohibTaken.textContent = formatMoney(sG + sCash);
            ilhomTaken.textContent = formatMoney(iG + iCash);

            const diff = sBal - iBal;
            if (Math.abs(diff) < 0.5) {
                verdictText.textContent = '🤝 Hisob toza. Hech kim qarzdor emas.';
            } else if (diff > 0) {
                verdictText.textContent = `🔵 Ilhomjon Sohibjonga ${formatMoney(diff)} so'm qarzdor`;
            } else {
                verdictText.textContent = `🟢 Sohibjon Ilhomjonga ${formatMoney(-diff)} so'm qarzdor`;
            }
            
            const now = new Date();
            lastUpdated.textContent = now.toLocaleTimeString('uz-UZ', {hour: '2-digit', minute: '2-digit'});
        }

        function renderHistory(transactions) {
            if (transactions.length === 0) {
                historyList.innerHTML = '<li class="empty-state">Hozircha yozuvlar yo\'q</li>';
                return;
            }
            
            let html = '';
            transactions.forEach(doc => {
                const t = doc.data();
                const person = t.person === 'sohibjon' ? 'Sohibjon' : 'Ilhomjon';
                let typeTxt = '', icon = '';
                
                if (t.type === 'contribution') { 
                    typeTxt = 'Qo\'shgan pul'; 
                    icon = '💰'; 
                } else if (t.type === 'goodsTaken') { 
                    typeTxt = 'Olgan mahsulot'; 
                    icon = '🛒'; 
                } else { 
                    typeTxt = 'Olgan naqd'; 
                    icon = '💵'; 
                }
                
                const note = t.note ? ` · ${t.note}` : '';
                const timeStr = t.timestamp ? new Date(t.timestamp).toLocaleTimeString('uz-UZ', {hour: '2-digit', minute: '2-digit'}) : '';
                
                html += `<li class="history-item">
                    <div class="history-left">
                        <span class="history-badge">${icon} ${typeTxt}</span>
                        <span class="history-person">${person}${note}</span>
                        <span style="font-size:0.7rem; opacity:0.5;">${timeStr}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="history-amount">${formatMoney(t.amount)}</span>
                        <button class="delete-history" data-id="${doc.id}"><i class="fas fa-trash"></i></button>
                    </div>
                </li>`;
            });
            
            historyList.innerHTML = html;
            
            document.querySelectorAll('.delete-history').forEach(b => {
                b.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = b.dataset.id;
                    if (confirm('Ushbu yozuv o\'chirilsinmi?')) {
                        try {
                            await deleteDoc(doc(db, 'transactions', id));
                            console.log('✅ Yozuv o\'chirildi');
                        } catch (err) {
                            alert('Xatolik: ' + err);
                        }
                    }
                });
            });
        }

        // Real-time listener
        onSnapshot(q, (snapshot) => {
            const transactions = [];
            snapshot.forEach(doc => transactions.push(doc));
            updateUI(transactions);
            renderHistory(transactions);
        }, (error) => {
            console.error("Firestore xatosi:", error);
            historyList.innerHTML = '<li class="empty-state">Ulanishda xatolik</li>';
        });

        // Yangi yozuv qo'shish
        addBtn.addEventListener('click', async () => {
            const person = selectedPersonInput.value;
            const type = typeSelect.value;
            const amt = Number(amountInput.value);
            
            if (!amt || amt <= 0) {
                alert("Iltimos, to'g'ri miqdor kiriting");
                return;
            }
            
            const note = noteInput.value.trim();
            
            try {
                await addDoc(transactionsRef, {
                    person: person,
                    type: type,
                    amount: amt,
                    note: note,
                    timestamp: Date.now()
                });
                amountInput.value = '';
                noteInput.value = '';
                console.log('✅ Yozuv saqlandi');
            } catch (err) {
                alert('Saqlashda xatolik: ' + err);
            }
        });

        // Barchasini tozalash
        clearAllBtn.addEventListener('click', async () => {
            if (confirm('DIQQAT! Barcha yozuvlar o\'chiriladi. Davom etasizmi?')) {
                try {
                    const snapshot = await new Promise((resolve) => {
                        onSnapshot(transactionsRef, resolve, { once: true });
                    });
                    
                    const batch = writeBatch(db);
                    snapshot.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    
                    await batch.commit();
                    console.log('✅ Barcha yozuvlar tozalandi');
                } catch (err) {
                    alert('Xatolik: ' + err);
                }
            }
        });

        console.log('✅ Ilova muvaffaqiyatli ishga tushdi!');
    }
</script>
</body>
</html>
