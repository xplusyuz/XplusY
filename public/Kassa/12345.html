<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheriklik Do'koni - Hisob-Kitob</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #333; }
        
        /* Summary Cards */
        .summary-container { display: flex; justify-content: space-between; margin-bottom: 30px; gap: 20px; }
        .card { flex: 1; padding: 20px; border-radius: 8px; text-align: center; color: white; }
        .card.sohibjon { background-color: #4CAF50; }
        .card.ilhomjon { background-color: #2196F3; }
        .card h3 { margin: 0 0 10px 0; font-size: 24px; }
        .card p { margin: 0; font-size: 20px; font-weight: bold; }

        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #ff9800; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #e68a00; }

        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #333; }
        tr:hover { background-color: #f5f5f5; }
        .type-add { color: green; font-weight: bold; }
        .type-take { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Do'kon Hisob-Kitobi</h1>

    <div class="summary-container">
        <div class="card sohibjon">
            <h3>Sohibjon</h3>
            <p>Balans: <span id="sohibjon-balance">0</span> so'm</p>
        </div>
        <div class="card ilhomjon">
            <h3>Ilhomjon</h3>
            <p>Balans: <span id="ilhomjon-balance">0</span> so'm</p>
        </div>
    </div>

    <h2>Yangi amaliyot kiritish</h2>
    <form id="transaction-form">
        <div class="form-group">
            <label for="partner">Kim?</label>
            <select id="partner" required>
                <option value="Sohibjon">Sohibjon</option>
                <option value="Ilhomjon">Ilhomjon</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="type">Nima qildi?</label>
            <select id="type" required>
                <option value="add_money">Yonidan pul qo'shdi</option>
                <option value="take_money">Kassadan pul oldi</option>
                <option value="take_product">Do'kondan mahsulot oldi</option>
            </select>
        </div>

        <div class="form-group">
            <label for="amount">Miqdor (so'mda)</label>
            <input type="number" id="amount" placeholder="Masalan: 50000" required>
        </div>

        <div class="form-group">
            <label for="description">Izoh (ixtiyoriy)</label>
            <input type="text" id="description" placeholder="Nima uchun olindi/qo'shildi?">
        </div>

        <button type="submit">Saqlash</button>
    </form>

    <h2>Amaliyotlar tarixi</h2>
    <table>
        <thead>
            <tr>
                <th>Sana</th>
                <th>Kim</th>
                <th>Amaliyot</th>
                <th>Miqdor</th>
                <th>Izoh</th>
            </tr>
        </thead>
        <tbody id="history-table">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Siz taqdim etgan Firebase konfiguratsiyasi
    const firebaseConfig = {
        apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
        authDomain: "xplusy-760fa.firebaseapp.com",
        projectId: "xplusy-760fa",
        storageBucket: "xplusy-760fa.firebasestorage.app",
        messagingSenderId: "992512966017",
        appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80"
    };

    // Firebase'ni ishga tushirish
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('transaction-form');
    const historyTable = document.getElementById('history-table');
    const sohibjonBalanceEl = document.getElementById('sohibjon-balance');
    const ilhomjonBalanceEl = document.getElementById('ilhomjon-balance');

    // Formani yuborish (Ma'lumotni saqlash)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const partner = document.getElementById('partner').value;
        const type = document.getElementById('type').value;
        const amount = Number(document.getElementById('amount').value);
        const description = document.getElementById('description').value;

        try {
            await addDoc(collection(db, "transactions"), {
                partner: partner,
                type: type,
                amount: amount,
                description: description,
                timestamp: serverTimestamp()
            });
            form.reset();
        } catch (error) {
            console.error("Xatolik yuz berdi: ", error);
            alert("Ma'lumotni saqlashda xatolik! Internetni tekshiring.");
        }
    });

    // Ma'lumotlarni o'qish va Ekranga chiqarish
    const q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
    
    onSnapshot(q, (snapshot) => {
        historyTable.innerHTML = '';
        let sohibjonBalance = 0;
        let ilhomjonBalance = 0;

        snapshot.forEach((doc) => {
            const data = doc.data();
            
            // Balansni hisoblash
            let effect = 0;
            if (data.type === 'add_money') {
                effect = data.amount; // Pul qo'shsa balans oshadi
            } else {
                effect = -data.amount; // Pul yoki mahsulot olsa balans kamayadi
            }

            if (data.partner === 'Sohibjon') sohibjonBalance += effect;
            if (data.partner === 'Ilhomjon') ilhomjonBalance += effect;

            // Jadvalga qator qo'shish
            const dateStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString('uz-UZ') : "Hozirgina";
            
            let typeLabel = "";
            let typeClass = "";
            if(data.type === 'add_money') { typeLabel = "Pul qo'shdi"; typeClass = "type-add"; }
            if(data.type === 'take_money') { typeLabel = "Pul oldi"; typeClass = "type-take"; }
            if(data.type === 'take_product') { typeLabel = "Mahsulot oldi"; typeClass = "type-take"; }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${dateStr}</td>
                <td><strong>${data.partner}</strong></td>
                <td>${typeLabel}</td>
                <td class="${typeClass}">${data.amount.toLocaleString()}</td>
                <td>${data.description}</td>
            `;
            historyTable.appendChild(tr);
        });

        // Balanslarni ekranga yangilash
        sohibjonBalanceEl.textContent = sohibjonBalance.toLocaleString();
        ilhomjonBalanceEl.textContent = ilhomjonBalance.toLocaleString();
    });
</script>

</body>
</html>
