<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hamkorlar Hisobi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7fb;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 16px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px; /* Mobil dizayn o'lchami */
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Balans Karta Dizayni */
        .balance-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .balance-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            word-break: break-all;
        }

        .balance-status {
            font-size: 15px;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: 12px;
            display: inline-block;
            background: var(--bg-color);
        }

        /* Forma Dizayni */
        .form-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background-color: #fff;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            background: #1d4ed8;
        }

        /* Tarix ro'yxati */
        .history-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .transaction-item {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.01);
        }

        .tx-info h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tx-info p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .tx-amount {
            font-size: 16px;
            font-weight: 700;
        }
        
        .tx-sohibjon { color: var(--primary); }
        .tx-ilhomjon { color: var(--success); }

    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Do'kon Hisob-Kitobi</h1>
        </header>

        <div class="balance-card">
            <div class="balance-title">Joriy Holat</div>
            <div class="balance-amount" id="debt-amount">0 UZS</div>
            <div class="balance-status" id="debt-status">Hisob-kitoblar teng</div>
        </div>

        <div class="form-card">
            <form id="transaction-form">
                <div class="input-group">
                    <label>Kim pul tikdi?</label>
                    <select id="payer" required>
                        <option value="Sohibjon">Sohibjon</option>
                        <option value="Ilhomjon">Ilhomjon</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Summa (UZS)</label>
                    <input type="number" id="amount" placeholder="Masalan: 300000" required>
                </div>
                <div class="input-group">
                    <label>Nima uchun / Izoh</label>
                    <input type="text" id="description" placeholder="Masalan: Tovar xaridi uchun" required>
                </div>
                <button type="submit" id="submit-btn">Kiritish</button>
            </form>
        </div>

        <h3 class="history-title">So'nggi harakatlar</h3>
        <div class="transaction-list" id="transaction-list">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Siz taqdim etgan Firebase konfiguratsiyasi
        const firebaseConfig = {
            apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
            authDomain: "xplusy-760fa.firebaseapp.com",
            projectId: "xplusy-760fa",
            storageBucket: "xplusy-760fa.firebasestorage.app",
            messagingSenderId: "992512966017",
            appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80"
        };

        // Firebaseni ishga tushirish
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Elementlari
        const form = document.getElementById('transaction-form');
        const debtAmountEl = document.getElementById('debt-amount');
        const debtStatusEl = document.getElementById('debt-status');
        const transactionListEl = document.getElementById('transaction-list');
        const submitBtn = document.getElementById('submit-btn');

        // Formani yuborish
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.textContent = 'Kutilmoqda...';
            submitBtn.disabled = true;

            const payer = document.getElementById('payer').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const description = document.getElementById('description').value;

            try {
                await addDoc(collection(db, "transactions"), {
                    payer: payer,
                    amount: amount,
                    description: description,
                    timestamp: serverTimestamp()
                });
                form.reset();
            } catch (error) {
                console.error("Xatolik yuz berdi: ", error);
                alert("Xatolik! Ma'lumot qo'shilmadi.");
            } finally {
                submitBtn.textContent = 'Kiritish';
                submitBtn.disabled = false;
            }
        });

        // Ma'lumotlarni real vaqtda o'qish va hisoblash
        const q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            let totalSohibjon = 0;
            let totalIlhomjon = 0;
            transactionListEl.innerHTML = '';

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Summalarni yig'ish
                if (data.payer === 'Sohibjon') totalSohibjon += data.amount;
                if (data.payer === 'Ilhomjon') totalIlhomjon += data.amount;

                // Tarixni chizish
                const formatSum = new Intl.NumberFormat('uz-UZ').format(data.amount);
                const colorClass = data.payer === 'Sohibjon' ? 'tx-sohibjon' : 'tx-ilhomjon';
                
                const txHTML = `
                    <div class="transaction-item">
                        <div class="tx-info">
                            <h4>${data.description}</h4>
                            <p>${data.payer} kiritdi</p>
                        </div>
                        <div class="tx-amount ${colorClass}">+ ${formatSum}</div>
                    </div>
                `;
                transactionListEl.innerHTML += txHTML;
            });

            // Balansni hisoblash (50/50 qoida bo'yicha)
            // Farqni topib, uning yarmini qarzdorlik deb belgilaymiz
            let difference = totalSohibjon - totalIlhomjon;
            let debt = Math.abs(difference) / 2;
            
            const formatDebt = new Intl.NumberFormat('uz-UZ').format(debt);

            if (difference > 0) {
                debtAmountEl.textContent = `${formatDebt} UZS`;
                debtStatusEl.textContent = 'Ilhomjon Sohibjonga berishi kerak';
                debtStatusEl.style.color = 'var(--danger)';
            } else if (difference < 0) {
                debtAmountEl.textContent = `${formatDebt} UZS`;
                debtStatusEl.textContent = 'Sohibjon Ilhomjonga berishi kerak';
                debtStatusEl.style.color = 'var(--danger)';
            } else {
                debtAmountEl.textContent = `0 UZS`;
                debtStatusEl.textContent = 'Hisob-kitoblar teng';
                debtStatusEl.style.color = 'var(--success)';
            }
        });
    </script>
</body>
</html>
