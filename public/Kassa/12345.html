<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>⚖️ S&I Tarozi Pro</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
            authDomain: "xplusy-760fa.firebaseapp.com",
            projectId: "xplusy-760fa",
            storageBucket: "xplusy-760fa.firebasestorage.app",
            messagingSenderId: "992512966017",
            appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Global qilish
        window.db = db;
        window.fs = { collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, writeBatch, serverTimestamp };
        console.log("✅ Firestore ulandi!");
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* CSS stillari sizning kodingizdagidek qoladi, faqat muhim joylari: */
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .glass-card { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .balance-amount { font-size: 1.8rem; font-weight: 800; color: #3b82f6; }
        .person-selector { display: flex; gap: 10px; margin: 15px 0; }
        .person-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #334155; cursor: pointer; text-align: center; background: #1e293b; color: #94a3b8; }
        .person-btn.active[data-person="sohibjon"] { background: #2563eb; color: white; }
        .person-btn.active[data-person="ilhomjon"] { background: #16a34a; color: white; }
        .input-wrapper { background: #1e293b; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; }
        input, select { background: transparent; border: none; color: white; width: 100%; outline: none; padding-left: 10px; }
        .primary-btn { width: 100%; padding: 15px; border-radius: 12px; background: #3b82f6; border: none; color: white; font-weight: bold; cursor: pointer; }
        .history-item { display: flex; justify-content: space-between; background: #1e293b; margin-top: 10px; padding: 10px; border-radius: 10px; font-size: 0.9rem; }
        .delete-btn { color: #ef4444; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚖️ S&I Tarozi</h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="glass-card">
            <div>Sohibjon</div>
            <div class="balance-amount" id="sohib-balance">0</div>
        </div>
        <div class="glass-card">
            <div>Ilhomjon</div>
            <div class="balance-amount" id="ilhom-balance">0</div>
        </div>
    </div>

    <div class="glass-card" style="background: #1e293b;">
        <div id="verdictText">Hisoblanmoqda...</div>
    </div>

    <div class="glass-card">
        <div class="person-selector">
            <div class="person-btn active" data-person="sohibjon">Sohibjon</div>
            <div class="person-btn" data-person="ilhomjon">Ilhomjon</div>
        </div>
        
        <div class="input-wrapper">
            <select id="type">
                <option value="plus">💰 Pul qo'shdi</option>
                <option value="minus">🛒 Mahsulot/Naqd oldi</option>
            </select>
        </div>

        <div class="input-wrapper">
            <input type="number" id="amount" placeholder="Miqdor (so'm)">
        </div>

        <div class="input-wrapper">
            <input type="text" id="note" placeholder="Izoh (masalan: Go'sht uchun)">
        </div>

        <button class="primary-btn" id="saveBtn">Saqlash</button>
    </div>

    <div id="historyList"></div>
</div>

<script>
    const checkFS = setInterval(() => {
        if (window.db) {
            clearInterval(checkFS);
            startApp();
        }
    }, 100);

    function startApp() {
        const { collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, serverTimestamp } = window.fs;
        const db = window.db;

        let selectedPerson = 'sohibjon';
        document.querySelectorAll('.person-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPerson = btn.dataset.person;
            });
        });

        const transRef = collection(db, 'transactions');
        const q = query(transRef, orderBy('timestamp', 'desc'));

        onSnapshot(q, (snap) => {
            let sBal = 0, iBal = 0;
            let html = '';

            snap.forEach(d => {
                const t = d.data();
                const amt = Number(t.amount);
                
                if (t.person === 'sohibjon') {
                    t.type === 'plus' ? sBal += amt : sBal -= amt;
                } else {
                    t.type === 'plus' ? iBal += amt : iBal -= amt;
                }

                html += `
                    <div class="history-item">
                        <div>
                            <b>${t.person === 'sohibjon' ? 'S' : 'I'}</b> | ${t.type === 'plus' ? '+' : '-'}${amt.toLocaleString()} <br>
                            <small>${t.note || ''}</small>
                        </div>
                        <button class="delete-btn" onclick="deleteTrans('${d.id}')">❌</button>
                    </div>`;
            });

            document.getElementById('sohib-balance').innerText = sBal.toLocaleString();
            document.getElementById('ilhom-balance').innerText = iBal.toLocaleString();
            document.getElementById('historyList').innerHTML = html;

            const diff = sBal - iBal;
            const verdict = document.getElementById('verdictText');
            if (diff > 0) verdict.innerHTML = `🟢 Ilhomjon <b>${diff.toLocaleString()}</b> qarzdor`;
            else if (diff < 0) verdict.innerHTML = `🔵 Sohibjon <b>${Math.abs(diff).toLocaleString()}</b> qarzdor`;
            else verdict.innerHTML = "🤝 Hisob teng";
        });

        document.getElementById('saveBtn').onclick = async () => {
            const amt = document.getElementById('amount').value;
            const note = document.getElementById('note').value;
            const type = document.getElementById('type').value;

            if (!amt) return alert("Miqdorni kiriting!");

            await addDoc(transRef, {
                person: selectedPerson,
                amount: Number(amt),
                type: type,
                note: note,
                timestamp: serverTimestamp()
            });

            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
        };

        window.deleteTrans = async (id) => {
            if (confirm("O'chirilsinmi?")) await deleteDoc(doc(db, 'transactions', id));
        };
    }
</script>
</body>
</html>
