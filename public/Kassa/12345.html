<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hamkorlar Hisobi Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #0f172a; 
            --primary-light: #334155;
            --accent: #3b82f6; 
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px 80px 16px;
        }

        /* Navigatsiya */
        .tabs {
            display: flex;
            background: #e2e8f0;
            padding: 4px;
            border-radius: var(--radius);
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--card-bg);
            color: var(--text-main);
        }

        /* Balans Karta - Flat dizayn */
        .balance-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .category-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: block;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            line-height: 1;
        }

        .balance-status {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Kassa/Maxsulot View */
        .personal-debt-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            text-align: left;
        }

        .debt-info span {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .debt-info strong {
            font-size: 18px;
            color: var(--danger);
        }

        /* Tugmalar */
        .settle-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        
        .pay-shop-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .settle-btn:active, .pay-shop-btn:active { opacity: 0.8; }

        /* Forma - Flat dizayn */
        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .input-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background-color: var(--bg-color);
            color: var(--text-main);
            outline: none;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Tarix ro'yxati - Yaxlit list dizayni */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .transaction-item {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        /* To'lov amaliyotlari (yashil fonli) */
        .transaction-item.is-settlement {
            background: #f0fdf4;
        }

        .tx-info h4 { 
            font-size: 15px; 
            margin-bottom: 4px; 
            font-weight: 600;
        }
        
        .tx-info p { 
            font-size: 13px; 
            color: var(--text-muted); 
            margin-bottom: 6px;
        }
        
        /* Sana va vaqt stili */
        .tx-date {
            display: inline-block;
            font-size: 11px;
            color: var(--text-light);
            background: var(--bg-color);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .is-settlement .tx-date {
            background: #dcfce7;
            color: #166534;
        }

        .tx-amount { 
            font-size: 16px; 
            font-weight: 700; 
            text-align: right;
        }
        
        .tx-expense { color: var(--danger); }
        .tx-invest { color: var(--accent); }
        .tx-settlement { color: var(--success); font-size: 14px; }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="investment">Sarmoya</button>
            <button class="tab-btn" data-tab="product">Maxsulot</button>
            <button class="tab-btn" data-tab="cash">Kassa</button>
        </div>

        <div class="balance-card">
            <span class="category-label" id="cat-label">Sarmoya Holati</span>

            <div id="investment-view">
                <div class="balance-amount" id="debt-amount">0 UZS</div>
                <div class="balance-status" id="debt-status">Hisoblar teng</div>
                <button class="settle-btn" id="settle-btn" style="display: none;">Qarzni To'lash</button>
            </div>

            <div id="shop-debt-view" style="display: none;">
                <div class="personal-debt-card">
                    <div class="debt-info">
                        <span>Sohibjonning qarzi</span>
                        <strong id="sohibjon-debt">0 UZS</strong>
                    </div>
                    <button class="pay-shop-btn" id="btn-pay-sohibjon" style="display: none;">To'lash</button>
                </div>
                <div class="personal-debt-card">
                    <div class="debt-info">
                        <span>Ilhomjonning qarzi</span>
                        <strong id="ilhomjon-debt">0 UZS</strong>
                    </div>
                    <button class="pay-shop-btn" id="btn-pay-ilhomjon" style="display: none;">To'lash</button>
                </div>
            </div>
        </div>

        <div class="form-card">
            <form id="transaction-form">
                <div class="input-group">
                    <label id="payer-label">Kim pul tikdi?</label>
                    <select id="payer" required>
                        <option value="Sohibjon">Sohibjon</option>
                        <option value="Ilhomjon">Ilhomjon</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Summa (UZS)</label>
                    <input type="number" id="amount" placeholder="Masalan: 100000" required>
                </div>
                <div class="input-group">
                    <label id="desc-label">Nima uchun / Izoh</label>
                    <input type="text" id="description" placeholder="Izoh kiriting" required>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Saqlash</button>
            </form>
        </div>

        <h3 class="section-title">Amaliyotlar tarixi</h3>
        <div class="transaction-list" id="transaction-list"></div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYwHJou_9GqHZcf8XxtTByC51Z8un8rrM",
            authDomain: "xplusy-760fa.firebaseapp.com",
            projectId: "xplusy-760fa",
            storageBucket: "xplusy-760fa.firebasestorage.app",
            messagingSenderId: "992512966017",
            appId: "1:992512966017:web:5e919dbc9b8d8abcb43c80"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentTab = 'investment';
        let allTransactions = [];
        let currentNetDebt = 0; 
        let currentDebtor = ''; 
        let sDebtToShop = 0;
        let iDebtToShop = 0;

        const form = document.getElementById('transaction-form');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const listEl = document.getElementById('transaction-list');
        const submitBtn = document.getElementById('submit-btn');
        const investmentView = document.getElementById('investment-view');
        const shopDebtView = document.getElementById('shop-debt-view');
        const debtAmountEl = document.getElementById('debt-amount');
        const debtStatusEl = document.getElementById('debt-status');
        const settleBtn = document.getElementById('settle-btn');
        const sDebtEl = document.getElementById('sohibjon-debt');
        const iDebtEl = document.getElementById('ilhomjon-debt');
        const sPayBtn = document.getElementById('btn-pay-sohibjon');
        const iPayBtn = document.getElementById('btn-pay-ilhomjon');

        // Vaqtni formatlash funksiyasi
        function formatDateTime(timestamp) {
            if (!timestamp) return 'Vaqt noma\'lum';
            const date = new Date(timestamp);
            
            // Masalan: "17 Apr 2026, 19:30"
            const optionsDate = { day: 'numeric', month: 'short', year: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', hour12: false };
            
            const dateStr = date.toLocaleDateString('uz-UZ', optionsDate);
            const timeStr = date.toLocaleTimeString('uz-UZ', optionsTime);
            
            return `${dateStr} • ${timeStr}`;
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                tabBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentTab = e.target.dataset.tab;
                updateUIForTab();
                renderData();
            });
        });

        function updateUIForTab() {
            const catLabel = document.getElementById('cat-label');
            const payerLabel = document.getElementById('payer-label');
            const descLabel = document.getElementById('desc-label');

            if(currentTab === 'investment') {
                catLabel.textContent = "Do'konga Sarmoya Holati";
                payerLabel.textContent = "Kim sarmoya kiritdi?";
                descLabel.textContent = "Nima uchun?";
                investmentView.style.display = 'block';
                shopDebtView.style.display = 'none';
            } else if(currentTab === 'product') {
                catLabel.textContent = "Kassaga Mahsulot Qarzi";
                payerLabel.textContent = "Kim mahsulot oldi?";
                descLabel.textContent = "Qanday mahsulot?";
                investmentView.style.display = 'none';
                shopDebtView.style.display = 'block';
            } else {
                catLabel.textContent = "Kassadan Olingan Naqd Pul";
                payerLabel.textContent = "Kim naqd pul oldi?";
                descLabel.textContent = "Maqsad / Izoh";
                investmentView.style.display = 'none';
                shopDebtView.style.display = 'block';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.textContent = 'Kutilmoqda...';
            submitBtn.disabled = true;

            try {
                await addDoc(collection(db, "transactions"), {
                    payer: document.getElementById('payer').value,
                    amount: parseFloat(document.getElementById('amount').value),
                    description: document.getElementById('description').value,
                    category: currentTab,
                    type: 'action', 
                    timestamp: Date.now()
                });
                form.reset();
            } catch (error) {
                alert("Xatolik! " + error.message);
            } finally {
                submitBtn.textContent = 'Saqlash';
                submitBtn.disabled = false;
            }
        });

        settleBtn.addEventListener('click', () => {
            let amtStr = prompt(`${currentDebtor}ning jami qarzi: ${currentNetDebt.toLocaleString('uz-UZ')} UZS.\nQancha summa to'lanmoqda?`, currentNetDebt);
            if(amtStr) processPayment(currentDebtor, amtStr, currentNetDebt, 'Sheriklik qarzi uzildi');
        });
        
        sPayBtn.addEventListener('click', () => {
            let amtStr = prompt(`Sohibjonning jami qarzi: ${sDebtToShop.toLocaleString('uz-UZ')} UZS.\nQancha summa qaytarilmoqda?`, sDebtToShop);
            if(amtStr) processPayment('Sohibjon', amtStr, sDebtToShop, 'Qarz kassaga qaytarildi');
        });
        iPayBtn.addEventListener('click', () => {
            let amtStr = prompt(`Ilhomjonning jami qarzi: ${iDebtToShop.toLocaleString('uz-UZ')} UZS.\nQancha summa qaytarilmoqda?`, iDebtToShop);
            if(amtStr) processPayment('Ilhomjon', amtStr, iDebtToShop, 'Qarz kassaga qaytarildi');
        });

        async function processPayment(payerName, amountStr, maxDebt, desc) {
            let amount = parseFloat(amountStr);
            if (isNaN(amount) || amount <= 0) return alert("To'g'ri summa kiriting!");
            if (amount > maxDebt) return alert(`Xatolik: Siz maksimal ${maxDebt.toLocaleString('uz-UZ')} UZS to'lay olasiz!`);

            try {
                await addDoc(collection(db, "transactions"), {
                    payer: payerName,
                    amount: amount,
                    description: desc,
                    category: currentTab,
                    type: 'settlement',
                    timestamp: Date.now()
                });
            } catch (error) {
                alert("Xatolik: " + error.message);
            }
        }

        const q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allTransactions = [];
            snapshot.forEach(doc => allTransactions.push({ id: doc.id, ...doc.data() }));
            renderData();
        });

        function renderData() {
            const tabData = allTransactions.filter(t => t.category === currentTab);
            listEl.innerHTML = '';
            
            let netBalance = 0; 
            sDebtToShop = 0;
            iDebtToShop = 0;

            if(tabData.length === 0) {
                listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #94a3b8; font-size: 14px;">Hali amaliyotlar yo\'q</div>';
            }

            tabData.forEach(data => {
                const formatSum = new Intl.NumberFormat('uz-UZ').format(data.amount);
                const dateTimeStr = formatDateTime(data.timestamp); // Vaqtni olish
                
                if(data.type === 'settlement') {
                    listEl.innerHTML += `
                        <div class="transaction-item is-settlement">
                            <div class="tx-info">
                                <h4 style="color:#166534">${data.description}</h4>
                                <p>${data.payer} to'ladi</p>
                                <span class="tx-date">${dateTimeStr}</span>
                            </div>
                            <div class="tx-amount tx-settlement">${formatSum} UZS</div>
                        </div>`;
                } else {
                    const sign = currentTab === 'investment' ? '+' : '-';
                    const colorClass = currentTab === 'investment' ? 'tx-invest' : 'tx-expense';
                    const actionText = currentTab === 'investment' ? 'kiritdi' : 'oldi';
                    
                    listEl.innerHTML += `
                        <div class="transaction-item">
                            <div class="tx-info">
                                <h4>${data.description}</h4>
                                <p>${data.payer} ${actionText}</p>
                                <span class="tx-date">${dateTimeStr}</span>
                            </div>
                            <div class="tx-amount ${colorClass}">${sign} ${formatSum} UZS</div>
                        </div>`;
                }

                // Matematika
                if (currentTab === 'investment') {
                    const half = data.amount / 2;
                    if (data.type === 'action') {
                        if (data.payer === 'Sohibjon') netBalance += half;
                        if (data.payer === 'Ilhomjon') netBalance -= half;
                    } else if (data.type === 'settlement') {
                        if (data.payer === 'Sohibjon') netBalance += data.amount;
                        if (data.payer === 'Ilhomjon') netBalance -= data.amount;
                    }
                } else {
                    if (data.type === 'action') {
                        if (data.payer === 'Sohibjon') sDebtToShop += data.amount;
                        if (data.payer === 'Ilhomjon') iDebtToShop += data.amount;
                    } else if (data.type === 'settlement') {
                        if (data.payer === 'Sohibjon') sDebtToShop -= data.amount;
                        if (data.payer === 'Ilhomjon') iDebtToShop -= data.amount;
                    }
                }
            });

            // Oynalarni yangilash
            if (currentTab === 'investment') {
                currentNetDebt = Math.abs(netBalance);
                const formatDebt = new Intl.NumberFormat('uz-UZ').format(currentNetDebt);
                
                if (netBalance > 0) {
                    debtAmountEl.textContent = `${formatDebt} UZS`;
                    debtStatusEl.textContent = 'Ilhomjon Sohibjonga berishi kerak';
                    debtStatusEl.style.color = 'var(--danger)';
                    currentDebtor = 'Ilhomjon';
                    settleBtn.style.display = 'block';
                    settleBtn.textContent = `Qarzni To'lash (Ilhomjon)`;
                } else if (netBalance < 0) {
                    debtAmountEl.textContent = `${formatDebt} UZS`;
                    debtStatusEl.textContent = 'Sohibjon Ilhomjonga berishi kerak';
                    debtStatusEl.style.color = 'var(--danger)';
                    currentDebtor = 'Sohibjon';
                    settleBtn.style.display = 'block';
                    settleBtn.textContent = `Qarzni To'lash (Sohibjon)`;
                } else {
                    debtAmountEl.textContent = `0 UZS`;
                    debtStatusEl.textContent = 'Sarmoya hisobi teng';
                    debtStatusEl.style.color = 'var(--success)';
                    settleBtn.style.display = 'none';
                }
            } else {
                sDebtEl.textContent = `${new Intl.NumberFormat('uz-UZ').format(sDebtToShop)} UZS`;
                iDebtEl.textContent = `${new Intl.NumberFormat('uz-UZ').format(iDebtToShop)} UZS`;
                
                sDebtEl.style.color = sDebtToShop > 0 ? 'var(--danger)' : 'var(--success)';
                iDebtEl.style.color = iDebtToShop > 0 ? 'var(--danger)' : 'var(--success)';

                sPayBtn.style.display = sDebtToShop > 0 ? 'block' : 'none';
                iPayBtn.style.display = iDebtToShop > 0 ? 'block' : 'none';
            }
        }

        updateUIForTab();
    </script>
</body>
</html>
