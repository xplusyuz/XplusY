[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "zisi"

# If someone opens /public/... (old links), send to root path
[[redirects]]
  from = "/public/*"
  to = "/:splat"
  status = 301
  force = true

# Optional clean API prefix (you can use /api/payme if you want)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Admin panel routes (static)
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
  force = false


# No SPA fallback: project uses real .html pages and hash routing

